<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Manager V4.8</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

select, button {
    width:90%;
    padding:10px;
    margin:5px;
    font-size:18px;
}

button {
    background:#222;
    color:white;
    border:none;
    border-radius:8px;
}

button:disabled {
    opacity:0.4;
}

#matchTimer {
    font-size:95px;
    font-weight:bold;
}

.warn { color:orange; }
.danger {
    color:red;
    animation:blink 0.8s infinite;
}

@keyframes blink {
    50% {opacity:0.2;}
}

.box {
    margin:10px;
    padding:10px;
    background:#1a1a1a;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>Padel Manager V4.8</h2>

<div id="setup">

<select id="p1"><option>Marco</option><option>Tobias</option><option>Werner</option><option>David</option><option>Christian</option><option>Stefan</option></select>
<select id="p2"><option>Marco</option><option selected>Tobias</option><option>Werner</option><option>David</option><option>Christian</option><option>Stefan</option></select>
<select id="p3"><option>Marco</option><option>Tobias</option><option selected>Werner</option><option>David</option><option>Christian</option><option>Stefan</option></select>
<select id="p4"><option>Marco</option><option>Tobias</option><option>Werner</option><option selected>David</option><option>Christian</option><option>Stefan</option></select>
<select id="p5"><option>Marco</option><option>Tobias</option><option>Werner</option><option>David</option><option selected>Christian</option><option>Stefan</option></select>
<select id="p6"><option>Marco</option><option>Tobias</option><option>Werner</option><option>David</option><option>Christian</option><option selected>Stefan</option></select>

<select id="mode">
<option value="4">4 Spieler (2 aktiv)</option>
<option value="6" selected>6 Spieler (Rotation)</option>
</select>

<select id="sessionTime">
<option value="120">120 min</option>
<option value="180">180 min</option>
</select>

<select id="matchTime">
<option value="15">15</option>
<option value="18">18</option>
<option value="20" selected>20</option>
<option value="25">25</option>
</select>

<button onclick="start()">Start</button>

</div>

<div id="game" style="display:none">

<div class="box">
<div id="matchTimer">00:00</div>
</div>

<div class="box">
<b>Runde:</b> <span id="round">1</span>
</div>

<div class="box" id="current"></div>

<button onclick="toggle()">Start / Pause</button>
<button onclick="nextRound()" id="nextBtn" disabled>Nächste Runde</button>

</div>

<script>

let players=[];
let active=[];
let bench=[];
let schedule=[];
let current=0;
let round=1;

let matchLeft=0;
let matchDuration=0;

let running=false;
let matchInterval;

function start(){

players=[
p1.value,p2.value,p3.value,p4.value,p5.value,p6.value
];

matchDuration=parseInt(matchTime.value)*60;

let mode=parseInt(document.getElementById("mode").value);

// ACTIVE / BENCH LOGIC
if(mode===4){
active=players.slice(0,4);
bench=players.slice(4,6);
}else{
active=players;
bench=[];
}

buildSchedule();

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

render();
}

function buildSchedule(){

schedule=[];

for(let i=0;i<10;i++){

let rot=[...active];

for(let r=0;r<i;r++) rot.push(rot.shift());

schedule.push({
a:[rot[0],rot[1]],
b:[rot[2],rot[3]]
});
}
}

function toggle(){

if(!running){

running=true;
startMatchTimer();

}else{

running=false;
clearInterval(matchInterval);
}

}

function startMatchTimer(){

clearInterval(matchInterval);

matchLeft=matchDuration;

document.getElementById("nextBtn").disabled=true;

matchInterval=setInterval(()=>{

if(!running) return;

if(matchLeft>0){

matchLeft--;

document.getElementById("matchTimer").innerText=format(matchLeft);

if(matchLeft<=0){
document.getElementById("nextBtn").disabled=false;
clearInterval(matchInterval);
}

}

},1000);
}

function nextRound(){

if(matchLeft>0) return;

if(current < schedule.length-1){

current++;
round++;

render();

if(running){
startMatchTimer();
}

}

}

function render(){

let g=schedule[current];

document.getElementById("round").innerText=round;

document.getElementById("current").innerHTML=
"A: "+g.a.join(" + ")+"<br>B: "+g.b.join(" + ");

}

function format(s){
let m=String(Math.floor(s/60)).padStart(2,"0");
let sec=String(s%60).padStart(2,"0");
return m+":"+sec;
}

</script>

</body>
</html>
