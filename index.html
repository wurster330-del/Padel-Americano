<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Court Mode</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f3d26;
  color:white;
  text-align:center;
}

/* 🔥 FULLSCREEN COURT */
.court{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:20px;
}

/* MATCH TIMER EXTREM GROSS */
#matchTime{
  font-size:22vh;
  font-weight:bold;
  margin:0;
}

/* EVENT TIMER klein oben */
#eventTime{
  font-size:18px;
  opacity:0.8;
}

/* TEAMS RIESIG */
.teams{
  font-size:5vh;
  line-height:1.5;
  font-weight:bold;
}

/* BUTTON BAR (optional klein) */
.bar{
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
}
button:hover{background:#36a66a}

</style>
</head>

<body>

<div class="court">

<!-- TOP -->
<div id="eventTime">Spielabend 120:00</div>

<!-- CENTER TIMER -->
<div id="matchTime">18:00</div>

<!-- TEAMS -->
<div class="teams" id="teams"></div>

<!-- CONTROLS -->
<div class="bar">
<button onclick="startMatch()">▶ Start</button>
<button onclick="pauseMatch()">⏸ Pause</button>
<button onclick="resetMatch()">🔄 Reset</button>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= DATA ================= */

const players = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let active = [...players];
let rotation = 0;

/* TIMERS */
let event = { total:120*60, remain:120*60 };
let match = { total:18*60, remain:18*60, interval:null };

/* ================= TEAMS ================= */

function getTeams(){
  let a=[], b=[], bench=[];

  for(let i=0;i<active.length;i++){
    let idx = (i + rotation) % active.length;

    if(i < 2) a.push(active[idx]);
    else if(i < 4) b.push(active[idx]);
    else bench.push(active[idx]);
  }

  return {a,b,bench};
}

/* ================= MATCH ================= */

function startMatch(){
  if(match.interval) return;

  match.interval = setInterval(()=>{
    if(match.remain > 0){
      match.remain--;
      event.remain--;
    } else {
      nextMatch();
    }
    render();
  },1000);
}

function pauseMatch(){
  clearInterval(match.interval);
  match.interval = null;
}

function resetMatch(){
  pauseMatch();
  match.remain = match.total;
  render();
}

/* ================= AUTO ROTATION ================= */

function nextMatch(){

  pauseMatch();
  document.getElementById("beep").play();

  // Rotation weiter
  rotation = (rotation + 2) % active.length;

  // neuer Match-Timer
  match.remain = match.total;

  alert("➡️ Nächste Spielpaarung");

  startMatch();
}

/* ================= RENDER ================= */

function render(){

  let em = Math.floor(event.remain/60);
  let es = event.remain%60;

  let mm = Math.floor(match.remain/60);
  let ms = match.remain%60;

  document.getElementById("eventTime").textContent =
    "Spielabend " + String(em).padStart(2,"0")+":"+String(es).padStart(2,"0");

  document.getElementById("matchTime").textContent =
    String(mm).padStart(2,"0")+":"+String(ms).padStart(2,"0");

  const {a,b,bench} = getTeams();

  document.getElementById("teams").innerHTML =
    "A: " + a.join(" | ") + "<br>" +
    "B: " + b.join(" | ") + "<br>" +
    "Bank: " + bench.join(" | ");
}

render();

</script>

</body>
</html>
