<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V8 Kiosk</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071f14;
  color:white;
}

/* ================= KIOSK FULLSCREEN LOOK ================= */
body.kiosk{
  overflow:hidden;
}

#wrap{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

/* FULLSCREEN LOCK VISUAL */
.kiosk #wrap{
  max-width:100%;
}

/* PANELS */
.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* BUTTONS */
button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
  font-size:15px;
}

/* INPUTS */
input, select{
  padding:6px;
  border-radius:6px;
  border:none;
  margin:4px;
}

/* TIMER */
.bigTimer{
  font-size:140px;
  text-align:center;
  font-weight:900;
  letter-spacing:2px;
}

/* FOCUS MODE */
.focus .teamBox{
  font-size:18px;
  opacity:0.7;
}

/* TEAMS */
.teamBox{
  font-size:22px;
  font-weight:bold;
  margin:8px 0;
}

.small{
  opacity:0.8;
  font-size:13px;
}

/* WARNING */
.warning{
  color:red;
  text-align:center;
  display:none;
  font-weight:bold;
}

.blink{animation:blink 1s infinite;}

@keyframes blink{
  50%{opacity:0.2;}
}

/* COURT */
#court{
  background:#0e3d26;
  padding:12px;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="wrap">

<h2>🎾 Padel Terminal V8 – KIOSK MODE</h2>

<!-- ================= KIOSK CONTROL ================= -->
<div class="panel">
<button onclick="enterKiosk()">🔲 Kiosk Vollbild starten</button>
<button onclick="exitKiosk()">❌ Kiosk verlassen</button>
</div>

<!-- ================= PLAYERS ================= -->
<div class="panel">
<h3>👥 Spieler</h3>
<div id="players"></div>

<h3>⏱ Spielzeit</h3>
<select id="eventTime">
  <option value="120" selected>120 Min</option>
  <option value="180">180 Min</option>
</select>

<br><br>
<button onclick="generate()">🏆 Spielplan erstellen</button>
</div>

<!-- ================= TIMER ================= -->
<div class="panel">

<div class="bigTimer" id="matchTimer">18:00</div>

<div style="text-align:center;">
<button onclick="start()">▶ Start</button>
<button onclick="pause()">⏸ Pause</button>
<button onclick="next()">➡ Next</button>
</div>

<div class="warning" id="warn">⚠ 30 Sekunden</div>

</div>

<div class="panel">
<div class="bigTimer" id="eventTimer">120:00</div>
</div>

<!-- ================= COURT ================= -->
<div id="court"></div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= PLAYERS ================= */

let players=[
 {name:"Tobias",active:true},
 {name:"Werner",active:true},
 {name:"Christian",active:true},
 {name:"Stefan",active:true},
 {name:"David",active:true},
 {name:"Marco",active:true}
];

let schedule=[];
let index=0;

/* ================= TIMER ================= */

let matchSeconds=18*60;
let eventSeconds=120*60;

let match=matchSeconds;
let event=eventSeconds;

let run=null;

/* ================= KIOSK MODE ================= */

function enterKiosk(){
 document.body.classList.add("kiosk");
 if(document.documentElement.requestFullscreen){
  document.documentElement.requestFullscreen();
 }
}

function exitKiosk(){
 document.body.classList.remove("kiosk");
 if(document.exitFullscreen){
  document.exitFullscreen();
 }
}

/* ================= UI ================= */

function renderPlayers(){
 let box=document.getElementById("players");
 box.innerHTML="";

 players.forEach((p,i)=>{
  box.innerHTML+=`
   <div>
    <input type="checkbox" ${p.active?"checked":""}
    onchange="players[${i}].active=!players[${i}.active]">

    <input type="text" value="${p.name}"
    onchange="players[${i}].name=this.value">
   </div>
  `;
 });
}
renderPlayers();

/* ================= FOCUS MODE ================= */

function setFocusMode(active){
 if(active) document.body.classList.add("focus");
 else document.body.classList.remove("focus");
}

/* ================= GENERATE ================= */

function generate(){

 let list=players.filter(p=>p.active).map(p=>p.name);

 schedule=[];
 index=0;

 let pairHistory={};
 let oppHistory={};
 let pauseHistory={};

 function key(a,b){
  return a<b?a+"-"+b:b+"-"+a;
 }

 function score(a,b,bank){

  let s=0;

  let p1=key(a[0],a[1]);
  let p2=key(b[0],b[1]);

  s+=(pairHistory[p1]||0)*100;
  s+=(pairHistory[p2]||0)*100;

  for(let x of a){
   for(let y of b){
    s+=(oppHistory[key(x,y)]||0)*10;
   }
  }

  for(let p of bank){
   s+=(pauseHistory[p]||0)*5;
  }

  return s;
 }

 function update(a,b,bank){

  function addPair(x,y){
   let k=key(x,y);
   pairHistory[k]=(pairHistory[k]||0)+1;
  }

  function addOpp(x,y){
   let k=key(x,y);
   oppHistory[k]=(oppHistory[k]||0)+1;
  }

  a.forEach(x=>{
   a.forEach(y=>{
    if(x!==y) addPair(x,y);
   });
  });

  b.forEach(x=>{
   b.forEach(y=>{
    if(x!==y) addPair(x,y);
   });
  });

  a.forEach(x=>{
   b.forEach(y=>{
    addOpp(x,y);
   });
  });

  bank.forEach(p=>{
   pauseHistory[p]=(pauseHistory[p]||0)+1;
  });
 }

 let eventMin=parseInt(document.getElementById("eventTime").value);
 eventSeconds=eventMin*60;
 event=eventSeconds;

 let rounds=list.length*2;

 for(let r=0;r<rounds;r++){

  let best=null;
  let bestScore=1e9;

  for(let i=0;i<list.length;i++){
   for(let j=i+1;j<list.length;j++){

    let rem=list.filter(x=>x!==list[i]&&x!==list[j]);

    for(let k=0;k<rem.length;k++){
     for(let l=k+1;l<rem.length;l++){

      let a=[list[i],list[j]];
      let b=[rem[k],rem[l]];
      let bank=rem.filter(x=>x!==b[0]&&x!==b[1]);

      let sc=score(a,b,bank);

      if(sc<bestScore){
       bestScore=sc;
       best={a,b,bank,round:r+1};
      }
     }
    }
   }
  }

  schedule.push(best);
  update(best.a,best.b,best.bank);
 }

 render();
}

/* ================= TIMER ================= */

function start(){

 if(run) return;

 setFocusMode(true);

 run=setInterval(()=>{

  match--;
  event--;

  if(match===30){
   warn.style.display="block";
   beep();
  }

  if(match<=0){
   beep(); beep();
   next();
  }

  if(event<=0){
   pause();
  }

  render();

 },1000);
}

function pause(){
 clearInterval(run);
 run=null;
 setFocusMode(false);
}

/* ================= NEXT ================= */

function next(){
 index++;
 if(index>=schedule.length) index=0;
 match=matchSeconds;
 render();
}

/* ================= RENDER ================= */

function render(){

 matchTimer.textContent=
  Math.floor(match/60)+":"+String(match%60).padStart(2,"0");

 eventTimer.textContent=
  Math.floor(event/60)+":"+String(event%60).padStart(2,"0");

 if(schedule.length===0){
  court.innerHTML="Kein Spielplan";
  return;
 }

 let s=schedule[index];

 court.innerHTML=`
  <div class="teamBox">TEAM A: ${s.a.join(" | ")}</div>
  <div class="teamBox">TEAM B: ${s.b.join(" | ")}</div>
  <div class="small">Pause: ${s.bank.join(" | ")||"-"}</div>
  <div class="small">Runde ${s.round} / ${schedule.length}</div>
 `;
}

/* ================= SOUND ================= */

function beep(){
 let b=document.getElementById("beep");
 b.currentTime=0;
 b.play();
}

render();

</script>

</body>
</html>
