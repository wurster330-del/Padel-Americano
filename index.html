<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Manager</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
}

.screen { display: none; padding: 30px; }
.active { display: block; }

button {
  font-size: 22px;
  padding: 14px 20px;
  margin: 8px;
  border: none;
  border-radius: 10px;
}

.selected {
  background: #2ea043 !important;
  color: white;
}

/* PLAYER BUTTONS */
.player-btn {
  background: #1f6feb;
  color: white;
  display: inline-block;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
</style>
</head>

<body>

<!-- SETUP -->
<div id="setupScreen" class="screen active">

<h1>🎾 Setup Spielabend</h1>

<h2>👥 Spieler auswählen (Tippen)</h2>

<div class="grid" id="playerGrid">

  <button class="player-btn" onclick="togglePlayer(this,'Werner')">Werner</button>
  <button class="player-btn" onclick="togglePlayer(this,'Marco')">Marco</button>
  <button class="player-btn" onclick="togglePlayer(this,'David')">David</button>
  <button class="player-btn" onclick="togglePlayer(this,'Stefan')">Stefan</button>

  <button class="player-btn" onclick="togglePlayer(this,'Christian')">Christian</button>
  <button class="player-btn" onclick="togglePlayer(this,'Tobias')">Tobias</button>

</div>

<h2>⏱️ Spielzeit</h2>
<button onclick="setTime(120)">120 min</button>
<button onclick="setTime(180)">180 min</button>

<br><br>

<button style="background:#2ea043;color:white;font-size:26px"
onclick="startGame()">START SPIELABEND</button>

</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<h2>Spielleiter</h2>
<div id="matchInfo"></div>

<button onclick="nextMatch()">NEXT</button>
<button onclick="startCourt()">START</button>

</div>

<!-- COURT -->
<div id="courtScreen">

<div id="courtMatch"></div>
<div id="countdown"></div>
<div id="timer"></div>

</div>

<script>

let selectedPlayers = [];
let totalTime = 120 * 60;
let matches = [];
let current = 0;
let seconds;
let timer;

// SOUND
function beep() {
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  osc.frequency.value = 800;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),200);
}

// PLAYER TOGGLE
function togglePlayer(btn, name) {

  if(selectedPlayers.includes(name)) {
    selectedPlayers = selectedPlayers.filter(p => p !== name);
    btn.classList.remove("selected");
  } else {
    selectedPlayers.push(name);
    btn.classList.add("selected");
  }

  console.log("Aktive Spieler:", selectedPlayers);
}

// TIME
function setTime(min) {
  totalTime = min * 60;
}

// MATCH GENERATION
function generateMatches() {

  let p = [...selectedPlayers];

  matches = [];

  for(let i=0; i<p.length-3; i+=4) {
    matches.push([
      p[i] + " + " + p[i+1],
      p[i+2] + " + " + p[i+3]
    ]);
  }

  if(matches.length === 0) {
    matches = [["Nicht genug Spieler", ""]];
  }
}

// START
function startGame() {

  if(selectedPlayers.length < 4) {
    alert("Mindestens 4 Spieler nötig");
    return;
  }

  generateMatches();

  seconds = totalTime;

  document.getElementById("setupScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  showMatch();
}

// MATCH
function showMatch() {
  document.getElementById("matchInfo").innerHTML =
    matches[current][0] + "<br>vs<br>" + matches[current][1];
}

function nextMatch() {
  current = (current + 1) % matches.length;
  showMatch();
}

// COURT
function startCourt() {
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("courtScreen").style.display = "flex";

  document.getElementById("courtMatch").innerHTML =
    matches[current][0] + " VS " + matches[current][1];

  startCountdown(10);
}

function startCountdown(s) {
  let c = s;
  const el = document.getElementById("countdown");

  let i = setInterval(()=>{
    el.innerText = "Start in " + c;
    c--;
    if(c < 0){
      clearInterval(i);
      el.innerText = "";
      beep();
      startTimer();
    }
  },1000);
}

function startTimer() {
  const el = document.getElementById("timer");

  timer = setInterval(()=>{

    let m = Math.floor(seconds/60);
    let s = seconds%60;

    el.innerText =
      String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

    seconds--;

    if(seconds < 0){
      clearInterval(timer);
      end();
    }

  },1000);
}

function end() {
  beep();
  document.getElementById("courtScreen").innerHTML =
    "<h1 style='font-size:80px'>MATCH BEENDET</h1>";
}

</script>

</body>
</html>
