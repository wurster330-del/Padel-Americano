<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Manager V11 MASTER 0013.1 FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  border:none;
  padding:12px 14px;
  border-radius:10px;
  color:#fff;
  margin:4px;
  cursor:pointer;
  font-weight:bold;
  background:#1f6f4a;
}

.mode-btn.active{
  box-shadow:0 0 10px #00ff99;
}

.mode-btn.turnier.active{ background:#2e8b57; }
.mode-btn.gruppen.active{ background:#1e90ff; }

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:8px;
  margin:5px 0;
}

/* KIOSK */
.kioskMode #app{ display:none; }
.kioskMode #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:25px;
}

.kioskBox{
  font-size:22px;
  margin:6px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 V11 MASTER 0013.1 FIX</div>
  <button onclick="enterKiosk()">▶ Kiosk</button>
</div>

<!-- SETUP (RESTORED) -->
<div class="section">
<h3>⚙️ Setup</h3>

<label>Gesamtzeit:</label>
<select id="total">
  <option value="120">120 min</option>
  <option value="180" selected>180 min</option>
</select>

<br><br>

<label>Spielzeit:</label>
<select id="match">
  <option value="15">15 min</option>
  <option value="18" selected>18 min</option>
  <option value="20">20 min</option>
</select>
</div>

<!-- MODE -->
<div class="section">
<h3>🎛 Modus</h3>

<button id="btnTurnier" class="mode-btn turnier active" onclick="setMode('turnier')">🏆 Turnier</button>
<button id="btnGruppen" class="mode-btn gruppen" onclick="setMode('gruppen')">👥 Gruppen</button>

</div>

<!-- PLAYERS -->
<div class="section">
<h3>👥 Spieler</h3>
<div id="players"></div>
</div>

<!-- PREVIEW -->
<div class="section">
<h3>📊 Spielplan</h3>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<h1>🎾 KIOSK</h1>

<div class="kioskBox" id="teams"></div>
<div class="kioskBox" id="bank"></div>
<div class="kioskBox" id="roundInfo"></div>

<br>

<button onclick="startGame()">▶ Start</button>
<button onclick="nextGame()">➡ Next</button>
<button onclick="exitKiosk()">⛔ Exit</button>

</div>

<script>

/* =========================
   STATE
========================= */

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;
let groups=null;

/* =========================
   UI
========================= */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";
  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox"
        ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">

        <input type="text"
        value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>`;
  });
}

/* =========================
   MODE SWITCH
========================= */

function setMode(m){
  mode=m;

  document.getElementById("btnTurnier").classList.remove("active");
  document.getElementById("btnGruppen").classList.remove("active");

  if(m==="turnier"){
    document.getElementById("btnTurnier").classList.add("active");
  } else {
    document.getElementById("btnGruppen").classList.add("active");
  }

  generate();
}

/* =========================
   SMART MODE ENGINE
========================= */

function getSystemMode(){

  let count = players.filter(p=>p.active).length;

  if(count <= 4) return "PURE_MATCH";
  if(count === 5) return "ROTATION_5";
  if(count === 6 && mode==="gruppen") return "GROUP_MODE";
  if(count === 6) return "ROTATION_6";

  return "FRE_FULL";
}

/* =========================
   TIME FIX (RESTORED)
========================= */

function calcRounds(){

  let total = parseInt(document.getElementById("total").value);
  let match = parseInt(document.getElementById("match").value);

  return Math.max(1, Math.floor(total / match));
}

/* =========================
   BUILDERS
========================= */

function buildPureMatch(list){

  let p=[...list].sort(()=>Math.random()-0.5);

  return {
    a:[p[0],p[1]],
    b:[p[2],p[3]],
    bank:[]
  };
}

function buildRotation5(list){

  let p=[...list].sort(()=>Math.random()-0.5);

  return {
    a:[p[0],p[1]],
    b:[p[2],p[3]],
    bank:[p[4]]
  };
}

function buildRotation6(list){

  let p=[...list].sort(()=>Math.random()-0.5);

  return {
    a:[p[0],p[1]],
    b:[p[2],p[3]],
    bank:[p[4],p[5]]
  };
}

function buildTeams(list){

  let p=[...list].sort(()=>Math.random()-0.5);

  return {
    a:[p[0],p[1]],
    b:[p[2],p[3]],
    bank:p.slice(4)
  };
}

/* =========================
   GROUPS
========================= */

function buildGroups(){

  let list=players.filter(p=>p.active).map(p=>p.name);
  list=list.sort(()=>Math.random()-0.5);

  groups=[
    [list[0],list[1]],
    [list[2],list[3]],
    [list[4],list[5]]
  ];
}

function groupMatch(r){

  let pattern=[
    [groups[0],groups[1]],
    [groups[0],groups[2]],
    [groups[1],groups[2]]
  ];

  let sel=pattern[r%pattern.length];

  let all=groups.flat();

  let bank=all.filter(x=>!sel[0].includes(x)&&!sel[1].includes(x));

  return {a:sel[0],b:sel[1],bank};
}

/* =========================
   GENERATE CORE
========================= */

function generate(){

  schedule=[];
  index=0;

  let list=players.filter(p=>p.active).map(p=>p.name);
  let rounds=calcRounds();

  let system=getSystemMode();

  if(system==="PURE_MATCH"){
    for(let r=0;r<rounds;r++) schedule.push(buildPureMatch(list));
  }

  else if(system==="ROTATION_5"){
    for(let r=0;r<rounds;r++) schedule.push(buildRotation5(list));
  }

  else if(system==="ROTATION_6"){
    for(let r=0;r<rounds;r++) schedule.push(buildRotation6(list));
  }

  else if(system==="GROUP_MODE"){
    buildGroups();
    for(let r=0;r<rounds;r++) schedule.push(groupMatch(r));
  }

  else{
    for(let r=0;r<rounds;r++) schedule.push(buildTeams(list));
  }

  render();
  update();
}

/* =========================
   RENDER
========================= */

function render(){

  let html="<b>Spielplan</b><br><br>";

  schedule.forEach((s,i)=>{
    html+=`
      R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}<br>
      🪑 Bank: ${s.bank.length?s.bank.join(", "):"keine"}<br><br>
    `;
  });

  document.getElementById("preview").innerHTML=html;
}

/* =========================
   KIOSK
========================= */

function enterKiosk(){document.body.classList.add("kioskMode");}
function exitKiosk(){document.body.classList.remove("kioskMode");}

function startGame(){index=0;update();}
function nextGame(){index++;if(index>=schedule.length)index=0;update();}

function update(){

  let s=schedule[index];
  if(!s) return;

  document.getElementById("teams").innerHTML=
    `A: ${s.a.join(" / ")}<br>B: ${s.b.join(" / ")}`;

  document.getElementById("bank").innerHTML=
    `Bank: ${s.bank.length?s.bank.join(", "):"keine"}`;

  document.getElementById("roundInfo").innerHTML=
    `Runde ${index+1}/${schedule.length}`;
}

/* INIT */
renderPlayers();
generate();

</script>

</body>
</html>
