<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel-Götter V2.0</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{padding:12px;}

.topbar{
  background:#0f3a28;
  padding:12px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

button{
  padding:12px 16px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
}

.playerRow{
  display:flex;
  gap:10px;
  margin:5px 0;
}

/* KIOSK */
.kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

.kioskMode #app{display:none;}
.kioskMode .kiosk{display:block;}

#timer{
  font-size:160px;
  color:#00ff99;
  font-weight:bold;
}

.match{
  font-size:40px;
  margin-top:20px;
}

.bank{
  font-size:30px;
  color:#ffd54a;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🏆 Padel-Götter V2.0</div>
<button onclick="openKiosk()">Kiosk</button>
</div>

<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="mode='turnier'">Turnier</button>
<button onclick="mode='gruppe'">Gruppe</button>
</div>

<div class="section">
<h3>Aktion</h3>
<button onclick="generate()">Spielplan erstellen</button>
<button onclick="remix()">Neu mischen</button>
</div>

<div class="section">
<h3>Vorschau</h3>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div class="kiosk">

<div id="timer">00:00</div>
<div id="match" class="match"></div>
<div id="bank" class="bank"></div>

<br>

<button onclick="next()">Next</button>
<button onclick="endMatch()">Matchende</button>
<button onclick="closeKiosk()">Exit</button>

</div>

<script>

/* ======================
   STATE ENGINE
====================== */

const State = {
  mode: "turnier",
  players: ["Marco","Stefan","David","Tobias","Chris","Werner"],
  selected: {},
  schedule: [],
  index: 0,
  timer: null,
  timeLeft: 0,
  finished: false
};

/* ======================
   INIT
====================== */

function init(){
  const box = document.getElementById("players");
  box.innerHTML = "";

  State.players.forEach(p=>{
    State.selected[p] = true;

    const row = document.createElement("div");
    row.className = "playerRow";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = true;

    cb.onchange = ()=> State.selected[p] = cb.checked;

    row.appendChild(cb);
    row.appendChild(document.createTextNode(p));

    box.appendChild(row);
  });
}

/* ======================
   HELPERS
====================== */

function activePlayers(){
  return State.players.filter(p=>State.selected[p]);
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

/* ======================
   GROUP ENGINE (NEU + STABIL)
====================== */

function groupRound(p,r){

  if(p.length===4)
    return {a:[p[0],p[1]],b:[p[2],p[3]],bank:[]};

  if(p.length===5){
    return (r%2===0)
      ? {a:[p[0],p[1]],b:[p[2],p[3]],bank:[p[4]]}
      : {a:[p[2],p[3]],b:[p[0],p[1]],bank:[p[4]]};
  }

  if(p.length===6){
    const A=[p[0],p[1]];
    const B=[p[2],p[3]];
    const C=[p[4],p[5]];

    if(r%3===0) return {a:A,b:B,bank:C};
    if(r%3===1) return {a:B,b:C,bank:A};
    return {a:C,b:A,bank:B};
  }

  return {a:[],b:[],bank:[]};
}

/* ======================
   GENERATE (CORE)
====================== */

function generate(){

  const p = activePlayers();

  if(p.length<4){
    alert("Mindestens 4 Spieler");
    return;
  }

  State.schedule = [];
  State.index = 0;
  State.finished = false;

  const rounds = 6;

  for(let r=0;r<rounds;r++){

    let a=[],b=[],bank=[];

    if(State.mode==="turnier"){

      let pool = shuffle(p);

      a=[pool[0],pool[1]];
      b=[pool[2],pool[3]];
      bank = pool[4] ? [pool[4]] : [];
    }

    if(State.mode==="gruppe"){
      const g = groupRound(p,r);
      a=g.a; b=g.b; bank=g.bank;
    }

    State.schedule.push({a,b,bank});
  }

  render();
  update();
}

/* ======================
   REMIX
====================== */

function remix(){
  State.schedule=[];
  State.index=0;
  generate();
}

/* ======================
   UI
====================== */

function render(){
  const box=document.getElementById("preview");
  box.innerHTML="";

  State.schedule.forEach((s,i)=>{
    const div=document.createElement("div");
    div.innerText=`R${i+1}: ${s.a.join("/")} vs ${s.b.join("/")} | Bank: ${s.bank.join(",")||"keine"}`;
    box.appendChild(div);
  });
}

/* ======================
   KIOSK UPDATE
====================== */

function update(){

  const s=State.schedule[State.index];
  if(!s)return;

  document.getElementById("match").innerText =
    s.a.join(" & ") + " 🆚 " + s.b.join(" & ");

  document.getElementById("bank").innerText =
    "Bank: " + (s.bank.join(", ") || "keine");
}

/* ======================
   KIOSK
====================== */

function openKiosk(){
  document.body.classList.add("kioskMode");
}

function closeKiosk(){
  document.body.classList.remove("kioskMode");
}

/* ======================
   NAV
====================== */

function next(){
  State.index = (State.index+1)%State.schedule.length;
  update();
}

function endMatch(){
  clearInterval(State.timer);
}

/* INIT */
init();

</script>

</body>
</html>
