<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Americano V5.0.0 Build 7.0.0 Release</title>
<style>
body{font-family:Arial,sans-serif;margin:10px}
.card{border:1px solid #ccc;border-radius:10px;padding:12px;margin:10px 0}
button,input,select,textarea{font-size:20px;min-height:52px}
#timer{
  font-size:140px;
  font-weight:bold;
  text-align:center;
  line-height:1;
  margin:15px 0;
}
#ranking div{padding:4px 0}
</style>
</head>
<body>
<h1>🎾 Padel Americano V5.0.0 Build 7.0.0 Release</h1>

<div class="card">
<h3>⏱ Match-Timer (vergrößert)</h3>
<div id="timer">18:00</div>
<button onclick="startTimer()">▶️ Start</button>
<button onclick="pauseTimer()">⏸️ Pause</button>
<button onclick="resetTimer()">🔄 Reset</button>
</div>

<div class="card">
<h3>👥 Spieler</h3>
<textarea id="players" rows="6" style="width:100%">Werner
Tobias
Marco
Stefan
Christian
David</textarea>
</div>

<div class="card">
<h3>🏆 Turnier</h3>
<p>6 Spieler → maximal 180 Minuten (10 Runden à 18 Minuten)</p>
<button onclick="generate()">🎲 Spielplan erzeugen</button>
<div id="schedule"></div>
</div>

<div class="card">
<h3>📊 Rangliste</h3>
<div id="ranking"></div>
</div>

<script>
let remaining=1080, timerId=null;

function drawTimer(){
 const m=Math.floor(remaining/60);
 const s=remaining%60;
 document.getElementById('timer').innerText =
   String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function startTimer(){
 clearInterval(timerId);
 timerId=setInterval(()=>{
   if(remaining>0){
     remaining--;
     drawTimer();
   }else{
     clearInterval(timerId);
     alert('🏁 Runde beendet');
   }
 },1000);
}

function pauseTimer(){ clearInterval(timerId); }

function resetTimer(){
 clearInterval(timerId);
 remaining=1080;
 drawTimer();
}

function generate(){
 const p=document.getElementById('players').value.split('\n').filter(Boolean);
 let html='';
 for(let i=0;i<10;i++){
   html += `<div>Runde ${i+1}: ${p[i%p.length]} / ${p[(i+1)%p.length]} vs ${p[(i+2)%p.length]} / ${p[(i+3)%p.length]}</div>`;
 }
 document.getElementById('schedule').innerHTML=html;

 document.getElementById('ranking').innerHTML =
   p.map(x=>`<div>${x}: 0 Punkte</div>`).join('');
}

drawTimer();
generate();
</script>
</body>
</html>
