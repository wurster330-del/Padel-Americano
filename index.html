<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel-Götter V2.1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{padding:12px;}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.player{
  display:flex;
  gap:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="app">

<h2>🏆 Padel-Götter V2.1</h2>

<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="setMode('turnier')">Turnier</button>
<button onclick="setMode('gruppe')">Gruppe</button>
</div>

<div class="section">
<h3>Zeit</h3>

<label>Gesamtzeit</label>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<br><br>

<label>Matchzeit</label>
<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<div class="section">
<button onclick="generate()">Spielplan erstellen</button>
<button onclick="remix()">Neu mischen</button>
</div>

<div class="section">
<h3>Spielplan</h3>
<div id="output"></div>
</div>

</div>

<script>

/* =====================
   STATE
===================== */

let mode = "turnier";

let players = ["Marco","Stefan","David","Tobias","Chris","Werner"];
let active = {};
let schedule = [];

/* =====================
   INIT
===================== */

function init(){
  let box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p=>{
    active[p] = true;

    let row = document.createElement("div");
    row.className = "player";

    let cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = true;
    cb.onchange = ()=> active[p] = cb.checked;

    row.appendChild(cb);
    row.appendChild(document.createTextNode(p));

    box.appendChild(row);
  });
}

/* =====================
   HELPERS
===================== */

function getPlayers(){
  return players.filter(p=>active[p]);
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

/* =====================
   MODE
===================== */

function setMode(m){
  mode = m;
}

/* =====================
   TURNIER (Partner wechseln jede Runde)
===================== */

function turnierRound(p){

  let pool = shuffle(p);

  return {
    a:[pool[0], pool[1]],
    b:[pool[2], pool[3]],
    bank: pool.length === 6 ? [pool[4], pool[5]] : [pool[4] || ""]
  };
}

/* =====================
   GRUPPE (FESTE TEAMS)
===================== */

let fixedTeams = [];

function createFixedTeams(p){

  let pool = shuffle(p);

  fixedTeams = [];

  if(pool.length === 6){
    fixedTeams = [
      [pool[0], pool[1]],
      [pool[2], pool[3]],
      [pool[4], pool[5]]
    ];
  }

  if(pool.length === 5){
    fixedTeams = [
      [pool[0], pool[1]],
      [pool[2], pool[3]],
      [pool[4]]
    ];
  }

  if(pool.length === 4){
    fixedTeams = [
      [pool[0], pool[1]],
      [pool[2], pool[3]]
    ];
  }
}

/* =====================
   GROUP ROUND (TEAMS BLEIBEN FIX)
===================== */

function groupRound(r){

  let t = fixedTeams;

  if(t.length === 2){
    return {
      a:t[0],
      b:t[1],
      bank:[]
    };
  }

  if(t.length === 3){

    switch(r % 3){
      case 0: return {a:t[0], b:t[1], bank:t[2]};
      case 1: return {a:t[1], b:t[2], bank:t[0]};
      case 2: return {a:t[2], b:t[0], bank:t[1]};
    }
  }

  return {a:[],b:[],bank:[]};
}

/* =====================
   GENERATE
===================== */

function generate(){

  let p = getPlayers();

  if(p.length < 4){
    alert("Mindestens 4 Spieler");
    return;
  }

  const total = Number(document.getElementById("totalTime").value);
  const match = Number(document.getElementById("matchTime").value);

  const rounds = Math.floor(total / match);

  schedule = [];

  // 🔥 GROUP FIXED TEAMS ONLY ONCE
  if(mode === "gruppe"){
    createFixedTeams(p);
  }

  for(let r=0;r<rounds;r++){

    let round;

    if(mode === "turnier"){
      round = turnierRound(p);
    } else {
      round = groupRound(r);
    }

    schedule.push(round);
  }

  render();
}

/* =====================
   REMIX
===================== */

function remix(){

  schedule = [];

  if(mode === "gruppe"){
    createFixedTeams(getPlayers());
  }

  generate();
}

/* =====================
   OUTPUT
===================== */

function render(){

  let box = document.getElementById("output");
  box.innerHTML = "";

  schedule.forEach((s,i)=>{

    let div = document.createElement("div");

    div.innerHTML =
      `<b>R${i+1}</b>: ${s.a.join(" & ")} vs ${s.b.join(" & ")}
      <br>Bank: ${s.bank.join(", ") || "keine"}`;

    box.appendChild(div);
  });
}

/* INIT */
init();

</script>

</body>
</html>
