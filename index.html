<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V3.0 Phase 3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
}

#wrap{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.big{
  font-size:28px;
  font-weight:bold;
}

.small{
  opacity:0.8;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
}

/* COURT */
#court{
  margin-top:20px;
  padding:15px;
  background:#144d30;
  border-radius:12px;
}

.team{
  font-size:22px;
  font-weight:bold;
  margin:5px 0;
}

.round{
  font-size:18px;
  opacity:0.8;
}

.next{
  margin-top:10px;
  color:#66d9ff;
}
</style>
</head>

<body>

<div id="wrap">

<h1>🎾 Phase 3 – Turniergenerator</h1>

<div class="panel">
<button onclick="generate()">🏆 Turnier erstellen</button>
<button onclick="next()">➡ Next</button>
</div>

<div id="court">

<div class="round" id="roundInfo"></div>

<div class="team" id="teamA"></div>
<div class="team" id="teamB"></div>

<div class="small" id="bank"></div>

<div class="next" id="nextInfo"></div>

</div>

</div>

<script>

/* ================= PLAYERS ================= */

const allPlayers = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let active = [...allPlayers];
let schedule = [];
let index = 0;

/* ================= SHUFFLE ================= */

function shuffle(arr){
  let a = [...arr];
  for(let i=a.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ================= GENERATOR ================= */

function generate(){

  let players = shuffle(active);

  schedule = [];
  index = 0;

  let rounds = players.length; // einfache stabile Basis

  for(let r=0;r<rounds;r++){

    let rot = [
      ...players.slice(r%players.length),
      ...players.slice(0,r%players.length)
    ];

    let teamA = [rot[0],rot[1]];
    let teamB = [rot[2],rot[3]];
    let bank  = rot.slice(4);

    schedule.push({
      a: teamA,
      b: teamB,
      bank: bank,
      round: r+1
    });
  }

  render();
}

/* ================= NEXT ================= */

function next(){

  if(schedule.length === 0) return;

  index++;
  if(index >= schedule.length) index = 0;

  render();
}

/* ================= RENDER ================= */

function render(){

  if(schedule.length === 0){
    document.getElementById("court").innerHTML =
      "<div class='small'>Noch kein Turnier erstellt</div>";
    return;
  }

  let s = schedule[index];

  document.getElementById("roundInfo").innerText =
    "Runde " + s.round + " / " + schedule.length;

  document.getElementById("teamA").innerText =
    "TEAM A: " + s.a.join(" | ");

  document.getElementById("teamB").innerText =
    "TEAM B: " + s.b.join(" | ");

  document.getElementById("bank").innerText =
    "Bank: " + (s.bank.length ? s.bank.join(" | ") : "-");

  let nextS = schedule[index+1] || schedule[0];

  document.getElementById("nextInfo").innerText =
    "➡ Nächstes Match: " + nextS.a.join(" / ") +
    " vs " + nextS.b.join(" / ");
}

</script>

</body>
</html>
