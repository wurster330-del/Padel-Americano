<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel-Götter V2.3</title>

<style>
body{
margin:0;
font-family:Arial;
background:#061b12;
color:white;
}

.view{display:none;padding:15px;}
.view.active{display:block;}

.section{
background:#124d35;
margin:10px 0;
padding:10px;
border-radius:10px;
}

button{
padding:12px 16px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.player{display:flex;gap:10px;margin:5px 0;}

/* KIOSK */
#kiosk{
text-align:center;
background:black;
height:100vh;
}

.title{font-size:42px;font-weight:bold;}

.match{font-size:72px;margin:20px 0;font-weight:bold;}

.timer{
font-size:200px;
color:#00ff99;
font-weight:bold;
}

.bank{
font-size:55px;
opacity:0.95;
margin-top:15px;
}

/* BUTTONS */
.start{background:#1f6f4a;color:white;}
.next{background:#444;color:white;}
.end{background:#b30000;color:white;}
.exit{background:#666;color:white;}
.fullscreen{background:#222;color:white;}
</style>
</head>

<body>

<!-- =====================
     PLANUNG
===================== -->
<div id="planning" class="view active">

<h2>🏆 Padel-Götter V2.3</h2>

<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="setMode('turnier')">Turnier</button>
<button onclick="setMode('gruppe')">Gruppe</button>
</div>

<div class="section">
<h3>Zeit</h3>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<div class="section">
<button onclick="generate()">Spielplan erstellen</button>
<button onclick="remix()">Neu mischen</button>
<button onclick="openKiosk()">▶ Kiosk starten</button>
<button class="fullscreen" onclick="toggleFullscreen()">⛶ Fullscreen</button>
</div>

<div id="planOutput"></div>

</div>

<!-- =====================
     KIOSK
===================== -->
<div id="kiosk" class="view">

<div class="title">🏆 PADEL-GÖTTER</div>

<div class="match" id="match">---</div>

<div class="timer" id="timer">00:00</div>

<div class="bank" id="bank">-</div>

<button class="start" onclick="start()">START</button>
<button class="end" onclick="endMatch()">MATCHENDE</button>
<button class="next" onclick="next()">NEXT</button>
<button class="exit" onclick="exitKiosk()">EXIT</button>

</div>

<script>

/* =====================
   STATE
===================== */

let mode="turnier";

let players=["Marco","Stefan","David","Tobias","Chris","Werner"];
let active={};

let schedule=[];
let index=0;

let fixedTeams=[];

let interval=null;
let running=false;
let timeLeft=18*60;

/* =====================
   INIT
===================== */

function init(){

let box=document.getElementById("players");

players.forEach(p=>{
active[p]=true;

let d=document.createElement("div");
d.className="player";

let cb=document.createElement("input");
cb.type="checkbox";
cb.checked=true;
cb.onchange=()=>active[p]=cb.checked;

d.appendChild(cb);
d.appendChild(document.createTextNode(p));

box.appendChild(d);
});

}

/* =====================
   HELPERS
===================== */

function getPlayers(){
return players.filter(p=>active[p]);
}

function shuffle(a){
return [...a].sort(()=>Math.random()-0.5);
}

/* =====================
   MODE
===================== */

function setMode(m){
mode=m;
}

/* =====================
   GROUP TEAMS
===================== */

function createTeams(p){

let pool=shuffle(p);

fixedTeams=[
[pool[0],pool[1]],
[pool[2],pool[3]],
[pool[4],pool[5]]
];

}

/* =====================
   NO DUPLICATES
===================== */

let history=[];

function isDuplicate(a,b){
return history.includes(a.join()+b.join()) ||
history.includes(b.join()+a.join());
}

function savePair(a,b){
history.push(a.join()+b.join());
}

/* =====================
   GENERATE
===================== */

function generate(){

let p=getPlayers();

let total=+totalTime.value;
let match=+matchTime.value;

let rounds=Math.floor(total/match);

schedule=[];
index=0;
history=[];

if(mode==="gruppe") createTeams(p);

for(let r=0;r<rounds;r++){

let round;

if(mode==="turnier"){

let pool;
let a,b;

do{
pool=shuffle(p);
a=[pool[0],pool[1]];
b=[pool[2],pool[3]];
}while(isDuplicate(a,b));

savePair(a,b);

round={
a,
b,
bank:[pool[4],pool[5]]
};

}

if(mode==="gruppe"){

let t=fixedTeams;

round={
a:t[r%3],
b:t[(r+1)%3],
bank:t[(r+2)%3]
};

}

schedule.push(round);

}

renderPlan();

}

/* =====================
   REMIX
===================== */

function remix(){

schedule=[];
index=0;

if(mode==="gruppe") createTeams(getPlayers());

generate();

}

/* =====================
   PLAN OUTPUT
===================== */

function renderPlan(){

planOutput.innerHTML="";

schedule.forEach((s,i)=>{

planOutput.innerHTML+=
`R${i+1}: ${s.a.join(" & ")} vs ${s.b.join(" & ")} | Bank: ${s.bank.join(", ")}<br>`;

});

}

/* =====================
   KIOSK
===================== */

function openKiosk(){

planning.classList.remove("active");
kiosk.classList.add("active");

index=0;
loadMatch();

let match=+matchTime.value;
timeLeft=match*60;

updateTimer();

}

/* =====================
   LOAD MATCH
===================== */

function loadMatch(){

let s=schedule[index];

match.innerText=
s.a.join(" & ")+" vs "+s.b.join(" & ");

bank.innerText="Bank: "+s.bank.join(", ");

}

/* =====================
   TIMER
===================== */

function updateTimer(){

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

timer.innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

}

/* =====================
   START + SOUND
===================== */

function start(){

if(running) return;

running=true;

beep();

clearInterval(interval);

interval=setInterval(()=>{

if(timeLeft>0){
timeLeft--;
updateTimer();
}else endMatch();

},1000);

}

/* =====================
   SOUND
===================== */

function beep(){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.2);
}

/* =====================
   MATCHENDE
===================== */

function endMatch(){

clearInterval(interval);
running=false;
timeLeft=0;
updateTimer();
beep();

}

/* =====================
   NEXT
===================== */

function next(){

clearInterval(interval);
running=false;

index++;

if(index>=schedule.length) index=0;

let match=+matchTime.value;
timeLeft=match*60;

loadMatch();
updateTimer();

}

/* =====================
   EXIT
===================== */

function exitKiosk(){

clearInterval(interval);
running=false;

kiosk.classList.remove("active");
planning.classList.add("active");

}

/* =====================
   FULLSCREEN FIXED
===================== */

function toggleFullscreen(){

let el=document.documentElement;

if(document.fullscreenElement ||
document.webkitFullscreenElement ||
document.msFullscreenElement){

if(document.exitFullscreen) document.exitFullscreen();
else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
else if(document.msExitFullscreen) document.msExitFullscreen();

}else{

if(el.requestFullscreen) el.requestFullscreen();
else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
else if(el.msRequestFullscreen) el.msRequestFullscreen();

}

}

/* INIT */
init();
updateTimer();

</script>

</body>
</html>
