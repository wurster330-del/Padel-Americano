<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel PRO CLEAN V12.2</title>

<meta name="theme-color" content="#0b1f16">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f16;
  color:white;
}

#app{padding:10px;}

.topbar{
  position:sticky;
  top:0;
  background:#123b28;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:14px 18px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.section{
  background:#184d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  align-items:center;
  gap:10px;
  margin:6px 0;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timer{
  font-size:160px;
  color:#00ff99;
  font-weight:900;
}

.big{font-size:44px;margin:18px;}
.bank{font-size:40px;color:#ffd54a;}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🎾 PRO CLEAN</div>
<button id="kioskBtn">Kiosk</button>
</div>

<!-- PLAYERS -->
<div class="section">
<h3>Spieler auswählen</h3>
<div id="playerList"></div>
</div>

<!-- SETUP -->
<div class="section">
<h3>Setup</h3>

<label>Gesamtzeit:</label>
<select id="totalTime">
<option value="120">120 min</option>
<option value="180" selected>180 min</option>
</select>

<br><br>

<label>Matchzeit:</label>
<select id="matchTime">
<option value="15">15 min</option>
<option value="18" selected>18 min</option>
<option value="20">20 min</option>
</select>
</div>

<!-- MODE -->
<div class="section">
<h3>Modus</h3>
<button id="btnTurnier">🏆 Turnier</button>
<button id="btnGruppe">👥 Gruppe</button>
</div>

<div class="section">
<button id="btnGenerate">Spielplan erstellen</button>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timer">00:00</div>

<div id="mode" class="big"></div>
<div id="round" class="big"></div>
<div id="teams" class="big"></div>
<div id="bank" class="big"></div>

<button id="btnStart">Start</button>
<button id="btnNext">Next</button>
<button id="btnExit">Exit</button>

</div>

<script>

/* =====================
   SOUND
===================== */

const gong = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");

function speak(text){
  let u = new SpeechSynthesisUtterance(text);
  u.lang = "de-DE";
  speechSynthesis.speak(u);
}

/* =====================
   STATE
===================== */

let mode = "turnier";
let players = ["Marco","Stefan","David","Tobias","Chris","Werner"];
let selected = {};
let schedule = [];
let index = 0;
let timer = null;
let timeLeft = 0;
let finished = false;

/* =====================
   PLAYERS (SAFE DOM)
===================== */

function renderPlayers(){

  const box = document.getElementById("playerList");
  box.innerHTML = "";

  players.forEach((p,i)=>{

    selected[p] = true;

    const row = document.createElement("div");
    row.className = "playerRow";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = true;

    cb.addEventListener("change", ()=>{
      selected[p] = cb.checked;
    });

    const label = document.createElement("label");
    label.innerText = p;

    row.appendChild(cb);
    row.appendChild(label);

    box.appendChild(row);
  });
}

/* =====================
   ACTIVE PLAYERS
===================== */

function activePlayers(){
  return players.filter(p=>selected[p]);
}

/* =====================
   MODE
===================== */

function setMode(m){
  mode = m;
}

/* =====================
   GENERATE SAFE
===================== */

function generate(){

  const p = activePlayers();

  if(p.length < 4){
    alert("Mindestens 4 Spieler nötig!");
    return;
  }

  schedule = [];
  index = 0;

  const total = parseInt(document.getElementById("totalTime").value);
  const match = parseInt(document.getElementById("matchTime").value);

  const rounds = Math.floor(total / match);

  for(let r=0;r<rounds;r++){

    const pool = [...p].sort(()=>Math.random()-0.5);

    let a=[],b=[],bank=[];

    if(mode==="turnier"){

      if(p.length===5){
        bank=[pool[0]];
        let rest=pool.slice(1);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }
      else if(p.length===6){
        bank=[pool[0],pool[1]];
        let rest=pool.slice(2);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }
      else{
        a=[pool[0],pool[1]];
        b=[pool[2],pool[3]];
      }
    }

    if(mode==="gruppe"){

      if(p.length===6){
        const A=[p[0],p[1]];
        const B=[p[2],p[3]];
        const C=[p[4],p[5]];

        const rot=r%3;

        if(rot===0){a=A;b=B;bank=C;}
        if(rot===1){a=B;b=C;bank=A;}
        if(rot===2){a=C;b=A;bank=B;}
      }
      else{
        a=[p[0],p[1]];
        b=[p[2],p[3]];
      }
    }

    schedule.push({a,b,bank});
  }

  renderPreview();
  update();
}

/* =====================
   PREVIEW
===================== */

function renderPreview(){

  const box = document.getElementById("preview");
  box.innerHTML = "";

  schedule.forEach((s,i)=>{
    const div = document.createElement("div");
    div.innerHTML =
      `R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")} | Bank: ${s.bank.join(", ")||"keine"}`;
    box.appendChild(div);
  });
}

/* =====================
   UPDATE KIOSK
===================== */

function update(){

  const s = schedule[index];
  if(!s) return;

  document.getElementById("mode").innerText =
    mode==="turnier" ? "🏆 Turnier" : "👥 Gruppe";

  document.getElementById("round").innerText =
    "Runde " + (index+1);

  document.getElementById("teams").innerText =
    s.a.join(" / ") + " vs " + s.b.join(" / ");

  document.getElementById("bank").innerText =
    "Bank: " + (s.bank.join(", ")||"keine");
}

/* =====================
   KIOSK
===================== */

function enterKiosk(){
  document.body.classList.add("kioskMode");
}

function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =====================
   TIMER
===================== */

function startTimer(){

  timeLeft = parseInt(document.getElementById("matchTime").value)*60;

  clearInterval(timer);

  timer = setInterval(()=>{

    timeLeft--;

    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;
    if(s<10) s="0"+s;

    document.getElementById("timer").innerText = `${m}:${s}`;

    if(timeLeft<=0){
      clearInterval(timer);
      finished = true;
      gong.play();
      speak("Match beendet");
    }

  },1000);
}

/* =====================
   NEXT
===================== */

function nextMatch(){

  if(!finished) return;

  index++;

  if(index >= schedule.length) index = 0;

  finished = false;

  update();
}

/* =====================
   EVENTS (NO INLINE JS)
===================== */

document.getElementById("btnGenerate").addEventListener("click", generate);
document.getElementById("btnTurnier").addEventListener("click", ()=>setMode("turnier"));
document.getElementById("btnGruppe").addEventListener("click", ()=>setMode("gruppe"));
document.getElementById("btnStart").addEventListener("click", startTimer);
document.getElementById("btnNext").addEventListener("click", nextMatch);
document.getElementById("btnExit").addEventListener("click", exitKiosk);
document.getElementById("kioskBtn").addEventListener("click", enterKiosk);

/* INIT */
renderPlayers();

</script>

</body>
</html>
