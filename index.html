<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Manager FIX 5.2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{max-width:900px;margin:auto;padding-bottom:80px;}

.topbar{
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:16px 20px;
  margin:6px;
  font-weight:bold;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  cursor:pointer;
}

.mode-btn.active{box-shadow:0 0 10px #00ff99;}

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.playerRow{display:flex;gap:8px;margin:5px 0;}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:30px;
}

/* TIMER */
#timerBox{
  font-size:180px;
  font-weight:900;
  color:#00ff99;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 FIX 5.2</div>
  <button onclick="enterKiosk()">Kiosk</button>
</div>

<!-- ⚙️ SETTINGS FIX -->
<div class="section">
<h3>⚙️ Spielzeit Setup</h3>

<label>Gesamtzeit Spielabend:</label><br>
<select id="totalTime">
  <option value="120">120 min</option>
  <option value="180" selected>180 min</option>
</select>

<br><br>

<label>Matchzeit:</label><br>
<select id="matchTime">
  <option value="15">15 min</option>
  <option value="18" selected>18 min</option>
  <option value="20">20 min</option>
</select>

</div>

<!-- MODE -->
<div class="section">
<h3>Modus</h3>

<button id="btnTurnier" class="mode-btn active" onclick="setMode('turnier')">Turnier</button>
<button id="btnGruppen" class="mode-btn" onclick="setMode('gruppen')">Gruppen</button>

</div>

<!-- PLAYERS -->
<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<!-- PLAN -->
<div class="section">
<h3>Spielplan</h3>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<h1>🎾 KIOSK</h1>

<div id="timerBox">⏱ 00:00</div>

<div id="teams"></div>
<div id="bank"></div>
<div id="roundInfo"></div>

<br>

<button onclick="startTimer()">Start</button>
<button onclick="next()">Next</button>
<button onclick="exitKiosk()">Exit</button>

</div>

<script>

/* =========================
   STATE
========================= */

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Chris",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;

/* =========================
   TIMER STATE
========================= */

let timer=null;
let timeLeft=0;
let roundFinished=false;

/* =========================
   PLAYERS
========================= */

function renderPlayers(){

  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox"
        ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">

        <input type="text"
        value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>`;
  });
}

/* =========================
   MODE
========================= */

function setMode(m){

  mode=m;

  document.getElementById("btnTurnier").classList.remove("active");
  document.getElementById("btnGruppen").classList.remove("active");

  document.getElementById("btnTurnier").classList.add("active");

  generate();
}

/* =========================
   ACTIVE PLAYERS
========================= */

function list(){
  return players.filter(p=>p.active).map(p=>p.name);
}

/* =========================
   MATCH LOGIC (5 PLAYER FIX STABLE)
========================= */

function match(){

  let l=list();

  if(l.length===4){
    return {a:[l[0],l[1]],b:[l[2],l[3]],bank:[]};
  }

  if(l.length===5){
    let s=[...l].sort(()=>Math.random()-0.5);
    return {a:[s[0],s[1]],b:[s[2],s[3]],bank:[s[4]]};
  }

  if(l.length===6){
    let s=[...l].sort(()=>Math.random()-0.5);
    return {a:[s[0],s[1]],b:[s[2],s[3]],bank:[s[4],s[5]]};
  }

  return {a:[],b:[],bank:[]};
}

/* =========================
   GENERATE (FIXED)
========================= */

function generate(){

  schedule=[];
  index=0;

  let total=parseInt(document.getElementById("totalTime").value);
  let matchT=parseInt(document.getElementById("matchTime").value);

  let rounds=Math.max(1, Math.floor(total/matchT));

  for(let i=0;i<rounds;i++){
    schedule.push(match());
  }

  render();
  update();
}

/* =========================
   RENDER
========================= */

function render(){

  let html="<b>Spielplan</b><br><br>";

  schedule.forEach((s,i)=>{
    html+=`
      R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}<br>
      🪑 Bank: ${s.bank.join(", ") || "keine"}<br><br>
    `;
  });

  document.getElementById("preview").innerHTML=html;
}

/* =========================
   TIMER (MATCH TIME FIX)
========================= */

function startTimer(){

  let matchT=parseInt(document.getElementById("matchTime").value);

  timeLeft=matchT*60;
  roundFinished=false;

  clearInterval(timer);

  updateTimer();

  timer=setInterval(()=>{

    timeLeft--;

    updateTimer();

    if(timeLeft<=0){

      clearInterval(timer);
      timeLeft=0;
      updateTimer();

      roundFinished=true;
    }

  },1000);
}

function updateTimer(){

  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;
  if(s<10) s="0"+s;

  document.getElementById("timerBox").innerHTML=
    `⏱ ${m}:${s}`;
}

/* =========================
   CONTROL
========================= */

function next(){
  if(!roundFinished) return;

  index++;
  if(index>=schedule.length) index=0;

  roundFinished=false;

  update();
}

/* =========================
   UPDATE
========================= */

function update(){

  let s=schedule[index];
  if(!s) return;

  document.getElementById("teams").innerHTML=
    `A: ${s.a.join(" / ")}<br>B: ${s.b.join(" / ")}`;

  document.getElementById("bank").innerHTML=
    `Bank: ${s.bank.join(", ") || "keine"}`;

  document.getElementById("roundInfo").innerHTML=
    `Runde ${index+1}/${schedule.length}`;
}

/* =========================
   KIOSK
========================= */

function enterKiosk(){
  document.body.classList.add("kioskMode");
}

function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* INIT */
renderPlayers();
generate();

</script>

</body>
</html>
