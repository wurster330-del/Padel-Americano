<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Timer V0.2</title>

<style>
body{margin:0;background:#184b2f;color:#fff;font-family:Arial,sans-serif}
.wrap{max-width:1000px;margin:auto;padding:20px;text-align:center}
h1{margin:5px 0}
#round,#rest{font-size:26px;margin:4px}
#timer{font-size:160px;font-weight:bold;margin:10px 0}
.row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:10px 0}
button{font-size:20px;padding:12px 18px;border:none;border-radius:10px;background:#2e8b57;color:#fff;cursor:pointer}
.panel{background:#255d3d;border-radius:12px;padding:16px;margin-top:18px}
.teams{display:flex;justify-content:space-around;flex-wrap:wrap}
.team{font-size:26px}
.pause{margin-top:10px;font-size:22px}
input{padding:6px;border-radius:6px;border:none;margin:2px;width:120px}
</style>
</head>

<body>
<div class="wrap">
<h1>🎾 Padel Timer V0.2</h1>

<div id="round">Runde 1</div>
<div id="rest">Restzeit: 180 Min</div>
<div id="timer">18:00</div>

<div class="row">
<button onclick="start()">▶ Start</button>
<button onclick="pauseT()">⏸ Pause</button>
<button onclick="resetT()">⏹ Reset</button>
</div>

<div class="row">
<button onclick="setGame(15)">15</button>
<button onclick="setGame(18)">18</button>
<button onclick="setGame(20)">20</button>
<button onclick="customGame()">Custom</button>
</div>

<div class="row">
<button onclick="setPlayers(4)">4</button>
<button onclick="setPlayers(5)">5</button>
<button onclick="setPlayers(6)">6</button>
</div>

<div class="row">
<button onclick="nextPairing()">🔄 Neue Paarung</button>
<button onclick="swapTeams()">🔁 Tausch</button>
<button onclick="editNames()">✏ Namen</button>
</div>

<div class="panel">
<div class="teams">
<div class="team" id="teamA"></div>
<div class="team" id="teamB"></div>
</div>
<div class="pause" id="bench"></div>
</div>
</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
preload="auto"></audio>

<script>
let gameMin=18,total=1080,remain=1080,t=null,round=1;
let players=["Tobias","Werner","Christian","Stefan","David","Marco"];
let rotationIndex=0;

function save(){
localStorage.setItem("padel_v02", JSON.stringify({players,gameMin,round,rotationIndex}));
}

function load(){
let d=localStorage.getItem("padel_v02");
if(d){
let s=JSON.parse(d);
players=s.players||players;
gameMin=s.gameMin||gameMin;
round=s.round||round;
rotationIndex=s.rotationIndex||0;
total=gameMin*60;
remain=total;
}
}

function draw(){
let m=Math.floor(remain/60),s=remain%60;
timer.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
roundEl.textContent="Runde "+round;
rest.textContent="Restzeit: "+Math.floor(remain/60)+" Min";

let a=players.slice(rotationIndex,rotationIndex+2);
let b=players.slice(rotationIndex+2,rotationIndex+4);
let bench=players.slice(4);

teamA.innerHTML="<b>TEAM A</b><br>"+(a.join("<br>")||"-");
teamB.innerHTML="<b>TEAM B</b><br>"+(b.join("<br>")||"-");
benchEl.innerHTML="<b>Bank</b><br>"+bench.join("<br>");

save();
}

function tick(){
if(remain>0){
remain--;draw();
}else{
pauseT();
document.getElementById("beep").play();
alert("Zeit vorbei");
}
}

function start(){if(!t)t=setInterval(tick,1000);}
function pauseT(){clearInterval(t);t=null;}
function resetT(){pauseT();remain=total;draw();}

function setGame(m){
gameMin=m;total=m*60;remain=total;draw();save();
}

function customGame(){
let m=parseInt(prompt("Minuten"));
if(m>0)setGame(m);
}

function setPlayers(n){
players=players.slice(0,n);
draw();
save();
}

function nextPairing(){
rotationIndex+=2;
if(rotationIndex>=players.length)rotationIndex=0;
round++;
draw();
}

function swapTeams(){
[players[0],players[2]]=[players[2],players[0]];
draw();
}

function editNames(){
for(let i=0;i<players.length;i++){
let n=prompt("Name "+(i+1),players[i]);
if(n)players[i]=n;
}
draw();
}

load();

let teamA=document.getElementById("teamA");
let teamB=document.getElementById("teamB");
let benchEl=document.getElementById("bench");
let roundEl=document.getElementById("round");

draw();
</script>

</body>
</html>
