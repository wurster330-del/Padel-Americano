<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V3.1 UPGRADE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071f14;
  color:white;
}

#wrap{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
  cursor:pointer;
}

.bigTimer{
  font-size:65px;
  text-align:center;
  font-weight:bold;
}

.teamBox{
  font-size:22px;
  font-weight:bold;
  margin:8px 0;
}

.small{
  opacity:0.8;
  font-size:14px;
}

.statBox{
  font-size:13px;
  opacity:0.85;
  margin-top:8px;
  line-height:1.4em;
}

.warning{
  color:red;
  text-align:center;
  display:none;
  font-weight:bold;
}
.blink{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.2;}}
</style>
</head>

<body>

<div id="wrap">

<h2>🎾 Padel Terminal V3.1 – UPGRADE</h2>

<div class="panel">
<button onclick="generate()">🏆 Turnier neu berechnen</button>
<button onclick="resetStats()">♻ Statistik reset</button>
</div>

<div class="panel">
<div id="court"></div>
</div>

<div class="panel">
<div class="bigTimer" id="matchTimer">18:00</div>

<div style="text-align:center;">
<button onclick="start()">▶ Start</button>
<button onclick="pause()">⏸ Pause</button>
<button onclick="next()">➡ Next</button>
</div>

<div class="warning" id="warn">⚠ 30 Sekunden</div>
</div>

<div class="panel">
<div class="bigTimer" id="eventTimer">120:00</div>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= PLAYERS ================= */

let players=["Tobias","Werner","Christian","Stefan","David","Marco"];

/* ================= STATS ================= */

let stats={};

players.forEach(p=>{
 stats[p]={games:0,pause:0,partners:{}};
});

/* ================= SCHEDULE ================= */

let schedule=[];
let index=0;

/* ================= TIMER ================= */

let match=18*60;
let event=120*60;

let run=null;

/* ================= SCORE ENGINE ================= */

function scorePair(a,b){
 return stats[a].partners[b]||0;
}

/* ================= GENERATOR (FAIR) ================= */

function generate(){

 schedule=[];

 let pool=[...players];

 for(let r=0;r<players.length;r++){

  let best=null;
  let bestScore=99999;

  let rot=[...pool.slice(r),...pool.slice(0,r)];

  let a=[rot[0],rot[1]];
  let b=[rot[2],rot[3]];
  let bank=rot.slice(4);

  let score=0;

  // Partner-Belastung prüfen
  score+=scorePair(a[0],a[1]);
  score+=scorePair(b[0],b[1]);

  if(score<bestScore){
   bestScore=score;
   best={a,b,bank,round:r+1};
  }

  schedule.push(best);

  // STATS update
  updateStats(best);
 }

 render();
}

/* ================= UPDATE STATS ================= */

function updateStats(s){

 s.a.forEach(p=>{
  stats[p].games++;
  s.a.forEach(q=>{
   if(p!==q){
    stats[p].partners[q]=(stats[p].partners[q]||0)+1;
   }
  });
 });

 s.b.forEach(p=>{
  stats[p].games++;
  s.b.forEach(q=>{
   if(p!==q){
    stats[p].partners[q]=(stats[p].partners[q]||0)+1;
   }
  });
 });

 s.bank.forEach(p=>{
  stats[p].pause++;
 });
}

/* ================= CONTROL ================= */

function start(){

 if(run) return;

 run=setInterval(()=>{

  match--;
  event--;

  if(match===30){
   warn.style.display="block";
   beep();
  }

  if(match<=0){
   beep(); beep();
   next();
  }

  render();

 },1000);
}

function pause(){
 clearInterval(run);
 run=null;
}

function next(){
 index++;
 if(index>=schedule.length) index=0;
 match=18*60;
 render();
}

/* ================= RESET STATS ================= */

function resetStats(){
 players.forEach(p=>{
  stats[p]={games:0,pause:0,partners:{}};
 });
 alert("Stats zurückgesetzt");
}

/* ================= RENDER ================= */

function render(){

 let c=document.getElementById("court");
 c.innerHTML="";

 if(!schedule.length){
  c.innerHTML="Kein Turnier";
  return;
 }

 let s=schedule[index];

 c.innerHTML=`
  <div class="teamBox">TEAM A: ${s.a.join(" | ")}</div>
  <div class="teamBox">TEAM B: ${s.b.join(" | ")}</div>
  <div class="small">Pause: ${s.bank.join(" | ")||"-"}</div>

  <div class="statBox">
   📊 STATISTIK:<br>
   ${players.map(p=>
    `${p}: ${stats[p].games} Spiele / ${stats[p].pause} Pausen`
   ).join("<br>")}
  </div>
 `;

 matchTimer.textContent=Math.floor(match/60)+":"+String(match%60).padStart(2,"0");
 eventTimer.textContent=Math.floor(event/60)+":"+String(event%60).padStart(2,"0");
}

/* ================= INIT ================= */

generate();
render();

</script>

</body>
</html>
