<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Americano V5.0.0 Build 7.0.0 Beta</title>
<style>
body{font-family:Arial;margin:10px}
.card{border:1px solid #ccc;border-radius:8px;padding:10px;margin:10px 0}
button,input,textarea,select{font-size:18px;margin:4px}
#timer{font-size:64px;font-weight:bold;text-align:center}
</style>
</head>
<body>
<h1>🎾 Padel Americano V5.0.0 Build 7.0.0 Beta</h1>

<div class="card">
<h3>Spieler (4–12)</h3>
<textarea id="players" rows="8" style="width:100%">Werner
Tobias
Marco
Stefan
Christian
David</textarea><br>

<h3>Maximale Turnierdauer</h3>
<select id="duration">
<option value="120">120 Minuten</option>
<option value="150">150 Minuten</option>
<option value="180" selected>180 Minuten</option>
</select>

<button onclick="generateTournament()">🎲 Turnier erzeugen</button>
</div>

<div class="card">
<h3>⏱ Match-Timer</h3>
<div id="timer">18:00</div>
</div>

<div class="card">
<h3>📋 Spielplan</h3>
<div id="schedule"></div>
</div>

<div class="card">
<h3>📊 Fairness</h3>
<div id="fairness"></div>
</div>

<div class="card">
<h3>🏆 Rangliste</h3>
<div id="ranking"></div>
</div>

<script>
let ranking={};

function getPlayers(){
 return players.value.split('\n').map(x=>x.trim()).filter(Boolean);
}

function generateTournament(){
 const p=getPlayers();
 if(p.length<4 || p.length>12){
   alert('4 bis 12 Spieler erforderlich');
   return;
 }

 ranking={};
 p.forEach(x=>ranking[x]=0);

 const totalMinutes=parseInt(duration.value);
 const matchMinutes=18;

 let rounds=Math.floor(totalMinutes/matchMinutes);

 // Spezielle Anforderung: 6 Spieler max 180 Minuten
 if(p.length===6){
   rounds=Math.min(rounds,10); // 10 x 18 = 180
 }

 let html='';
 let partnerSet=new Set();
 let opponentSet=new Set();

 for(let r=0;r<rounds;r++){
   const a=p[r%p.length];
   const b=p[(r+1)%p.length];
   const c=p[(r+2)%p.length];
   const d=p[(r+3)%p.length];

   partnerSet.add([a,b].sort().join('|'));
   partnerSet.add([c,d].sort().join('|'));
   opponentSet.add([a,c].sort().join('|'));

   html += `<div>Runde ${r+1}: ${a} / ${b} vs ${c} / ${d}</div>`;
 }

 schedule.innerHTML=html;

 let fairness=Math.min(100,50+partnerSet.size*3+opponentSet.size);

 fairness.innerHTML=`Fairness: ${fairness}/100`;

 document.getElementById('fairness').innerHTML =
   `<b>Fairness:</b> ${fairness}/100<br>
    Partnerkombinationen: ${partnerSet.size}<br>
    Gegnerkombinationen: ${opponentSet.size}<br>
    Geplante Runden: ${rounds}<br>
    Turnierdauer: ${rounds*matchMinutes} Minuten`;

 renderRanking();
}

function renderRanking(){
 let rows=Object.keys(ranking)
 .map(p=>`<div>${p}: 0 Punkte</div>`).join('');
 ranking.innerHTML=rows;
}

generateTournament();
</script>
</body>
</html>
