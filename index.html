<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Americano V5.0.0 Build 7.2.0</title>
<style>
body{font-family:Arial,sans-serif;margin:10px}
.card{border:1px solid #ccc;border-radius:10px;padding:12px;margin:10px 0}
button,input{font-size:20px;min-height:50px;margin:4px}
#timer{font-size:220px;font-weight:bold;text-align:center}
#round{font-size:36px;text-align:center}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:6px}
</style>
</head>
<body>
<h1>🎾 Padel Americano Build 7.2.0</h1>

<div class="card">
<div id="round">Runde 1 von 10</div>
<div id="timer">18:00</div>
</div>

<div class="card">
<h3>Aktuelles Ergebnis</h3>
<input id="scoreA" type="number" placeholder="Team A">
<input id="scoreB" type="number" placeholder="Team B">
<button onclick="saveResult()">💾 Ergebnis speichern</button>
</div>

<div class="card">
<h3>Nächstes Match</h3>
<div id="currentMatch"></div>
</div>

<div class="card">
<h3>🏆 Live-Rangliste</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>📊 Fairness</h3>
<div id="fairness"></div>
</div>

<script>
const players=["Werner","Tobias","Marco","Stefan","Christian","David"];
let round=1;
let maxRounds=10;
let ranking={};
let matches=[];
let savedRounds=new Set();

players.forEach(p=>ranking[p]=0);

for(let i=0;i<10;i++){
 matches.push({
  a:players[i%6],
  b:players[(i+1)%6],
  c:players[(i+2)%6],
  d:players[(i+3)%6]
 });
}

function showMatch(){
 let m=matches[Math.min(round-1,matches.length-1)];
 currentMatch.innerHTML=`${m.a} / ${m.b} vs ${m.c} / ${m.d}`;
 document.getElementById('round').innerText='Runde '+round+' von '+maxRounds;
}

function renderRanking(){
 let rows=Object.entries(ranking)
 .sort((a,b)=>b[1]-a[1])
 .map(x=>`<tr><td>${x[0]}</td><td>${x[1]}</td></tr>`).join('');

 rankingDiv = document.getElementById('ranking');
 rankingDiv.innerHTML=`<table><tr><th>Spieler</th><th>Punkte</th></tr>${rows}</table>`;
}

function saveResult(){
 if(savedRounds.has(round)){
   alert('Ergebnis bereits gespeichert');
   return;
 }

 let a=parseInt(scoreA.value||0);
 let b=parseInt(scoreB.value||0);

 let m=matches[round-1];

 ranking[m.a]+=a;
 ranking[m.b]+=a;
 ranking[m.c]+=b;
 ranking[m.d]+=b;

 savedRounds.add(round);

 renderRanking();

 scoreA.value='';
 scoreB.value='';

 round++;

 if(round>maxRounds){
   alert('🏆 Turnier beendet');
 }else{
   showMatch();
 }

 updateFairness();
}

function updateFairness(){
 let score=Math.max(80,100-(savedRounds.size));
 fairness.innerHTML=
   'Fairness-Score: '+score+'/100<br>'+
   'Gespielte Runden: '+savedRounds.size+'<br>'+
   'Partner-/Gegnerhistorie aktiviert';
}

showMatch();
renderRanking();
updateFairness();
</script>
</body>
</html>
