<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Padel Club Terminal V10 MASTER</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#04130d;
  color:white;
}

#app{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

.panel{
  background:#1a5335;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
  font-size:16px;
}

.timer{
  font-size:80px;
  text-align:center;
  font-weight:900;
}

.warning{
  color:red;
  text-align:center;
  display:none;
  font-weight:bold;
}

.playerRow{
  display:flex;
  gap:10px;
  margin:6px 0;
}

input[type="text"]{
  flex:1;
  padding:6px;
}

.teamBox{
  font-size:22px;
  font-weight:900;
  text-align:center;
  margin:6px;
}

/* KIOSK */
.kiosk #app{ display:none; }
.kiosk #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:40px;
}

.kioskTimer{
  font-size:180px;
  font-weight:900;
  color:#00ff99;
}

.kioskTeam{
  font-size:50px;
  font-weight:900;
  margin:15px;
}

.kioskSmall{
  opacity:0.7;
  font-size:24px;
}

/* CONTROL */
.controlBar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#0d3a25;
  display:flex;
  justify-content:center;
  padding:10px;
  gap:10px;
}

/* PIN */
#pinOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.92);
  z-index:9999;
  text-align:center;
  padding-top:120px;
}
</style>
</head>

<body>

<div id="app">

<h1>🎾 V10 MASTER</h1>

<div class="panel">
<button onclick="enterKiosk()">📺 Kiosk</button>
<button onclick="generate()">🏆 Turnier erstellen</button>
</div>

<div class="panel">
<h3>⏱ Timer</h3>
<div class="timer" id="timer">18:00</div>
<div class="warning" id="warning">⚠ 30 SEKUNDEN</div>
</div>

<div class="panel">
<h3>👥 Spieler</h3>
<div id="players"></div>
</div>

<div class="panel">
<h3>🎾 Court</h3>
<div id="court">Kein Turnier</div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">
  <div class="kioskTimer" id="kioskTimer">18:00</div>
  <div class="kioskTeam" id="kioskA"></div>
  <div class="kioskTeam" id="kioskB"></div>
  <div class="kioskTeam" id="kioskBank"></div>
  <div class="kioskSmall" id="kioskInfo"></div>
</div>

<!-- CONTROL -->
<div class="controlBar">
<button onclick="startTimer()">▶ Start</button>
<button onclick="pauseTimer()">⏸ Pause</button>
<button onclick="nextMatch()">➡ Next</button>
<button onclick="openPin()">🔒 Exit</button>
</div>

<!-- PIN -->
<div id="pinOverlay">
  <h2>🔐 PIN</h2>
  <input id="pinInput" type="password" style="font-size:28px;padding:10px;">
  <br><br>
  <button onclick="checkPin()">OK</button>
  <button onclick="closePin()">Abbrechen</button>
</div>

<script>

/* ================= PLAYERS ================= */

let players = [
  {name:"Marco", active:true},
  {name:"Stefan", active:true},
  {name:"David", active:true},
  {name:"Tobias", active:true},
  {name:"Christian", active:true},
  {name:"Werner", active:true}
];

let schedule = [];
let index = 0;

/* ================= TIMER ================= */

let matchMinutes = 18;
let breakMinutes = 2;
let matchTime = matchMinutes * 60;
let run = null;
let finished = false;

/* ================= UI PLAYERS ================= */

function renderPlayers(){
  let box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach((p,i)=>{
    box.innerHTML += `
      <div class="playerRow">
        <input type="checkbox" ${p.active?"checked":""}
          onchange="players[${i}].active=this.checked">

        <input type="text" value="${p.name}"
          onchange="players[${i}].name=this.value">
      </div>
    `;
  });
}

renderPlayers();

/* ================= GENERATE ================= */

function generate(){

  let list = players.filter(p=>p.active).map(p=>p.name);

  if(list.length < 4){
    alert("Mindestens 4 Spieler nötig");
    return;
  }

  schedule = [];
  index = 0;

  let eventMinutes = (list.length === 4) ? 120 : 180;
  let roundMinutes = matchMinutes + breakMinutes;

  let rounds = Math.floor(eventMinutes / roundMinutes);
  if(rounds < 3) rounds = 3;

  for(let r=0;r<rounds;r++){

    list = list.sort(()=>Math.random()-0.5);

    let a = [list[0], list[1]];
    let b = [list[2], list[3]];
    let bank = list.slice(4);

    schedule.push({round:r+1,a,b,bank});
  }

  update();
}

/* ================= TIMER ================= */

function startTimer(){
  if(run || finished) return;

  run = setInterval(()=>{

    if(matchTime > 0) matchTime--;

    if(matchTime === 30){
      document.getElementById("warning").style.display="block";
    }

    if(matchTime <= 0){
      matchTime = 0;
      finishMatch();
      return;
    }

    update();

  },1000);
}

function pauseTimer(){
  clearInterval(run);
  run = null;
}

function finishMatch(){
  clearInterval(run);
  run = null;
  finished = true;
  update();
}

/* ================= NEXT MATCH ================= */

function nextMatch(){

  index++;
  if(index >= schedule.length) index = 0;

  matchTime = matchMinutes * 60;
  finished = false;

  document.getElementById("warning").style.display="none";

  update();
}

/* ================= UPDATE ================= */

function update(){

  let t = Math.floor(matchTime/60)+":"+String(matchTime%60).padStart(2,"0");

  document.getElementById("timer").textContent = t;
  document.getElementById("kioskTimer").textContent = t;

  if(schedule.length === 0) return;

  let s = schedule[index];

  document.getElementById("court").innerHTML =
    `<div class="teamBox">A: ${s.a.join(" / ")}</div>
     <div class="teamBox">B: ${s.b.join(" / ")}</div>
     <div class="teamBox">BANK: ${s.bank.join(" / ") || "-"}</div>
     <div class="teamBox">RUNDE ${s.round}/${schedule.length}</div>
     <div class="teamBox">${finished ? "🏁 MATCH BEENDET" : ""}</div>`;

  document.getElementById("kioskA").textContent = "A: " + s.a.join(" / ");
  document.getElementById("kioskB").textContent = "B: " + s.b.join(" / ");
  document.getElementById("kioskBank").textContent = "BANK: " + (s.bank.join(" / ") || "-");
  document.getElementById("kioskInfo").textContent =
    "Runde " + s.round + " / " + schedule.length +
    (finished ? " | ENDE" : "");
}

/* ================= KIOSK ================= */

function enterKiosk(){
  document.body.classList.add("kiosk");
  document.documentElement.requestFullscreen?.();
  update();
}

/* ================= PIN ================= */

const PIN = "1234";

function openPin(){
  document.getElementById("pinOverlay").style.display="block";
}

function closePin(){
  document.getElementById("pinOverlay").style.display="none";
  document.getElementById("pinInput").value="";
}

function checkPin(){
  if(document.getElementById("pinInput").value === PIN){
    document.body.classList.remove("kiosk");
  }
  closePin();
}

</script>

</body>
</html>
