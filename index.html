<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Manager V12 GROUP FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f16;
  color:white;
}

#app{max-width:1000px;margin:auto;padding-bottom:80px;}

.topbar{
  position:sticky;
  top:0;
  background:#123b28;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:16px 20px;
  margin:6px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  background:#1f6f4a;
  color:white;
  cursor:pointer;
}

.mode-btn.active{
  box-shadow:0 0 12px #00ff99;
}

.section{
  background:#184d35;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

.playerRow{
  display:flex;
  gap:10px;
  margin:6px 0;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timerBox{
  font-size:200px;
  font-weight:900;
  color:#00ff99;
  text-shadow:0 0 20px #00ff99;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 V12 GROUP FIX</div>
  <button onclick="enterKiosk()">Kiosk</button>
</div>

<!-- SETUP -->
<div class="section">
<h3>⚙️ Setup</h3>

<label>Gesamtzeit:</label><br>
<select id="totalTime">
  <option value="120">120 min</option>
  <option value="180" selected>180 min</option>
</select>

<br><br>

<label>Matchzeit:</label><br>
<select id="matchTime">
  <option value="15">15 min</option>
  <option value="18" selected>18 min</option>
  <option value="20">20 min</option>
</select>

</div>

<!-- MODE -->
<div class="section">
<h3>Modus</h3>

<button id="btnTurnier" class="mode-btn active" onclick="setMode('turnier')">🏆 Turnier</button>
<button id="btnGruppen" class="mode-btn" onclick="setMode('gruppen')">👥 Gruppe</button>

</div>

<!-- PLAYERS -->
<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<!-- PLAN -->
<div class="section">
<h3>Spielplan</h3>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<h1>🎾 KIOSK</h1>

<div id="timerBox">⏱ 00:00</div>

<div id="modeBox"></div>
<div id="roundBox"></div>
<div id="teamsBox"></div>
<div id="bankBox"></div>

<br>

<button onclick="startTimer()">Start</button>
<button onclick="nextMatch()">Next</button>
<button onclick="exitKiosk()">Exit</button>

</div>

<script>

/* =====================
   STATE
===================== */

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Chris",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;

/* =====================
   GROUP STATE (FIXED TEAMS)
===================== */

let groupTeams=null;

/* =====================
   SYSTEM
===================== */

let freeze=false;
let lock=false;
let timer=null;
let timeLeft=0;
let finished=false;

/* =====================
   PLAYERS
===================== */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox"
          ${p.active?"checked":""}
          onchange="players[${i}].active=this.checked">

        <input type="text"
          value="${p.name}"
          onchange="players[${i}].name=this.value">
      </div>`;
  });
}

function active(){
  return players.filter(p=>p.active).map(p=>p.name);
}

/* =====================
   MODE SWITCH
===================== */

function setMode(m){

  if(lock) return;

  mode=m;

  document.getElementById("btnTurnier").classList.remove("active");
  document.getElementById("btnGruppen").classList.remove("active");

  if(m==="turnier")
    document.getElementById("btnTurnier").classList.add("active");

  if(m==="gruppen")
    document.getElementById("btnGruppen").classList.add("active");

  generate();
}

/* =====================
   TURNIER (simple stable)
===================== */

function buildTurnier(){

  let l=active();

  let s=[...l].sort(()=>Math.random()-0.5);

  if(l.length===4)
    return {a:[s[0],s[1]],b:[s[2],s[3]],bank:[]};

  if(l.length===5)
    return {a:[s[0],s[1]],b:[s[2],s[3]],bank:[s[4]]};

  if(l.length===6)
    return {a:[s[0],s[1]],b:[s[2],s[3]],bank:[s[4],s[5]]};

  return {a:[],b:[],bank:[]};
}

/* =====================
   GROUP TEAM GENERATION (ONCE)
===================== */

function generateGroupTeams(){

  let l=active();

  if(l.length===4){
    return [[l[0],l[1]],[l[2],l[3]]];
  }

  if(l.length===6){
    return [[l[0],l[1]],[l[2],l[3]],[l[4],l[5]]];
  }

  return [];
}

/* =====================
   GROUP FIXED LOGIC
===================== */

function buildGruppe(){

  if(!groupTeams){
    groupTeams = generateGroupTeams();
  }

  let t=groupTeams;

  if(t.length===2){
    return {a:t[0],b:t[1],bank:[]};
  }

  if(t.length===3){

    let order=[0,1,2].sort(()=>Math.random()-0.5);

    return {
      a:t[order[0]],
      b:t[order[1]],
      bank:[...t[order[2]]]
    };
  }

  return {a:[],b:[],bank:[]};
}

/* =====================
   GENERATE
===================== */

function generate(){

  if(freeze) return;

  schedule=[];
  index=0;

  groupTeams=null;

  let total=parseInt(document.getElementById("totalTime").value);
  let match=parseInt(document.getElementById("matchTime").value);

  let rounds=Math.max(1,Math.floor(total/match));

  for(let i=0;i<rounds;i++){

    if(mode==="turnier")
      schedule.push(buildTurnier());

    if(mode==="gruppen")
      schedule.push(buildGruppe());
  }

  render();
  update();
}

/* =====================
   RENDER
===================== */

function render(){

  let html="";

  schedule.forEach((s,i)=>{
    html+=`
      R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}<br>
      Bank: ${s.bank.join(", ") || "keine"}<br><br>
    `;
  });

  document.getElementById("preview").innerHTML=html;
}

/* =====================
   KIOSK
===================== */

function enterKiosk(){
  document.body.classList.add("kioskMode");
}

function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =====================
   TIMER
===================== */

function startTimer(){

  freeze=true;
  lock=true;

  let t=parseInt(document.getElementById("matchTime").value);

  timeLeft=t*60;
  finished=false;

  clearInterval(timer);

  updateTimer();

  timer=setInterval(()=>{

    timeLeft--;
    updateTimer();

    if(timeLeft<=0){
      clearInterval(timer);
      finished=true;
    }

  },1000);
}

function updateTimer(){

  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;
  if(s<10) s="0"+s;

  document.getElementById("timerBox").innerHTML=
    `⏱ ${m}:${s}`;
}

/* =====================
   NEXT
===================== */

function nextMatch(){

  if(!finished) return;

  index++;

  if(index>=schedule.length)
    index=0;

  finished=false;

  update();
}

/* =====================
   UPDATE
===================== */

function update(){

  let s=schedule[index];
  if(!s) return;

  document.getElementById("modeBox").innerHTML=
    mode==="turnier"?"🏆 TURNIER":"👥 GRUPPE";

  document.getElementById("roundBox").innerHTML=
    `Runde ${index+1}/${schedule.length}`;

  document.getElementById("teamsBox").innerHTML=
    `A: ${s.a.join(" / ")}<br>B: ${s.b.join(" / ")}`;

  document.getElementById("bankBox").innerHTML=
    `Bank: ${s.bank.join(", ") || "keine"}`;
}

/* =====================
   INIT
===================== */

renderPlayers();
generate();

</script>

</body>
</html>
