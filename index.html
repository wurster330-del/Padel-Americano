<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Manager V4</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

input, select, button {
    width:90%;
    padding:10px;
    margin:5px;
    font-size:18px;
}

button {
    background:#222;
    color:white;
    border:none;
    border-radius:8px;
}

.timer {
    font-size:55px;
    margin:10px;
}

.box {
    margin:10px;
    padding:10px;
    background:#1a1a1a;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>Padel Manager V4 (Fair Engine)</h2>

<div id="setup">

<input id="p1" placeholder="Spieler 1">
<input id="p2" placeholder="Spieler 2">
<input id="p3" placeholder="Spieler 3">
<input id="p4" placeholder="Spieler 4">
<input id="p5" placeholder="Spieler 5">
<input id="p6" placeholder="Spieler 6">

<select id="count">
<option value="4">4 Spieler</option>
<option value="5">5 Spieler</option>
<option value="6">6 Spieler</option>
</select>

<select id="sessionTime">
<option value="120">120 Minuten Gesamtzeit</option>
<option value="180">180 Minuten Gesamtzeit</option>
</select>

<select id="matchTime">
<option value="15">15 Minuten Matchzeit</option>
<option value="20" selected>20 Minuten Matchzeit</option>
<option value="25">25 Minuten Matchzeit</option>
</select>

<button onclick="start()">Spiel starten</button>

</div>

<div id="game" style="display:none">

<div class="timer" id="sessionTimer">00:00:00</div>

<div class="box">
<b>Match Timer</b>
<div class="timer" id="matchTimer">00:00</div>
</div>

<div class="box">
<b>Runde:</b> <span id="round">1</span>
</div>

<div class="box" id="current"></div>
<div class="box" id="next"></div>

<button onclick="toggle()">Start / Pause</button>
<button onclick="nextRound()">Nächste Runde</button>

</div>

<script>

let players=[];
let stats={};

let schedule=[];
let current=0;
let round=1;

let sessionTime=0;
let sessionLeft=0;

let matchTime=0;
let matchLeft=0;

let running=false;
let interval;
let matchInterval;

function start(){

players=[
p1.value,p2.value,p3.value,p4.value,p5.value,p6.value
].filter(x=>x);

players=players.slice(0,parseInt(count.value));

players.forEach(p=>{
stats[p]={partner:{},enemy:{},bench:0};
});

sessionTime=parseInt(sessionTime.value)*60;
sessionLeft=sessionTime;

matchTime=parseInt(matchTime.value)*60;
matchLeft=matchTime;

buildSchedule();

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

render();
startMatch();
}

function bestPair(pool){

let best=null;
let bestScore=9999;

for(let i=0;i<pool.length;i++){
for(let j=i+1;j<pool.length;j++){

let a=pool[i];
let b=pool[j];

let score=(stats[a].partner[b]||0);

if(score<bestScore){
bestScore=score;
best=[a,b];
}
}
}

return best;
}

function buildSchedule(){

schedule=[];

let pool=[...players];

for(let i=0;i<10;i++){

let bench=[];
let active=[...pool];

if(active.length===6){
bench=[active.pop()];
}

let teamA=bestPair(active);
active=active.filter(p=>!teamA.includes(p));

let teamB=bestPair(active);

schedule.push({
a:teamA,
b:teamB,
bench:bench
});

// stats update (preview learning)
stats[teamA[0]].partner[teamA[1]]=(stats[teamA[0]].partner[teamA[1]]||0)+1;
stats[teamB[0]].partner[teamB[1]]=(stats[teamB[0]].partner[teamB[1]]||0)+1;

}
}

function render(){

let g=schedule[current];

document.getElementById("round").innerText=round;

document.getElementById("current").innerHTML=
"<b>JETZT</b><br>"+
"A: "+g.a.join(" + ")+"<br>"+
"B: "+g.b.join(" + ")+"<br>"+
(g.bench.length?"Pause: "+g.bench:"");

let next=schedule[current+1];

document.getElementById("next").innerHTML=
next?
"<b>NÄCHSTES MATCH</b><br>"+
"A: "+next.a.join(" + ")+"<br>"+
"B: "+next.b.join(" + ")+"<br>"+
(next.bench.length?"Pause: "+next.bench:"")
:
"<b>NÄCHSTES MATCH</b><br>— Ende —";
}

function toggle(){

if(running){
clearInterval(interval);
clearInterval(matchInterval);
running=false;
}else{
interval=setInterval(()=>{
if(sessionLeft>0){
sessionLeft--;
document.getElementById("sessionTimer").innerText=format(sessionLeft);
}
},1000);

startMatch();
running=true;
}
}

function startMatch(){

clearInterval(matchInterval);

matchLeft=matchTime;

matchInterval=setInterval(()=>{
if(matchLeft>0){
matchLeft--;
document.getElementById("matchTimer").innerText=format(matchLeft);
}else{
clearInterval(matchInterval);
}
},1000);
}

function nextRound(){

if(current < schedule.length-1){

current++;
round++;

startMatch();
render();
}
}

function format(s){
let h=String(Math.floor(s/3600)).padStart(2,"0");
let m=String(Math.floor((s%3600)/60)).padStart(2,"0");
let sec=String(s%60).padStart(2,"0");
return h+":"+m+":"+sec;
}

</script>

</body>
</html>
