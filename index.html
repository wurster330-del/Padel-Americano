<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel-Götter V2.1 Group FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{padding:12px;}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.player{
  display:flex;
  gap:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="app">

<h2>🏆 Padel-Götter V2.1 GROUP FIX</h2>

<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="setMode('turnier')">Turnier</button>
<button onclick="setMode('gruppe')">Gruppe</button>
</div>

<div class="section">
<h3>Zeit</h3>

<label>Gesamtzeit</label>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<br><br>

<label>Matchzeit</label>
<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<div class="section">
<button onclick="generate()">Spielplan erstellen</button>
<button onclick="remix()">Neu mischen</button>
</div>

<div class="section">
<h3>Spielplan</h3>
<div id="output"></div>
</div>

</div>

<script>

/* =====================
   STATE
===================== */

let mode = "turnier";

let players = ["Marco","Stefan","David","Tobias","Chris","Werner"];
let active = {};

let schedule = [];

/* =====================
   INIT
===================== */

function init(){
  let box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p=>{
    active[p] = true;

    let row = document.createElement("div");
    row.className = "player";

    let cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = true;
    cb.onchange = ()=> active[p] = cb.checked;

    row.appendChild(cb);
    row.appendChild(document.createTextNode(p));

    box.appendChild(row);
  });
}

/* =====================
   HELPERS (IMPORTANT FIX)
===================== */

function getPlayers(){
  return players.filter(p=>active[p]);
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

/* =====================
   MODE
===================== */

function setMode(m){
  mode = m;
}

/* =====================
   TURNIER
===================== */

function turnierRound(p){

  let pool = shuffle(p);

  let a = [pool[0], pool[1]];
  let b = [pool[2], pool[3]];

  let bank = [];

  if(pool.length === 6){
    bank = [pool[4], pool[5]];
  } else if(pool.length === 5){
    bank = [pool[4]];
  }

  return {a,b,bank};
}

/* =====================
   GRUPPE (FIXED ROTATION)
===================== */

function groupRound(p,r){

  let pool = shuffle(p); // 🔥 FIX: JEDER CALL NEU RANDOM

  if(pool.length === 4){
    return {a:[pool[0],pool[1]], b:[pool[2],pool[3]], bank:[]};
  }

  if(pool.length === 5){
    return (r % 2 === 0)
      ? {a:[pool[0],pool[1]], b:[pool[2],pool[3]], bank:[pool[4]]}
      : {a:[pool[1],pool[2]], b:[pool[3],pool[4]], bank:[pool[0]]};
  }

  if(pool.length === 6){

    const A = [pool[0],pool[1]];
    const B = [pool[2],pool[3]];
    const C = [pool[4],pool[5]];

    switch(r % 3){
      case 0: return {a:A, b:B, bank:C};
      case 1: return {a:B, b:C, bank:A};
      case 2: return {a:C, b:A, bank:B};
    }
  }

  return {a:[],b:[],bank:[]};
}

/* =====================
   GENERATE (FULL RESET FIX)
===================== */

function generate(){

  let p = getPlayers();

  if(p.length < 4){
    alert("Mindestens 4 Spieler");
    return;
  }

  // 🔥 FIX: echte saubere Werte
  const total = Number(document.getElementById("totalTime").value);
  const match = Number(document.getElementById("matchTime").value);

  const rounds = Math.floor(total / match);

  // 🔥 FULL RESET (WICHTIG FÜR TEST 2)
  schedule = [];

  for(let r=0;r<rounds;r++){

    let round;

    if(mode === "turnier"){
      round = turnierRound(p);
    } else {
      round = groupRound(p, r); // 🔥 FIX: kein alter Zustand mehr
    }

    schedule.push(round);
  }

  render();

  console.log("MODE:", mode);
  console.log("ROUNDS:", rounds);
}

/* =====================
   REMIX (FORCED NEW STATE)
===================== */

function remix(){

  // 🔥 WICHTIG: kompletter HARD RESET
  schedule = [];

  // kleine Random-Änderung im Seed
  players = [...players].sort(()=>Math.random()-0.5);

  generate();
}

/* =====================
   OUTPUT
===================== */

function render(){

  let box = document.getElementById("output");
  box.innerHTML = "";

  schedule.forEach((s,i)=>{

    let div = document.createElement("div");

    div.innerHTML =
      `<b>R${i+1}</b>: ${s.a.join(" & ")} vs ${s.b.join(" & ")}
       <br>Bank: ${s.bank.join(", ") || "keine"}`;

    box.appendChild(div);
  });
}

/* INIT */
init();

</script>

</body>
</html>
