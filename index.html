<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Timer Pro Fix</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#184b2f;
  color:white;
  text-align:center;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{margin:10px 0}

/* 🔥 TIMERS WIEDER GROß */
#eventTime{
  font-size:40px;
  font-weight:bold;
}

#matchTime{
  font-size:90px;
  font-weight:bold;
}

/* ROWS */
.row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:10px 0;
}

/* BUTTONS WIEDER GROSS */
button{
  padding:12px 18px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#36a66a;
}

/* PANELS */
.panel{
  margin-top:20px;
  background:#255d3d;
  padding:15px;
  border-radius:12px;
}

/* PLAYER UI */
.playerBox{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

.player{
  background:#1f6b42;
  padding:8px 10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>🎾 Padel Timer Pro</h1>

<!-- PLAYERS -->
<div class="panel">
<h3>Spieler Auswahl</h3>
<div class="playerBox" id="playerBox"></div>

<div class="row">
<button onclick="applySelection()">✔ Übernehmen</button>
<button onclick="selectAll()">Alle</button>
<button onclick="clearSelection()">Reset</button>
</div>
</div>

<!-- EVENT TIMER -->
<div class="panel">
<h3>Spielabend</h3>
<div id="eventTime">120:00</div>

<div class="row">
<button onclick="startEvent()">▶ Start</button>
<button onclick="pauseEvent()">⏸ Pause</button>
<button onclick="resetEvent()">🔄 Reset</button>
</div>
</div>

<!-- MATCH TIMER -->
<div class="panel">
<h3>Match</h3>
<div id="matchTime">18:00</div>

<div class="row">
<button onclick="startMatch()">▶ Start</button>
<button onclick="pauseMatch()">⏸ Pause</button>
<button onclick="resetMatch()">🔄 Reset</button>
</div>

<div class="row">
<button onclick="setMatch(15)">15</button>
<button onclick="setMatch(18)">18</button>
<button onclick="setMatch(20)">20</button>
<button onclick="customMatch()">Custom</button>
</div>
</div>

<!-- TEAMS -->
<div class="panel">
<h3>Teams</h3>
<div id="teams"></div>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= DATA ================= */

const allPlayers = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let selected = new Set(allPlayers);
let activePlayers = [...allPlayers];

let rotation = 0;

/* TIMERS */
let event = { total:120*60, remain:120*60, interval:null };
let match = { total:18*60, remain:18*60, interval:null };

/* DOM */
const box = document.getElementById("playerBox");
const teamsEl = document.getElementById("teams");

/* ================= PLAYERS UI ================= */

function renderPlayers(){
  box.innerHTML = "";

  allPlayers.forEach(p=>{
    const checked = selected.has(p) ? "checked" : "";

    box.innerHTML += `
      <label class="player">
        <input type="checkbox" ${checked}
        onchange="togglePlayer('${p}',this.checked)">
        ${p}
      </label>
    `;
  });
}

function togglePlayer(name, checked){
  if(checked) selected.add(name);
  else selected.delete(name);
}

function applySelection(){
  activePlayers = [...selected];

  if(activePlayers.length < 4){
    alert("Mindestens 4 Spieler!");
    return;
  }

  rotation = 0;
  setEventTime();
  render();
}

function selectAll(){
  selected = new Set(allPlayers);
  renderPlayers();
}

function clearSelection(){
  selected.clear();
  renderPlayers();
}

/* ================= EVENT TIMER ================= */

function setEventTime(){
  event.total = (activePlayers.length === 4 ? 120 : 180) * 60;
  event.remain = event.total;
}

function startEvent(){
  if(event.interval) return;

  event.interval = setInterval(()=>{
    if(event.remain > 0) event.remain--;
    else {
      pauseEvent();
      beep();
      alert("Spielabend vorbei!");
    }
    render();
  },1000);
}

function pauseEvent(){
  clearInterval(event.interval);
  event.interval = null;
}

function resetEvent(){
  pauseEvent();
  event.remain = event.total;
  render();
}

/* ================= MATCH TIMER ================= */

function startMatch(){
  if(match.interval) return;

  match.interval = setInterval(()=>{
    if(match.remain > 0) match.remain--;
    else {
      pauseMatch();
      beep();
      alert("Match vorbei!");
    }
    render();
  },1000);
}

function pauseMatch(){
  clearInterval(match.interval);
  match.interval = null;
}

function resetMatch(){
  pauseMatch();
  match.remain = match.total;
  render();
}

function setMatch(min){
  match.total = min * 60;
  match.remain = match.total;
  render();
}

function customMatch(){
  let m = parseInt(prompt("Minuten?"));
  if(m > 0) setMatch(m);
}

/* ================= TEAMS ================= */

function getTeams(){

  let players = activePlayers;

  let a=[], b=[], bench=[];

  for(let i=0;i<players.length;i++){
    let idx = (i + rotation) % players.length;

    if(i < 2) a.push(players[idx]);
    else if(i < 4) b.push(players[idx]);
    else bench.push(players[idx]);
  }

  return {a,b,bench};
}

/* ================= ROTATION ================= */

function nextRound(){
  rotation = (rotation + 1) % activePlayers.length;
  render();
}

/* ================= RENDER ================= */

function render(){

  // EVENT
  let em = Math.floor(event.remain/60);
  let es = event.remain%60;

  document.getElementById("eventTime").textContent =
    String(em).padStart(2,"0")+":"+String(es).padStart(2,"0");

  // MATCH
  let mm = Math.floor(match.remain/60);
  let ms = match.remain%60;

  document.getElementById("matchTime").textContent =
    String(mm).padStart(2,"0")+":"+String(ms).padStart(2,"0");

  // TEAMS
  let {a,b,bench} = getTeams();

  teamsEl.innerHTML =
    "<b>Team A:</b> "+(a.join(", ")||"-")+"<br>"+
    "<b>Team B:</b> "+(b.join(", ")||"-")+"<br>"+
    "<b>Bank:</b> "+(bench.join(", ")||"-");
}

/* BEEP */
function beep(){
  document.getElementById("beep").play();
}

/* INIT */
renderPlayers();
setEventTime();
render();

</script>

</body>
</html>
