<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel Club Manager PWA</title>

<!-- PWA -->
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;:&quot;Padel Club Manager&quot;,
  &quot;short_name&quot;:&quot;Padel&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#0b1f16&quot;,
  &quot;theme_color&quot;:&quot;#0b1f16&quot;
}">
<meta name="theme-color" content="#0b1f16">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f16;
  color:white;
}

#app{padding:10px;}

.topbar{
  position:sticky;
  top:0;
  background:#123b28;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:14px 18px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.section{
  background:#184d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timer{
  font-size:160px;
  color:#00ff99;
  font-weight:900;
}

.big{
  font-size:48px;
  margin:20px;
}

.bank{
  font-size:42px;
  color:#ffd54a;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🎾 Padel PWA</div>
<button onclick="enterKiosk()">Kiosk</button>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="setMode('turnier')">Turnier</button>
<button onclick="setMode('gruppe')">Gruppe</button>
</div>

<div class="section">
<h3>Spieler</h3>
<textarea id="players" rows="5" style="width:100%">
Marco
Stefan
David
Tobias
Chris
Werner
</textarea>
</div>

<div class="section">
<button onclick="generate()">Spielplan erstellen</button>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timer">00:00</div>

<div id="mode" class="big"></div>
<div id="round" class="big"></div>
<div id="teams" class="big"></div>
<div id="bank" class="bank"></div>

<button onclick="startTimer()">Start</button>
<button onclick="nextMatch()">Next</button>
<button onclick="exitKiosk()">Exit</button>

</div>

<script>

/* =====================
   PWA SERVICE WORKER (INLINE)
===================== */
const sw = `
self.addEventListener("install",e=>self.skipWaiting());
self.addEventListener("fetch",e=>{});
`;

const blob = new Blob([sw],{type:"text/javascript"});
const swURL = URL.createObjectURL(blob);

if("serviceWorker" in navigator){
  navigator.serviceWorker.register(swURL);
}

/* =====================
   SOUND + VOICE
===================== */

let sound=true;
let voice=true;
const gong=new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");

function speak(t){
  if(!voice) return;
  let u=new SpeechSynthesisUtterance(t);
  u.lang="de-DE";
  speechSynthesis.speak(u);
}

/* =====================
   STATE
===================== */

let mode="turnier";
let schedule=[];
let i=0;
let time=0;
let timer;
let done=false;

/* =====================
   PLAYERS
===================== */

function getPlayers(){
  return document.getElementById("players").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);
}

/* =====================
   GENERATE
===================== */

function generate(){

  let p=getPlayers();
  schedule=[];
  i=0;

  let rounds=6;

  for(let r=0;r<rounds;r++){

    if(mode==="turnier"){

      let pool=[...p].sort(()=>Math.random()-0.5);

      let a,b,bank;

      if(p.length===5){
        bank=[pool[0]];
        let rest=pool.slice(1);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }

      if(p.length===6){
        bank=[pool[0],pool[1]];
        let rest=pool.slice(2);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }

      schedule.push({a,b,bank});
    }

    if(mode==="gruppe"){

      let pool=[...p];

      if(p.length===6){
        let A=[pool[0],pool[1]];
        let B=[pool[2],pool[3]];
        let C=[pool[4],pool[5]];

        let rot=r%3;

        if(rot===0) schedule.push({a:A,b:B,bank:C});
        if(rot===1) schedule.push({a:B,b:C,bank:A});
        if(rot===2) schedule.push({a:C,b:A,bank:B});
      }
    }
  }

  update();
}

/* =====================
   MODE
===================== */

function setMode(m){
  mode=m;
}

/* =====================
   KIOSK
===================== */

function enterKiosk(){
  document.body.classList.add("kioskMode");
  update();
}

function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =====================
   TIMER
===================== */

function startTimer(){
  time=15*60;
  done=false;

  clearInterval(timer);

  timer=setInterval(()=>{

    time--;
    let m=Math.floor(time/60);
    let s=time%60;
    if(s<10)s="0"+s;

    document.getElementById("timer").innerText=`${m}:${s}`;

    if(time<=0){
      clearInterval(timer);
      done=true;
      gong.play();
      speak("Match beendet");
    }

  },1000);
}

/* =====================
   NEXT
===================== */

function nextMatch(){

  if(!done) return;

  let s=schedule[i];

  gong.play();

  speak(
    "Match " +
    s.a.join(" und ") +
    " gegen " +
    s.b.join(" und ") +
    ". Bank: " +
    (s.bank.length?s.bank.join(" und "):"keine")
  );

  i++;

  if(i>=schedule.length) i=0;

  done=false;

  update();
}

/* =====================
   UPDATE
===================== */

function update(){

  let s=schedule[i];
  if(!s) return;

  document.getElementById("mode").innerText=
    mode==="turnier"?"🏆 Turnier":"👥 Gruppe";

  document.getElementById("round").innerText=
    "Runde "+(i+1);

  document.getElementById("teams").innerText=
    s.a.join(" / ") + " vs " + s.b.join(" / ");

  document.getElementById("bank").innerText=
    "Bank: " + (s.bank.join(", ")||"keine");
}

</script>

</body>
</html>
