<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Timer Dual System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#184b2f;
  color:white;
  text-align:center;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{margin:10px 0}

.timerBig{
  font-size:80px;
  font-weight:bold;
}

.timerSmall{
  font-size:28px;
  margin:5px;
}

.row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:10px;
}

button{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  background:#2e8b57;
  color:white;
  cursor:pointer;
}

.panel{
  margin-top:20px;
  background:#255d3d;
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>🎾 Padel Timer</h1>

<!-- SPIELABEND TIMER -->
<div class="timerSmall">
Spielabend: <span id="eventTime">120:00</span>
</div>

<div class="row">
<button onclick="startEvent()">▶ Spielabend Start</button>
<button onclick="pauseEvent()">⏸ Pause</button>
<button onclick="resetEvent()">🔄 Reset</button>
</div>

<!-- MATCH TIMER -->
<div class="timerBig">
Match: <span id="matchTime">18:00</span>
</div>

<div class="row">
<button onclick="startMatch()">▶ Match Start</button>
<button onclick="pauseMatch()">⏸ Pause</button>
<button onclick="resetMatch()">🔄 Reset</button>
</div>

<div class="row">
<button onclick="setMatch(15)">15</button>
<button onclick="setMatch(18)">18</button>
<button onclick="setMatch(20)">20</button>
<button onclick="customMatch()">Custom</button>
</div>

<!-- TEAMS -->
<div class="panel">
<div id="teams"></div>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

// ================= STATE =================
let event = {
  total: 120*60,
  remain: 120*60,
  interval: null
};

let match = {
  total: 18*60,
  remain: 18*60,
  interval: null
};

let players = ["Tobias","Werner","Christian","Stefan","David","Marco"];
let rotation = 0;

// ================= DOM =================
const eventEl = document.getElementById("eventTime");
const matchEl = document.getElementById("matchTime");
const teamsEl = document.getElementById("teams");

// ================= EVENT TIMER =================
function startEvent(){
  if(event.interval) return;

  event.interval = setInterval(()=>{
    if(event.remain > 0){
      event.remain--;
    } else {
      pauseEvent();
      document.getElementById("beep").play();
      alert("Spielabend vorbei!");
    }
    render();
  },1000);
}

function pauseEvent(){
  clearInterval(event.interval);
  event.interval = null;
}

function resetEvent(){
  pauseEvent();
  event.remain = event.total;
  render();
}

// ================= MATCH TIMER =================
function startMatch(){
  if(match.interval) return;

  match.interval = setInterval(()=>{
    if(match.remain > 0){
      match.remain--;
    } else {
      pauseMatch();
      document.getElementById("beep").play();
      alert("Match vorbei!");
    }
    render();
  },1000);
}

function pauseMatch(){
  clearInterval(match.interval);
  match.interval = null;
}

function resetMatch(){
  pauseMatch();
  match.remain = match.total;
  render();
}

function setMatch(min){
  match.total = min*60;
  match.remain = match.total;
  render();
}

function customMatch(){
  let m = parseInt(prompt("Minuten?"));
  if(m>0) setMatch(m);
}

// ================= TEAMS =================
function getTeams(){
  let a=[],b=[],bench=[];

  for(let i=0;i<players.length;i++){
    let idx = (i+rotation)%players.length;

    if(i<2) a.push(players[idx]);
    else if(i<4) b.push(players[idx]);
    else bench.push(players[idx]);
  }

  return {a,b,bench};
}

function nextRound(){
  rotation = (rotation+1)%players.length;
  render();
}

// ================= RENDER =================
function render(){

  // Event Timer
  let em = Math.floor(event.remain/60);
  let es = event.remain%60;

  eventEl.textContent =
    String(em).padStart(2,"0")+":"+String(es).padStart(2,"0");

  // Match Timer
  let mm = Math.floor(match.remain/60);
  let ms = match.remain%60;

  matchEl.textContent =
    String(mm).padStart(2,"0")+":"+String(ms).padStart(2,"0");

  // Teams
  let {a,b,bench} = getTeams();

  teamsEl.innerHTML =
    "<b>Team A:</b> "+a.join(", ")+"<br>"+
    "<b>Team B:</b> "+b.join(", ")+"<br>"+
    "<b>Bank:</b> "+bench.join(", ");
}

render();

</script>

</body>
</html>
