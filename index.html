<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel CACHE SAFE v1.0.0</title>

<script>
/* 🔥 CACHE-BUST TRICK */
(function(){
  const key = "padel_cache_version_v1_0_0";
  const last = localStorage.getItem(key);

  if(!last){
    localStorage.setItem(key, Date.now());
  }
})();
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
  -webkit-user-select: none;
  user-select: none;
}

.screen { display:none; padding:30px; }
.active { display:block; }

button {
  font-size: 28px;
  padding: 18px 22px;
  margin: 8px;
  border-radius: 14px;
  border: none;
}

.selected { background:#2ea043 !important; }

/* MATCH */
#matchInfo {
  font-size: 46px;
  margin-top: 20px;
}

/* DEBUG + VERSION */
#debug {
  margin-top: 20px;
  font-size: 16px;
  opacity: 0.7;
  color: #58a6ff;
}

#version {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 14px;
  opacity: 0.6;
}

/* COURT */
#courtScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#timer {
  font-size: 280px;
  font-weight: 900;
}

#countdown {
  font-size: 120px;
  color: orange;
}

/* FLASH */
.flash {
  animation: flash 0.25s ease;
}

@keyframes flash {
  0% { opacity: 0.2; }
  100% { opacity: 1; }
}
</style>
</head>

<body>

<!-- VERSION MARKER -->
<div id="version">CACHE SAFE v1.0.0</div>

<!-- SETUP -->
<div id="setupScreen" class="screen active">

<h1>🎾 CACHE SAFE BUILD</h1>

<h3>👥 Spieler</h3>

<button onclick="togglePlayer(this,'Werner')">Werner</button>
<button onclick="togglePlayer(this,'Marco')">Marco</button>
<button onclick="togglePlayer(this,'David')">David</button>
<button onclick="togglePlayer(this,'Stefan')">Stefan</button>
<button onclick="togglePlayer(this,'Christian')">Christian</button>
<button onclick="togglePlayer(this,'Tobias')">Tobias</button>

<br><br>

<button style="background:#2ea043;color:white;font-size:32px"
onclick="startGame()">START</button>

<br>

<button onclick="forceReload()" style="background:#444;color:white;">
🔄 FORCE RELOAD
</button>

</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<h2>Spielleiter</h2>

<div id="matchInfo"></div>
<div id="debug"></div>

<br>

<button onclick="nextMatch()" style="font-size:40px;background:#1f6feb;color:white;">
NEXT ➜
</button>

<button onclick="startCourt()">START COURT</button>

</div>

<!-- COURT -->
<div id="courtScreen">

<div id="courtMatch"></div>
<div id="countdown"></div>
<div id="timer"></div>

</div>

<script>

/* 🔥 CACHE-SAFE INIT */
console.log("CACHE SAFE BUILD LOADED:", Date.now());

let selectedPlayers = [];
let matches = [];
let current = 0;
let seconds = 1200;
let timer;

// 🔊 SOUND
function beep(freq=800,duration=150){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.value=freq;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),duration);
  } catch(e){}
}

// FORCE RELOAD (iPad safe)
function forceReload(){
  localStorage.clear();
  location.reload(true);
}

// PLAYERS
function togglePlayer(btn,name){
  if(selectedPlayers.includes(name)){
    selectedPlayers = selectedPlayers.filter(p=>p!==name);
    btn.classList.remove("selected");
  } else {
    selectedPlayers.push(name);
    btn.classList.add("selected");
  }
}

// MATCHES
function generateMatches(){
  let p=[...selectedPlayers];
  matches=[];

  for(let i=0;i<p.length;i+=4){
    if(p[i+3]){
      matches.push([
        p[i]+" + "+p[i+1],
        p[i+2]+" + "+p[i+3]
      ]);
    }
  }

  if(matches.length===0){
    matches=[["Nicht genug Spieler",""]];
  }

  console.log("MATCHES:", matches);
}

// START
function startGame(){

  if(selectedPlayers.length<4){
    alert("Mindestens 4 Spieler");
    return;
  }

  generateMatches();
  current = 0;

  document.getElementById("setupScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  showMatch();
}

// SHOW MATCH
function showMatch(){

  document.getElementById("matchInfo").innerHTML =
    "Match " + (current+1) + " / " + matches.length + "<br><br>" +
    matches[current][0] + "<br>VS<br>" +
    matches[current][1];

  document.getElementById("debug").innerText =
    "DEBUG current = " + current + " | matches = " + matches.length;
}

// NEXT
function nextMatch(){

  if(matches.length <= 1){
    beep(500,200);
    return;
  }

  current++;
  if(current >= matches.length) current = 0;

  beep(900,120);

  const el = document.getElementById("matchInfo");
  el.classList.remove("flash");
  void el.offsetWidth;
  el.classList.add("flash");

  showMatch();
}

// COURT
function startCourt(){

  beep(1000,200);

  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("courtScreen").style.display="flex";

  document.getElementById("courtMatch").innerHTML =
    matches[current][0] + " VS " + matches[current][1];

  startCountdown(5);
}

// COUNTDOWN
function startCountdown(s){

  let c=s;
  const el=document.getElementById("countdown");

  let i=setInterval(()=>{

    el.innerText="Start in "+c;
    c--;

    if(c<0){
      clearInterval(i);
      el.innerText="";
      startTimer();
    }

  },1000);
}

// TIMER
function startTimer(){

  const el=document.getElementById("timer");

  timer=setInterval(()=>{

    let m=Math.floor(seconds/60);
    let s=seconds%60;

    el.innerText =
      String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

    seconds--;

    if(seconds<0){
      clearInterval(timer);
      document.getElementById("courtScreen").innerHTML =
        "<h1 style='font-size:90px'>MATCH BEENDET</h1>";
    }

  },1000);
}

</script>

</body>
</html>
