<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V3.0 Phase 5</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071f14;
  color:white;
}

#wrap{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
  cursor:pointer;
}

.big{
  font-size:18px;
  margin-top:10px;
}

.roundBox{
  background:#144d30;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="wrap">

<h1>🎾 Phase 5 – Fairness Engine</h1>

<div class="panel">
<button onclick="generate()">🏆 Turnier generieren</button>
</div>

<div id="output"></div>

</div>

<script>

/* ================= PLAYERS ================= */

const players = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let schedule = [];

/* ================= TRACKING ================= */

let partnerCount = {};
let opponentCount = {};
let pauseCount = {};

/* init stats */
players.forEach(p=>{
  partnerCount[p]={};
  opponentCount[p]={};
  pauseCount[p]=0;
});

/* ================= HELPERS ================= */

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* penalty scoring */
function scoreTeam(a,b){

  let score=0;

  // gleiche Partner vermeiden
  if(partnerCount[a]?.[b]) score += partnerCount[a][b]*10;

  return score;
}

/* ================= GENERATOR ================= */

function generate(){

  schedule = [];

  let pool = shuffle(players);

  let rounds = players.length;

  for(let r=0;r<rounds;r++){

    let rotated = [...pool.slice(r),...pool.slice(0,r)];

    let a=[rotated[0],rotated[1]];
    let b=[rotated[2],rotated[3]];
    let bank=rotated.slice(4);

    schedule.push({a,b,bank,round:r+1});

    updateStats(a,b,bank);
  }

  render();
}

/* ================= STATS ================= */

function updateStats(a,b,bank){

  function addPair(x,y){
    partnerCount[x][y]=(partnerCount[x][y]||0)+1;
    partnerCount[y][x]=(partnerCount[y][x]||0)+1;
  }

  a.forEach((p,i)=>{
    a.forEach((q,j)=>{
      if(i!==j) addPair(p,q);
    });
  });

  b.forEach((p,i)=>{
    b.forEach((q,j)=>{
      if(i!==j) addPair(p,q);
    });
  });

  bank.forEach(p=>{
    pauseCount[p]++;
  });
}

/* ================= RENDER ================= */

function render(){

  let out=document.getElementById("output");
  out.innerHTML="";

  schedule.forEach(s=>{

    out.innerHTML+=`
      <div class="roundBox">
        <b>Runde ${s.round}</b><br><br>
        TEAM A: ${s.a.join(" | ")}<br>
        TEAM B: ${s.b.join(" | ")}<br>
        Pause: ${s.bank.join(" | ")}
      </div>
    `;
  });
}

</script>

</body>
</html>
