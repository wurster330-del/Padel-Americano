<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V3.0 Phase 1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
}

h1{margin:10px 0;}

#wrap{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.playerRow{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.player{
  background:#2c7a4a;
  padding:10px;
  border-radius:10px;
}

input[type="text"]{
  width:120px;
  padding:6px;
  border-radius:6px;
  border:none;
}

select{
  padding:8px;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.small{
  opacity:0.8;
  font-size:14px;
}
</style>
</head>

<body>

<div id="wrap">

<h1>🎾 Padel Terminal V3.0 – Phase 1</h1>

<div class="panel">
<h2>👥 Spieler</h2>
<div id="players" class="playerRow"></div>
<p class="small">Wähle 4–6 Spieler aus</p>
</div>

<div class="panel">
<h2>⏱ Matchzeit</h2>
<select id="matchTime">
  <option value="15">15 Minuten</option>
  <option value="18" selected>18 Minuten</option>
  <option value="20">20 Minuten</option>
</select>
<input id="matchCustom" type="text" placeholder="oder frei (Min)">
</div>

<div class="panel">
<h2>🕒 Spielabend</h2>
<select id="eventTime">
  <option value="120" selected>120 Minuten</option>
  <option value="180">180 Minuten</option>
</select>
<input id="eventCustom" type="text" placeholder="oder frei (Min)">
</div>

<div class="panel">
<button onclick="saveSettings()">💾 Speichern</button>
<button onclick="resetAll()">🔄 Reset</button>
</div>

<div class="panel">
<p class="small">
Phase 1: Setup & Speicherung abgeschlossen<br>
(Spielplan + Timer kommen in Phase 2/3)
</p>
</div>

</div>

<script>

/* ================= DATA ================= */

let defaultPlayers = [
  {name:"Tobias", active:true},
  {name:"Werner", active:true},
  {name:"Christian", active:true},
  {name:"Stefan", active:true},
  {name:"David", active:true},
  {name:"Marco", active:true}
];

let players = [];

/* ================= INIT ================= */

function load(){
  let data = localStorage.getItem("padel_v3_phase1");
  if(data){
    players = JSON.parse(data);
  } else {
    players = defaultPlayers;
  }
  render();
}

/* ================= RENDER ================= */

function render(){
  let box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach((p,i)=>{
    box.innerHTML += `
      <div class="player">
        <input type="checkbox" ${p.active ? "checked":""}
          onchange="toggle(${i})">

        <input type="text"
          value="${p.name}"
          onchange="rename(${i},this.value)">
      </div>
    `;
  });

  let m = localStorage.getItem("matchTime") || 18;
  let e = localStorage.getItem("eventTime") || 120;

  document.getElementById("matchTime").value = m;
  document.getElementById("eventTime").value = e;
}

/* ================= ACTIONS ================= */

function toggle(i){
  players[i].active = !players[i].active;
}

function rename(i,val){
  players[i].name = val;
}

function saveSettings(){

  let match = document.getElementById("matchTime").value;
  let event = document.getElementById("eventTime").value;

  let matchCustom = document.getElementById("matchCustom").value;
  let eventCustom = document.getElementById("eventCustom").value;

  localStorage.setItem("padel_v3_phase1", JSON.stringify(players));

  localStorage.setItem("matchTime", matchCustom || match);
  localStorage.setItem("eventTime", eventCustom || event);

  alert("Gespeichert ✅");
}

function resetAll(){
  localStorage.clear();
  location.reload();
}

/* ================= START ================= */

load();

</script>

</body>
</html>
