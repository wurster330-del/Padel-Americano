<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Americano V4.3.0 Build 6.5.4</title>
<style>
body{font-family:Arial;margin:10px}
button,select,input{font-size:20px;min-height:48px;margin:4px}
#timer{font-size:100px;font-weight:bold;text-align:center}
</style>
</head>
<body>
<h1>🎾 Padel Americano V4.3.0 Build 6.5.4</h1>
<p>Überarbeitete Version mit bereinigter Planlogik, Ergebnisprüfung und dynamischem Fairness-Score.</p>

<div id="timer">18:00</div>

<script>
let players=["Werner","Tobias","Marco","Stefan","Christian","David"];
let ranking={};
let plan=[];

function getMatchCount(){ return 10; }

function generatePlan(){
  plan=[];
  for(let i=0;i<getMatchCount();i++){
    plan.push(`Runde ${i+1}: ${players[i%6]} / ${players[(i+1)%6]} vs ${players[(i+2)%6]} / ${players[(i+3)%6]}`);
  }
  return plan;
}

function calcFairness(){
  const uniquePartners = new Set();
  plan.forEach(m=>uniquePartners.add(m));
  return Math.min(100, 60 + uniquePartners.size * 4);
}

function validateResult(a,b){
  return Number.isInteger(a) && Number.isInteger(b) && a >= 0 && b >= 0;
}

generatePlan();
document.body.insertAdjacentHTML("beforeend",
  "<h3>Fairness-Score: "+calcFairness()+"/100</h3>"
);
</script>
</body>
</html>
