<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Ultra Court</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* ================= ADMIN ================= */
#admin{
  padding:20px;
}

.panel{
  background:#255d3d;
  padding:15px;
  border-radius:12px;
  margin:10px auto;
  max-width:800px;
}

/* ================= COURT ================= */

#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:15px;
}

/* 🔥 TOP TIMER (größer) */
.top{
  display:flex;
  justify-content:space-between;
  font-size:26px;
  opacity:0.9;
}

/* 🔥 SPIELABEND TIMER */
#eventTime{
  font-size:4vh;
  font-weight:bold;
}

/* 🔥 MATCH TIMER (EXTREM GROSS) */
#matchTime{
  font-size:28vh;
  font-weight:bold;
  line-height:1;
}

/* 🔥 TEAMS */
#teams{
  font-size:6vh;
  font-weight:bold;
  line-height:1.4;
}

/* ================= BUTTON BAR ================= */

.bar{
  display:flex;
  justify-content:center;
  gap:20px;
  padding-bottom:10px;
}

/* 🔥 GROßE BUTTONS */
button{
  padding:18px 26px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#2e8b57;
  color:white;
  cursor:pointer;
  min-width:140px;
}

button:hover{
  background:#36a66a;
}

/* EXIT EXTRA PROMINENT */
.exit{
  position:absolute;
  top:12px;
  right:12px;
  background:#b33a3a;
}

.exit:hover{
  background:#d14b4b;
}

</style>
</head>

<body>

<!-- ================= COURT ================= -->
<div id="court">

<button class="exit" onclick="exitCourt()">❌ EXIT</button>

<div class="top">
  <div id="eventTime">120:00</div>
  <div>COURT 1</div>
</div>

<div id="matchTime">18:00</div>

<div id="teams"></div>

<div class="bar">
  <button onclick="nextMatch()">➡ NEXT MATCH</button>
  <button onclick="pause()">⏸ PAUSE</button>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= DATA ================= */

const players = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let active = new Set(players);
let rotation = 0;

let event = { total:120*60, remain:120*60 };
let match = { total:18*60, remain:18*60, interval:null };

/* ================= START ================= */

function startCourt(){
  document.getElementById("admin")?.remove();
  document.getElementById("court").style.display="flex";
  document.documentElement.requestFullscreen?.();
  startMatch();
}

/* ================= TEAMS ================= */

function getTeams(){
  const list = [...active];

  let a=[], b=[], bench=[];

  for(let i=0;i<list.length;i++){
    let idx = (i + rotation) % list.length;

    if(i < 2) a.push(list[idx]);
    else if(i < 4) b.push(list[idx]);
    else bench.push(list[idx]);
  }

  return {a,b,bench};
}

/* ================= MATCH ================= */

function startMatch(){
  if(match.interval) return;

  match.interval = setInterval(()=>{

    if(match.remain > 0){
      match.remain--;
      event.remain--;
    } else {
      nextMatch();
    }

    render();

  },1000);
}

function pause(){
  clearInterval(match.interval);
  match.interval = null;
}

function nextMatch(){
  rotation = (rotation + 2) % active.size;
  match.remain = match.total;
  document.getElementById("beep").play();
}

/* ================= EXIT ================= */

function exitCourt(){
  pause();
  document.getElementById("court").style.display="none";
  document.exitFullscreen?.();
}

/* ================= RENDER ================= */

function render(){

  let em = Math.floor(event.remain/60);
  let es = event.remain%60;

  let mm = Math.floor(match.remain/60);
  let ms = match.remain%60;

  document.getElementById("eventTime").textContent =
    "SPIEL " + em + ":" + String(es).padStart(2,"0");

  document.getElementById("matchTime").textContent =
    mm + ":" + String(ms).padStart(2,"0");

  const {a,b,bench} = getTeams();

  document.getElementById("teams").innerHTML =
    "A: " + a.join(" | ") + "<br>" +
    "B: " + b.join(" | ") + "<br>" +
    "BANK: " + bench.join(" | ");
}

render();

</script>

</body>
</html>
