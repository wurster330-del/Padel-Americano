<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Padel Timer V1.0</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#184b2f;
  color:#fff;
  text-align:center;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{margin:10px 0}

#timer{
  font-size:140px;
  font-weight:bold;
  margin:10px 0;
}

#info{
  font-size:20px;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:10px 0;
}

button{
  padding:12px 16px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#2e8b57;
  color:white;
}

.panel{
  margin-top:20px;
  padding:15px;
  background:#255d3d;
  border-radius:12px;
}

.teams{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
}

.team{
  font-size:22px;
  min-width:120px;
}

.small{
  font-size:18px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>🎾 Padel Timer V1.0</h1>

  <div id="info">Runde 1</div>
  <div id="timer">18:00</div>

  <div class="row">
    <button id="startBtn">▶ Start</button>
    <button id="pauseBtn">⏸ Pause</button>
    <button id="resetBtn">⏹ Reset</button>
  </div>

  <div class="row">
    <button class="game" data-min="15">15</button>
    <button class="game" data-min="18">18</button>
    <button class="game" data-min="20">20</button>
    <button id="custom">Custom</button>
  </div>

  <div class="row">
    <button class="players" data-n="4">4 Spieler</button>
    <button class="players" data-n="5">5 Spieler</button>
    <button class="players" data-n="6">6 Spieler</button>
  </div>

  <div class="row">
    <button id="next">🔄 Nächste Runde</button>
  </div>

  <div class="panel">
    <div class="teams">
      <div class="team">
        <b>TEAM A</b>
        <div id="teamA"></div>
      </div>

      <div class="team">
        <b>TEAM B</b>
        <div id="teamB"></div>
      </div>
    </div>

    <div class="small" id="bench"></div>
  </div>
</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
preload="auto"></audio>

<script>
let state = {
  gameMin: 18,
  total: 18 * 60,
  remain: 18 * 60,
  round: 1,
  rotation: 0,
  players: ["Tobias","Werner","Christian","Stefan","David","Marco"],
  running: false,
  interval: null
};

// DOM
const timerEl = document.getElementById("timer");
const infoEl = document.getElementById("info");
const teamAEl = document.getElementById("teamA");
const teamBEl = document.getElementById("teamB");
const benchEl = document.getElementById("bench");

// STORAGE
function save(){
  localStorage.setItem("padel_v1", JSON.stringify(state));
}

function load(){
  const data = localStorage.getItem("padel_v1");
  if(data){
    state = {...state, ...JSON.parse(data)};
  }
}

// TIMER
function start(){
  if(state.interval) return;
  state.interval = setInterval(tick, 1000);
  state.running = true;
}

function pause(){
  clearInterval(state.interval);
  state.interval = null;
  state.running = false;
}

function reset(){
  pause();
  state.remain = state.total;
  draw();
}

// TIME TICK
function tick(){
  if(state.remain <= 0){
    pause();
    document.getElementById("beep").play();
    alert("Zeit vorbei!");
    return;
  }

  state.remain--;
  draw();
}

// DRAW
function draw(){
  const m = Math.floor(state.remain / 60);
  const s = state.remain % 60;

  timerEl.textContent =
    String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

  infoEl.textContent = "Runde " + state.round;

  const p = state.players;

  const a = p.slice(state.rotation, state.rotation + 2);
  const b = p.slice(state.rotation + 2, state.rotation + 4);

  const used = [...a, ...b];
  const bench = p.filter(x => !used.includes(x));

  teamAEl.innerHTML = a.join("<br>") || "-";
  teamBEl.innerHTML = b.join("<br>") || "-";
  benchEl.textContent = "Bank: " + bench.join(", ");

  save();
}

// GAME SETTINGS
function setGame(min){
  state.gameMin = min;
  state.total = min * 60;
  state.remain = state.total;
  draw();
}

// PLAYERS
function setPlayers(n){
  state.players = state.players.slice(0, n);
  state.rotation = 0;
  draw();
}

// ROTATION
function nextRound(){
  state.rotation = (state.rotation + 2) % Math.max(state.players.length, 2);
  state.round++;
  draw();
}

// CUSTOM TIME
function customTime(){
  const m = parseInt(prompt("Spielzeit in Minuten?"));
  if(m > 0) setGame(m);
}

// EVENTS
document.getElementById("startBtn").onclick = start;
document.getElementById("pauseBtn").onclick = pause;
document.getElementById("resetBtn").onclick = reset;
document.getElementById("next").onclick = nextRound;
document.getElementById("custom").onclick = customTime;

document.querySelectorAll(".game").forEach(btn=>{
  btn.onclick = () => setGame(parseInt(btn.dataset.min));
});

document.querySelectorAll(".players").forEach(btn=>{
  btn.onclick = () => setPlayers(parseInt(btn.dataset.n));
});

// INIT
load();
state.total = state.gameMin * 60;
state.remain = state.remain || state.total;
draw();
</script>

</body>
</html>
