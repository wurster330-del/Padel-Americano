<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel-Götter PRO V1.4</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{padding:12px;}

.topbar{
  background:#0f3a28;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

button{
  padding:14px 18px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:10px;
  align-items:center;
  margin:6px 0;
}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#timer{
  font-size:170px;
  color:#00ff99;
  font-weight:900;
}

.big{font-size:44px;margin:18px;}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🎾 Padel-Götter PRO V1.4</div>
<button id="kioskBtn">Kiosk</button>
</div>

<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<div class="section">
<h3>Setup</h3>

<label>Gesamtzeit</label>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<br><br>

<label>Matchzeit</label>
<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<div class="section">
<h3>Modus</h3>
<button id="btnTurnier">🏆 Turnier</button>
<button id="btnGruppe">👥 Gruppe</button>
</div>

<div class="section">
<button id="btnGenerate">Spielplan erstellen</button>
<button id="btnRemix">🔄 Neu mischen</button>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timer">00:00</div>

<div id="mode" class="big"></div>
<div id="round" class="big"></div>
<div id="teams" class="big"></div>
<div id="bank" class="big"></div>

<button id="btnStart">Start</button>
<button id="btnNext">Next</button>
<button id="btnEnd">Matchende</button>
<button id="btnExit">Exit</button>

</div>

<script>

/* =========================
   🧠 STATE ENGINE V1.4
========================= */

const State = {
  mode: "turnier",
  players: ["Marco","Stefan","David","Tobias","Chris","Werner"],
  selected: {},
  schedule: [],
  index: 0,
  finished: false,
  timer: null,
  timeLeft: 0
};

/* =========================
   INIT
========================= */

function init(){
  const box = document.getElementById("players");
  box.innerHTML = "";

  State.players.forEach(p=>{
    State.selected[p] = true;

    const row = document.createElement("div");
    row.className="playerRow";

    const cb = document.createElement("input");
    cb.type="checkbox";
    cb.checked=true;

    cb.onchange=()=>State.selected[p]=cb.checked;

    row.appendChild(cb);
    row.appendChild(document.createTextNode(p));

    box.appendChild(row);
  });
}

/* =========================
   HELPERS
========================= */

function activePlayers(){
  return State.players.filter(p=>State.selected[p]);
}

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

/* =========================
   GROUP ENGINE (STABLE)
========================= */

function groupRound(p,r){

  if(p.length===4)
    return {a:[p[0],p[1]],b:[p[2],p[3]],bank:[]};

  if(p.length===5){
    return (r%2===0)
    ? {a:[p[0],p[1]],b:[p[2],p[3]],bank:[p[4]]}
    : {a:[p[2],p[3]],b:[p[0],p[1]],bank:[p[4]]};
  }

  if(p.length===6){
    const A=[p[0],p[1]];
    const B=[p[2],p[3]];
    const C=[p[4],p[5]];

    return (r%3===0)?{a:A,b:B,bank:C}
         :(r%3===1)?{a:B,b:C,bank:A}
         :{a:C,b:A,bank:B};
  }

  return {a:[],b:[],bank:[]};
}

/* =========================
   GENERATE ENGINE
========================= */

function generate(){

  const p = activePlayers();

  if(p.length<4){
    alert("Mindestens 4 Spieler");
    return;
  }

  State.schedule = [];
  State.index = 0;
  State.finished = false;

  clearInterval(State.timer);

  const rounds = Math.floor(+totalTime.value / +matchTime.value);

  for(let r=0;r<rounds;r++){

    let a=[],b=[],bank=[];

    if(State.mode==="turnier"){

      let pool = shuffle(p);

      if(p.length===6){
        bank=[pool[0],pool[1]];
        let rest=pool.slice(2);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }

      else if(p.length===5){
        bank=[pool[0]];
        let rest=pool.slice(1);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }

      else{
        a=[pool[0],pool[1]];
        b=[pool[2],pool[3]];
      }
    }

    if(State.mode==="gruppe"){
      const g = groupRound(p,r);
      a=g.a; b=g.b; bank=g.bank;
    }

    State.schedule.push({a,b,bank});
  }

  render();
  update();
}

/* =========================
   REMIX (100% CLEAN)
========================= */

function remix(){
  clearInterval(State.timer);
  State.schedule=[];
  State.index=0;
  State.finished=false;
  generate();
}

/* =========================
   UI
========================= */

function render(){
  const box=document.getElementById("preview");
  box.innerHTML="";

  State.schedule.forEach((s,i)=>{
    const d=document.createElement("div");
    d.innerText=`R${i+1}: ${s.a.join("/")} vs ${s.b.join("/")} | Bank: ${s.bank.join(", ")||"keine"}`;
    box.appendChild(d);
  });
}

function update(){
  const s=State.schedule[State.index];
  if(!s)return;

  document.getElementById("mode").innerText=
    State.mode==="turnier"?"🏆 Turnier":"👥 Gruppe";

  document.getElementById("round").innerText="Runde "+(State.index+1);
  document.getElementById("teams").innerText=
    s.a.join(" / ")+" vs "+s.b.join(" / ");
  document.getElementById("bank").innerText=
    "Bank: "+(s.bank.join(", ")||"keine");
}

/* =========================
   EVENTS (STABIL)
========================= */

document.getElementById("btnTurnier").onclick=()=>State.mode="turnier";
document.getElementById("btnGruppe").onclick=()=>State.mode="gruppe";

document.getElementById("btnGenerate").onclick=generate;
document.getElementById("btnRemix").onclick=remix;

/* INIT */
init();

</script>

</body>
</html>
