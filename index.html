<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Manager V2</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

input, select, button {
    width:90%;
    padding:10px;
    margin:5px;
    font-size:18px;
}

button {
    background:#222;
    color:white;
    border:none;
    border-radius:8px;
}

.timer {
    font-size:60px;
    margin:10px;
}

.box {
    margin:10px;
    padding:10px;
    background:#1a1a1a;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>Padel Manager V2</h2>

<div id="setup">

<input id="p1" placeholder="Spieler 1">
<input id="p2" placeholder="Spieler 2">
<input id="p3" placeholder="Spieler 3">
<input id="p4" placeholder="Spieler 4">
<input id="p5" placeholder="Spieler 5">
<input id="p6" placeholder="Spieler 6">

<select id="count">
<option value="4">4 Spieler</option>
<option value="5">5 Spieler</option>
<option value="6">6 Spieler</option>
</select>

<select id="time">
<option value="120">120 Minuten</option>
<option value="180">180 Minuten</option>
</select>

<button onclick="start()">Spiel starten</button>

</div>

<div id="game" style="display:none">

<div class="timer" id="timer">00:00:00</div>

<div class="box">
<b>Runde:</b> <span id="round">1</span><br>
<b>Matchzeit:</b> 20 Minuten
</div>

<div class="box" id="current"></div>
<div class="box" id="next"></div>

<button onclick="toggle()">Start / Pause</button>
<button onclick="nextRound()">Nächste Runde</button>

</div>

<script>

let players=[];
let order=[];
let round=0;

let total=0;
let time=0;
let running=false;
let interval;

let matchTime=20*60;

let schedule=[];
let current=0;

function start(){

players=[
p1.value,p2.value,p3.value,p4.value,p5.value,p6.value
].filter(x=>x);

players=players.slice(0,parseInt(count.value));

total=parseInt(time.value)*60;
time=total;

buildSchedule();

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

render();
}

function buildSchedule(){

schedule=[];

let p=[...players];

if(p.length===4){
schedule=[
[p[0],p[1],p[2],p[3]],
[p[0],p[2],p[1],p[3]],
[p[0],p[3],p[1],p[2]]
];
}

if(p.length===5 || p.length===6){

// simple fair rotation
for(let i=0;i<10;i++){

let rot=[...p];

// rotate array
for(let r=0;r<i;r++){
rot.push(rot.shift());
}

let a=[rot[0],rot[1]];
let b=[rot[2],rot[3]];
let bench=rot.slice(4);

schedule.push({a,b,bench});
}
}

}

function render(){

let game=schedule[current];

if(!game) return;

document.getElementById("round").innerText=current+1;

document.getElementById("current").innerHTML=
"<b>JETZT</b><br>"+
"A: "+game.a.join(" + ")+"<br>"+
"B: "+game.b.join(" + ")+"<br>"+
(game.bench.length?"Pause: "+game.bench:"");

let next=schedule[current+1];

document.getElementById("next").innerHTML=
next?
"<b>NÄCHSTES MATCH</b><br>"+
"A: "+next.a.join(" + ")+"<br>"+
"B: "+next.b.join(" + ")+"<br>"+
(next.bench.length?"Pause: "+next.bench:"")
:
"<b>NÄCHSTES MATCH</b><br>— Ende —";
}

function nextRound(){

if(current < schedule.length-1){
current++;
render();
}
}

function toggle(){

if(running){
clearInterval(interval);
running=false;
}else{
interval=setInterval(()=>{
if(time>0){
time--;
document.getElementById("timer").innerText=format(time);
}
},1000);
running=true;
}
}

function format(s){
let h=String(Math.floor(s/3600)).padStart(2,"0");
let m=String(Math.floor((s%3600)/60)).padStart(2,"0");
let sec=String(s%60).padStart(2,"0");
return h+":"+m+":"+sec;
}

</script>

</body>
</html>
