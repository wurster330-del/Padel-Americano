<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PADEL-GÖTTER PRO 1.0 Build 1.1</title>
<style>
body{font-family:Arial,sans-serif;background:#f2f2f2;padding:20px}
.box{max-width:900px;margin:auto;background:white;padding:20px;border-radius:20px}
button,input,select{font-size:22px;padding:12px;margin:5px;border-radius:10px}
button{cursor:pointer}
.green{background:#198754;color:white}
.red{background:#dc3545;color:white}
.card{background:#eee;padding:15px;margin:10px;border-radius:12px;font-size:22px}
#kiosk{display:none;position:fixed;inset:0;background:#111;color:white;text-align:center;padding:30px}
.big{font-size:55px;font-weight:bold}
.timer{font-size:120px;font-weight:bold}
</style>
</head>
<body>
<div class="box" id="planung">
<h1>🏆 PADEL-GÖTTER PRO</h1>
<p>Spieler</p>
<input id="names" value="Marco,Stefan,David,Tobias,Chris,Werner">
<p>Gesamtzeit Minuten</p>
<input id="time" value="180">
<br>
<button class="green" onclick="createPlan()">SPIELPLAN ERSTELLEN</button>
<div id="list"></div>
</div>

<div id="kiosk">
<div class="big">🏆 PADEL-GÖTTER PRO</div>
<div id="round" class="big"></div>
<div id="match" class="big"></div>
<div class="timer" id="clock">00:00</div>
<button class="green" onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button class="green" onclick="next()">NÄCHSTE RUNDE</button>
<br>
<button class="red" onclick="exitKiosk()">EXIT</button>
</div>

<script>
let games=[],idx=0,sec=0,handle=null;

function createPlan(){
 let p=document.getElementById('names').value.split(',').map(x=>x.trim());
 let t=Math.floor(Number(document.getElementById('time').value)/15);
 games=[];
 for(let i=0;i<15;i++){
  games.push({a:p[i%6]+" + "+p[(i+1)%6],b:p[(i+2)%6]+" + "+p[(i+3)%6],bank:p[(i+4)%6]+", "+p[(i+5)%6],min:t});
 }
 let out="<h2>Spielplan</h2>";
 games.forEach((g,i)=>out+=`<div class="card">Runde ${i+1}<br>${g.a}<br>gegen<br>${g.b}<br>Bank: ${g.bank}<br>${g.min} Minuten</div>`);
 out+="<button class='green' onclick='openKiosk()'>KIOSK STARTEN</button>";
 document.getElementById('list').innerHTML=out;
}

function openKiosk(){planung.style.display='none';kiosk.style.display='block';idx=0;show();}
function show(){let g=games[idx];round.innerHTML="Runde "+(idx+1)+" / "+games.length;match.innerHTML=g.a+"<br>VS<br>"+g.b+"<br>Bank: "+g.bank;sec=g.min*60;display();}
function display(){clock.innerHTML=String(Math.floor(sec/60)).padStart(2,'0')+":"+String(sec%60).padStart(2,'0');}
function start(){if(handle)return;handle=setInterval(()=>{if(sec>0){sec--;display()}else{next()}},1000)}
function pause(){clearInterval(handle);handle=null}
function next(){pause();idx++;if(idx<games.length)show();else{round.innerHTML="🏆 beendet";match.innerHTML=""}}
function exitKiosk(){pause();kiosk.style.display='none';planung.style.display='block'}
</script>
</body>
</html>
