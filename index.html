<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Manager</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
}

.screen { display: none; padding: 30px; }
.active { display: block; }

h1 { margin-top: 0; }

button {
  font-size: 22px;
  padding: 14px 20px;
  margin: 8px;
  border: none;
  border-radius: 10px;
}

.selected {
  background: #2ea043 !important;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 20px 0;
}

/* COURT */
#courtScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#timer {
  font-size: 260px;
  font-weight: 900;
}

#courtMatch {
  font-size: 60px;
  margin-bottom: 20px;
}

#countdown {
  font-size: 100px;
  color: orange;
}
</style>
</head>

<body>

<!-- SETUP -->
<div id="setupScreen" class="screen active">

<h1>🎾 Setup Spielabend</h1>

<h2>👥 Spieleranzahl</h2>
<button onclick="setPlayers(4)">4 Spieler</button>
<button onclick="setPlayers(5)">5 Spieler</button>
<button onclick="setPlayers(6)">6 Spieler</button>

<h2>⏱️ Spielzeit</h2>
<button onclick="setTime(120)">120 min</button>
<button onclick="setTime(180)">180 min</button>

<h2>➕ Extra Spieler</h2>
<button onclick="togglePlayer('Christian')">Christian</button>
<button onclick="togglePlayer('Tobias')">Tobias</button>

<button style="background:#2ea043;color:white;font-size:26px"
onclick="startGame()">START SPIELABEND</button>

</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<h2>Spielleiter</h2>
<div id="matchInfo"></div>

<button onclick="nextMatch()">NEXT</button>
<button onclick="startCourt()">START</button>

</div>

<!-- COURT -->
<div id="courtScreen">

<div id="courtMatch"></div>
<div id="countdown"></div>
<div id="timer"></div>

</div>

<script>

let selectedPlayers = 4;
let totalTime = 120 * 60;
let extraPlayers = [];

let matches = [];
let current = 0;
let seconds;
let timer;

// SOUND
function beep() {
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  osc.frequency.value = 800;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),200);
}

// SETUP
function setPlayers(n) {
  selectedPlayers = n;
}

function setTime(min) {
  totalTime = min * 60;
}

function togglePlayer(name) {
  if(extraPlayers.includes(name)) {
    extraPlayers = extraPlayers.filter(p => p !== name);
  } else {
    extraPlayers.push(name);
  }
}

// MATCH GENERATION (simple demo)
function generateMatches() {
  let base = ["Werner","Marco","David","Stefan"];

  base = base.concat(extraPlayers);

  matches = [
    [base[0]+" + "+base[1], base[2]+" + "+base[3]]
  ];

  if(base.length > 4) {
    matches.push([base[0]+" + "+base[2], base[1]+" + "+base[3]]);
  }
}

// START GAME
function startGame() {
  generateMatches();
  seconds = totalTime;

  document.getElementById("setupScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  showMatch();
}

// MATCH
function showMatch() {
  document.getElementById("matchInfo").innerHTML =
    matches[current][0] + "<br>vs<br>" + matches[current][1];
}

function nextMatch() {
  current = (current + 1) % matches.length;
  showMatch();
}

// COURT
function startCourt() {
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("courtScreen").style.display = "flex";

  document.getElementById("courtMatch").innerHTML =
    matches[current][0] + " VS " + matches[current][1];

  startCountdown(10);
}

function startCountdown(s) {
  let c = s;
  const el = document.getElementById("countdown");

  let i = setInterval(()=>{
    el.innerText = "Start in " + c;
    c--;
    if(c < 0){
      clearInterval(i);
      el.innerText = "";
      beep();
      startTimer();
    }
  },1000);
}

function startTimer() {
  const el = document.getElementById("timer");

  timer = setInterval(()=>{

    let m = Math.floor(seconds/60);
    let s = seconds%60;

    el.innerText =
      String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

    seconds--;

    if(seconds < 0){
      clearInterval(timer);
      end();
    }

  },1000);
}

function end() {
  beep();
  document.getElementById("courtScreen").innerHTML =
    "<h1 style='font-size:80px'>MATCH BEENDET</h1>";
}

</script>

</body>
</html>
