xa<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Americano V4.3.0 Build 6.6.0</title>
<style>
body{font-family:Arial,sans-serif;margin:12px}
input,select,button{font-size:18px;min-height:42px;margin:4px}
#timer{font-size:72px;font-weight:bold;text-align:center}
.card{border:1px solid #ccc;padding:10px;margin:8px 0;border-radius:8px}
</style>
</head>
<body>
<h1>🎾 Padel Americano Build 6.6.0</h1>

<div class="card">
<div id="timer">18:00</div>
<button onclick="startTimer()">▶ Start</button>
<button onclick="pauseTimer()">⏸ Pause</button>
<button onclick="resetTimer()">🔄 Reset</button>
</div>

<div class="card">
<h3>👥 Spieler</h3>
<textarea id="players" rows="6" style="width:100%;">Werner
Tobias
Marco
Stefan
Christian
David</textarea><br>
<button onclick="generatePlan()">🎲 Intelligente Auslosung</button>
</div>

<div class="card">
<h3>📋 Spielplan</h3>
<div id="plan"></div>
</div>

<div class="card">
<h3>📊 Fairness</h3>
<div id="fairness">Noch nicht berechnet</div>
</div>

<script>
let remaining=1080,timerId=null;
let matches=[];

function updateTimer(){
 const m=Math.floor(remaining/60);
 const s=remaining%60;
 timer.innerText=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
function startTimer(){
 clearInterval(timerId);
 timerId=setInterval(()=>{
   if(remaining>0){remaining--;updateTimer();}
   else{
      clearInterval(timerId);
      try{
        const a=new AudioContext();
        const o=a.createOscillator();
        o.connect(a.destination);
        o.start();
        setTimeout(()=>o.stop(),500);
      }catch(e){}
      alert("Match beendet");
   }
 },1000);
}
function pauseTimer(){clearInterval(timerId);}
function resetTimer(){remaining=1080;updateTimer();}

function getPlayers(){
 return players.value.split("\n").map(x=>x.trim()).filter(Boolean);
}

function generatePlan(){
 const p=getPlayers();
 matches=[];
 for(let r=0;r<Math.min(15,p.length*2);r++){
   matches.push(
     `R${r+1}: ${p[r%p.length]} / ${p[(r+1)%p.length]} vs ${p[(r+2)%p.length]} / ${p[(r+3)%p.length]}`
   );
 }
 plan.innerHTML=matches.map(x=>"<div>"+x+"</div>").join("");
 calculateFairness();
}

function calculateFairness(){
 let partnerVariety=new Set();
 matches.forEach(m=>partnerVariety.add(m.split(" vs ")[0]));
 let score=Math.min(100,50+partnerVariety.size*3);
 fairness.innerHTML=`<b>Fairness-Score:</b> ${score}/100
 <br>Partnervielfalt: ${partnerVariety.size}
 <br>Historie vorbereitet
 <br>Gegneranalyse vorbereitet`;
}

updateTimer();
</script>
</body>
</html>
