<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V2.1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
  text-align:center;
}

/* ADMIN */
#admin{padding:20px;}
.panel{
  background:#255d3d;
  padding:15px;
  border-radius:12px;
  margin:10px auto;
  max-width:800px;
}
.playerBox{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.player{
  background:#1f6b42;
  padding:8px;
  border-radius:8px;
}

/* COURT */
#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:15px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
}

/* BIG TIMER */
#matchTime{
  font-size:22vh;
  font-weight:bold;
}

/* EVENT */
#eventTime{
  font-size:5vh;
}

/* TEAMS */
#teams{
  font-size:5vh;
  font-weight:bold;
}

/* NEXT */
#nextBox{
  margin-top:10px;
  font-size:3vh;
  color:#ffd966;
}

/* BUTTONS */
button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:#2e8b57;
  color:white;
}

.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:#b33a3a;
}
</style>
</head>

<body>

<!-- ================= ADMIN ================= -->
<div id="admin">

<h1>🎾 Padel Terminal V2.1</h1>

<div class="panel">
<h3>Spieler</h3>
<div id="playerBox" class="playerBox"></div>
</div>

<div class="panel">
<h3>Matchzeit</h3>
<select id="matchSelect">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>
</div>

<div class="panel">
<h3>Spielabend</h3>
<select id="eventSelect">
  <option value="120" selected>120</option>
  <option value="180">180</option>
</select>
</div>

<div class="panel">
<button onclick="start()">▶ START</button>
</div>

</div>

<!-- ================= COURT ================= -->
<div id="court">

<button class="exit" onclick="exit()">❌ EXIT</button>

<div class="top">
  <div id="eventTime">120:00</div>
  <div>COURT 1</div>
</div>

<div id="matchTime">18:00</div>

<div id="teams"></div>

<div id="nextBox"></div>

<div>
<button onclick="startMatch()">▶ START MATCH</button>
<button onclick="pause()">⏸ PAUSE</button>
<button onclick="next()">➡ NEXT</button>
</div>

</div>

<script>

/* ================= DATA ================= */

const allPlayers=["Tobias","Werner","Christian","Stefan","David","Marco"];

let active=new Set(allPlayers);
let rotation=0;

/* TIMERS */
let event={total:0,remain:0};
let match={total:0,remain:0,interval:null};

/* ================= PLAYERS ================= */

function renderPlayers(){
  const box=document.getElementById("playerBox");
  box.innerHTML="";

  allPlayers.forEach(p=>{
    box.innerHTML+=`
      <label class="player">
        <input type="checkbox" checked onchange="toggle('${p}',this.checked)">
        ${p}
      </label>
    `;
  });
}

function toggle(name,checked){
  if(checked) active.add(name);
  else active.delete(name);
}

/* ================= START ================= */

function start(){

  match.total=parseInt(matchSelect.value)*60;
  match.remain=match.total;

  event.total=parseInt(eventSelect.value)*60;
  event.remain=event.total;

  admin.style.display="none";
  court.style.display="flex";

  render();
}

/* ================= ROTATION ================= */

function getList(){
  return [...active];
}

function getTeams(offset=0){

  const list=getList();
  let a=[],b=[],c=[];

  for(let i=0;i<list.length;i++){
    let idx=(i+rotation+offset)%list.length;

    if(i<2)a.push(list[idx]);
    else if(i<4)b.push(list[idx]);
    else c.push(list[idx]);
  }

  return{a,b,c};
}

/* ================= NEXT MATCH PREVIEW ================= */

function getNext(){
  return getTeams(2);
}

/* ================= MATCH ================= */

function startMatch(){

  if(match.interval) return;

  match.interval=setInterval(()=>{

    match.remain--;
    event.remain--;

    if(match.remain<=0){
      next();
    }

    render();

  },1000);
}

function pause(){
  clearInterval(match.interval);
  match.interval=null;
}

/* ================= NEXT ================= */

function next(){
  rotation=(rotation+2)%active.size;
  match.remain=match.total;
}

/* ================= EXIT ================= */

function exit(){
  pause();
  court.style.display="none";
  admin.style.display="block";
}

/* ================= RENDER ================= */

function render(){

  let em=Math.floor(event.remain/60);
  let es=event.remain%60;

  let mm=Math.floor(match.remain/60);
  let ms=match.remain%60;

  eventTime.textContent=em+":"+String(es).padStart(2,"0");
  matchTime.textContent=mm+":"+String(ms).padStart(2,"0");

  let t=getTeams();
  let n=getNext();

  teams.innerHTML=
    "TEAM A: "+t.a.join(" | ")+"<br>"+
    "TEAM B: "+t.b.join(" | ")+"<br>"+
    "BANK: "+t.c.join(" | ");

  nextBox.innerHTML=
    "➡ NÄCHSTES MATCH<br>"+
    n.a.join(" | ")+" vs "+n.b.join(" | ")+"<br>"+
    "Bank: "+n.c.join(" | ");
}

/* INIT */
renderPlayers();
render();

</script>

</body>
</html>
