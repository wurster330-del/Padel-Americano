 <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Manager V11.0 Build 0007 FIX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* BUTTONS */
button{
  border:none;
  padding:12px 14px;
  border-radius:10px;
  color:#fff;
  margin:4px;
  cursor:pointer;
  font-weight:bold;
  background:#1f6f4a;
}

/* MODE */
.mode-btn.active{
  box-shadow:0 0 10px #00ff99;
}

.mode-btn.turnier.active{
  background:#2e8b57;
}

.mode-btn.gruppen.active{
  background:#1e90ff;
}

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:8px;
  margin:5px 0;
}

.playerRow input[type="text"]{
  width:140px;
}

/* KIOSK */
.kioskMode #app{ display:none; }
.kioskMode #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:25px;
}

.kioskTimer{
  font-size:140px;
  color:#00ff99;
}

.kioskBox{
  font-size:22px;
  margin:6px;
}

/* PIN */
#pinOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  text-align:center;
  padding-top:120px;
  z-index:9999;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 Build 0007 FIX RESTORE</div>
  <div>
    <button onclick="enterKiosk()">▶ Kiosk</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="section">
<h3>⚙️ Setup</h3>

<label>Gesamtzeit:</label>
<select id="total">
  <option value="120">120</option>
  <option value="180" selected>180</option>
</select>

<br><br>

<label>Spielzeit:</label>
<select id="match">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>

<br><br>

<div id="rounds">Runden: -</div>
</div>

<!-- MODE RESTORED -->
<div class="section">
<h3>🎛 Modus</h3>

<button id="btnTurnier"
class="mode-btn turnier active"
onclick="setMode('turnier')">🏆 Turniermodus</button>

<button id="btnGruppen"
class="mode-btn gruppen"
onclick="setMode('gruppen')">👥 Gruppenmodus</button>

</div>

<!-- PLAYERS RESTORED -->
<div class="section">
<h3>👥 Spieler</h3>
<div id="players"></div>
</div>

<!-- PREVIEW -->
<div class="section">
<h3>📊 Vorschau</h3>
<div id="preview">Kein Spielplan</div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div class="kioskTimer" id="ktimer">00:00</div>

<div class="kioskBox" id="teams"></div>
<div class="kioskBox" id="bank"></div>
<div class="kioskBox" id="nextGame"></div>
<div class="kioskBox" id="roundInfo"></div>

<br>

<button onclick="startGame()">▶ Start</button>
<button onclick="nextGame()">➡ Next</button>
<button onclick="openExit()">⛔ Exit</button>

</div>

<!-- PIN -->
<div id="pinOverlay">
<h2>PIN</h2>
<input id="pin" type="password">
<br><br>
<button onclick="checkPin()">OK</button>
</div>

<script>

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;
let matchTime=0;
let timer=null;

/* MODE */
function setMode(m){

  mode=m;

  document.getElementById("btnTurnier").classList.remove("active");
  document.getElementById("btnGruppen").classList.remove("active");

  if(m==="turnier"){
    document.getElementById("btnTurnier").classList.add("active");
  }

  if(m==="gruppen"){
    document.getElementById("btnGruppen").classList.add("active");
  }

  generate();
}

/* PLAYERS RESTORED (CHECKBOX + EDIT) */
function renderPlayers(){

  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox"
        ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">

        <input type="text"
        value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>
    `;
  });
}
renderPlayers();

/* ROUNDS */
function calcRounds(){
  let total=parseInt(document.getElementById("total").value);
  let match=parseInt(document.getElementById("match").value);
  return Math.floor(total/match);
}

/* TURNIER */
function buildSchedule(){

  let list=players.filter(p=>p.active).map(p=>p.name);
  schedule=[];

  let rounds=calcRounds();

  for(let r=0;r<rounds;r++){

    let rotated=[...list];

    for(let i=0;i<r;i++){
      rotated.push(rotated.shift());
    }

    schedule.push({
      a:[rotated[0],rotated[1]],
      b:[rotated[2],rotated[3]],
      bank:rotated.slice(4),
      round:r+1
    });
  }
}

/* GRUPPEN */
function buildGroupSchedule(){

  let list=players.filter(p=>p.active).map(p=>p.name);
  schedule=[];

  let rounds=calcRounds();

  for(let r=0;r<rounds;r++){

    let rotated=[...list];

    for(let i=0;i<r;i++){
      rotated.push(rotated.shift());
    }

    let g1=[rotated[0],rotated[1]];
    let g2=[rotated[2],rotated[3]];
    let g3=[rotated[4],rotated[5]];

    let pattern=[
      [g1,g2],
      [g1,g3],
      [g2,g3]
    ];

    let p=pattern[r%3];

    schedule.push({
      a:p[0],
      b:p[1],
      bank:[g1,g2,g3].flat().filter(x=>!p[0].includes(x) && !p[1].includes(x)),
      round:r+1
    });
  }
}

/* GENERATE */
function generate(){

  if(mode==="turnier") buildSchedule();
  if(mode==="gruppen") buildGroupSchedule();

  index=0;
  renderPreview();
  update();
}

/* PREVIEW */
function renderPreview(){

  if(!schedule.length){
    document.getElementById("preview").innerHTML="Kein Spielplan";
    return;
  }

  let html="<b>Spielplan</b><br><br>";

  schedule.forEach((s,i)=>{
    html+=`
      Runde ${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}<br>
      Bank: ${s.bank.join(", ")||"-"}<br><br>
    `;
  });

  document.getElementById("preview").innerHTML=html;
}

/* KIOSK */
function enterKiosk(){
  document.body.classList.add("kioskMode");
}

/* GAME */
function startGame(){
  index=0;
  matchTime=parseInt(document.getElementById("match").value)*60;
  update();
  startTimer();
}

function nextGame(){
  index++;
  if(index>=schedule.length) index=0;
  matchTime=parseInt(document.getElementById("match").value)*60;
  update();
}

/* TIMER */
function startTimer(){

  if(timer) return;

  timer=setInterval(()=>{

    if(matchTime>0) matchTime--;

    let m=Math.floor(matchTime/60);
    let s=matchTime%60;

    document.getElementById("ktimer").innerText=
      m+":"+String(s).padStart(2,"0");

  },1000);
}

/* UPDATE */
function update(){

  let s=schedule[index];
  if(!s) return;

  document.getElementById("teams").innerHTML=
    "A: "+s.a.join(" / ")+"<br>B: "+s.b.join(" / ");

  document.getElementById("bank").innerHTML=
    "Bank: "+(s.bank.join(", ")||"-");

  document.getElementById("roundInfo").innerHTML=
    "Runde "+(index+1)+" / "+schedule.length;

  document.getElementById("nextGame").innerHTML=
    schedule[index+1]
    ? "Nächstes Spiel: "+schedule[index+1].a.join(" / ")+" vs "+schedule[index+1].b.join(" / ")
    : "Nächstes Spiel: -";
}

/* EXIT */
function openExit(){
  document.getElementById("pinOverlay").style.display="block";
}

function checkPin(){
  if(document.getElementById("pin").value==="1234"){
    document.body.classList.remove("kioskMode");
  }
  document.getElementById("pin").value="";
  document.getElementById("pinOverlay").style.display="none";
}

/* INIT */
generate();

</script>

</body>
</html>
