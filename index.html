<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Americano V5.0.0 Build 7.1.0</title>
<style>
body{font-family:Arial,sans-serif;margin:10px}
.card{border:1px solid #ccc;border-radius:10px;padding:12px;margin:10px 0}
button{font-size:22px;min-height:60px;margin:4px}
#timer{
  font-size:220px;
  font-weight:bold;
  text-align:center;
  line-height:1;
}
#round{
  font-size:42px;
  text-align:center;
  margin:10px;
}
.fullscreen{
 position:fixed;
 inset:0;
 background:white;
 z-index:9999;
 padding-top:40px;
}
</style>
</head>
<body>
<h1>🎾 Padel Americano Build 7.1.0</h1>

<div class="card" id="timerCard">
<div id="round">Runde 1 von 10</div>
<div id="timer">18:00</div>
<div style="text-align:center">
<button onclick="startTimer()">▶️ Start</button>
<button onclick="pauseTimer()">⏸️ Pause</button>
<button onclick="resetTimer()">🔄 Reset</button>
<button onclick="toggleFullscreen()">📺 Vollbild</button>
</div>
</div>

<div class="card">
<h3>Neu in 7.1.0</h3>
<ul>
<li>220px XXL-Timer</li>
<li>Vollbildmodus für den Platz</li>
<li>Automatischer Rundenzähler</li>
<li>Signalton bei Rundenende</li>
<li>10 Runden à 18 Minuten = 180 Minuten</li>
</ul>
</div>

<script>
let remaining=1080;
let round=1;
let maxRounds=10;
let timerId=null;

function draw(){
 let m=Math.floor(remaining/60);
 let s=remaining%60;
 document.getElementById('timer').innerText=
 String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
 document.getElementById('round').innerText=
 'Runde '+round+' von '+maxRounds;
}

function beep(){
 try{
   const a=new AudioContext();
   const o=a.createOscillator();
   o.connect(a.destination);
   o.start();
   setTimeout(()=>o.stop(),700);
 }catch(e){}
}

function startTimer(){
 clearInterval(timerId);
 timerId=setInterval(()=>{
   if(remaining>0){
     remaining--;
     draw();
   }else{
     beep();
     clearInterval(timerId);
     if(round<maxRounds){
       alert('Runde '+round+' beendet');
       round++;
       remaining=1080;
       draw();
     }else{
       alert('🏆 Turnier beendet');
     }
   }
 },1000);
}

function pauseTimer(){ clearInterval(timerId); }

function resetTimer(){
 clearInterval(timerId);
 remaining=1080;
 draw();
}

function toggleFullscreen(){
 document.getElementById('timerCard').classList.toggle('fullscreen');
}

draw();
</script>
</body>
</html>
