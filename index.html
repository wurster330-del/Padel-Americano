<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Court System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f3d26;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* START SCREEN */
#startScreen{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

#startScreen h1{
  font-size:40px;
}

button{
  padding:14px 20px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#2e8b57;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#36a66a;
}

/* COURT MODE */
#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:10px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:18px;
  opacity:0.8;
}

/* TIMER */
#matchTime{
  font-size:22vh;
  font-weight:bold;
}

/* TEAMS */
#teams{
  font-size:5vh;
  font-weight:bold;
  line-height:1.4;
}

/* CONTROL BAR */
.bar{
  display:flex;
  justify-content:center;
  gap:10px;
}

.exit{
  position:absolute;
  top:10px;
  right:10px;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>🎾 Padel Court System</h1>
  <button onclick="startGame()">▶ One Tap Start Game</button>
</div>

<!-- COURT -->
<div id="court">

  <button class="exit" onclick="exitCourt()">❌ Exit</button>

  <div class="top">
    <div id="eventTime">120:00</div>
    <div>COURT 1</div>
  </div>

  <div id="matchTime">18:00</div>

  <div id="teams"></div>

  <div class="bar">
    <button onclick="pauseMatch()">⏸ Pause</button>
    <button onclick="nextMatch()">➡ Next Match</button>
  </div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= DATA ================= */

const players = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let active = [...players];
let rotation = 0;

/* TIMERS */
let event = { total:120*60, remain:120*60 };
let match = { total:18*60, remain:18*60, interval:null };

/* ================= FULLSCREEN ================= */

function goFullScreen(){
  const el = document.documentElement;
  if(el.requestFullscreen){
    el.requestFullscreen();
  }
}

/* ================= START GAME ================= */

function startGame(){
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("court").style.display = "flex";

  goFullScreen();

  startMatch();
}

/* ================= TEAMS ================= */

function getTeams(){

  let a=[], b=[], bench=[];

  for(let i=0;i<active.length;i++){
    let idx = (i + rotation) % active.length;

    if(i < 2) a.push(active[idx]);
    else if(i < 4) b.push(active[idx]);
    else bench.push(active[idx]);
  }

  return {a,b,bench};
}

/* ================= MATCH FLOW ================= */

function startMatch(){
  if(match.interval) return;

  match.interval = setInterval(()=>{

    if(match.remain > 0){
      match.remain--;
      event.remain--;
    } else {
      nextMatch();
    }

    render();

  },1000);
}

function pauseMatch(){
  clearInterval(match.interval);
  match.interval = null;
}

function nextMatch(){

  pauseMatch();
  document.getElementById("beep").play();

  rotation = (rotation + 2) % active.length;
  match.remain = match.total;

  startMatch();
}

/* ================= EXIT ================= */

function exitCourt(){
  pauseMatch();
  document.getElementById("court").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";

  if(document.fullscreenElement){
    document.exitFullscreen();
  }
}

/* ================= RENDER ================= */

function render(){

  let em = Math.floor(event.remain/60);
  let es = event.remain%60;

  let mm = Math.floor(match.remain/60);
  let ms = match.remain%60;

  document.getElementById("eventTime").textContent =
    "Spiel " + String(em).padStart(2,"0")+":"+String(es).padStart(2,"0");

  document.getElementById("matchTime").textContent =
    String(mm).padStart(2,"0")+":"+String(ms).padStart(2,"0");

  const {a,b,bench} = getTeams();

  document.getElementById("teams").innerHTML =
    "A: " + a.join(" | ") + "<br>" +
    "B: " + b.join(" | ") + "<br>" +
    "Bank: " + bench.join(" | ");
}

/* INIT */
render();

</script>

</body>
</html>
