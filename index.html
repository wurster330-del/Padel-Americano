<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Manager</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
}

.screen { display:none; padding:30px; }
.active { display:block; }

button {
  font-size: 22px;
  padding: 14px 18px;
  margin: 6px;
  border-radius: 10px;
  border: none;
}

.selected {
  background:#2ea043 !important;
}

/* COURT */
#courtScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#courtMatch {
  font-size: 70px;
  margin-bottom: 20px;
}

/* 🔥 FIX: TIMER WIEDER GROß */
#timer {
  font-size: 260px;
  font-weight: 900;
  letter-spacing: 2px;
}

/* COUNTDOWN */
#countdown {
  font-size: 110px;
  color: orange;
}
</style>
</head>

<body>

<!-- SETUP -->
<div id="setupScreen" class="screen active">

<h1>🎾 Setup</h1>

<h3>👥 Spieler</h3>

<button onclick="togglePlayer(this,'Werner')">Werner</button>
<button onclick="togglePlayer(this,'Marco')">Marco</button>
<button onclick="togglePlayer(this,'David')">David</button>
<button onclick="togglePlayer(this,'Stefan')">Stefan</button>
<button onclick="togglePlayer(this,'Christian')">Christian</button>
<button onclick="togglePlayer(this,'Tobias')">Tobias</button>

<br><br>

<button style="background:#2ea043;color:white;font-size:24px"
onclick="startGame()">START</button>

</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<h2>Spielleiter</h2>

<div id="matchInfo"></div>

<button onclick="nextMatch()">NEXT</button>
<button onclick="startCourt()">START</button>

</div>

<!-- COURT -->
<div id="courtScreen">

<div id="courtMatch"></div>
<div id="countdown"></div>
<div id="timer"></div>

</div>

<script>

let selectedPlayers = [];
let matches = [];
let current = 0;
let seconds = 1200;
let timer;

// 🔊 SOUND (FIXED)
function beep(freq = 800, duration = 200) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), duration);
}

// PLAYER TOGGLE
function togglePlayer(btn,name){
  if(selectedPlayers.includes(name)){
    selectedPlayers = selectedPlayers.filter(p=>p!==name);
    btn.classList.remove("selected");
  } else {
    selectedPlayers.push(name);
    btn.classList.add("selected");
  }
}

// MATCH GENERATION
function generateMatches(){
  let p = [...selectedPlayers];
  matches = [];

  for(let i=0;i<p.length;i+=4){
    if(p[i+3]){
      matches.push([
        p[i]+" + "+p[i+1],
        p[i+2]+" + "+p[i+3]
      ]);
    }
  }

  if(matches.length===0){
    matches=[["Nicht genug Spieler",""]];
  }
}

// START
function startGame(){
  if(selectedPlayers.length<4){
    alert("Mindestens 4 Spieler");
    return;
  }

  generateMatches();
  document.getElementById("setupScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  showMatch();
}

// SHOW MATCH
function showMatch(){
  document.getElementById("matchInfo").innerHTML =
    matches[current][0]+"<br>vs<br>"+matches[current][1];
}

// NEXT FIXED
function nextMatch(){
  current = (current + 1) % matches.length;
  showMatch();
  beep(900,150); // Feedback Sound
}

// START COURT
function startCourt(){
  beep(1000,200);

  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("courtScreen").style.display="flex";

  document.getElementById("courtMatch").innerHTML =
    matches[current][0]+" VS "+matches[current][1];

  startCountdown(10);
}

// COUNTDOWN
function startCountdown(s){
  let c=s;
  const el=document.getElementById("countdown");

  let i=setInterval(()=>{
    el.innerText="Start in "+c;
    c--;

    if(c<0){
      clearInterval(i);
      el.innerText="";
      beep(1200,200);
      startTimer();
    }
  },1000);
}

// TIMER FIXED
function startTimer(){

  const el=document.getElementById("timer");

  timer=setInterval(()=>{

    let m=Math.floor(seconds/60);
    let s=seconds%60;

    el.innerText =
      String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

    seconds--;

    if(seconds<0){
      clearInterval(timer);
      beep(400,600);

      document.getElementById("courtScreen").innerHTML =
        "<h1 style='font-size:80px'>MATCH BEENDET</h1>";
    }

  },1000);
}

</script>

</body>
</html>
