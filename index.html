 <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel-Götter Kiosk V2.1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

#kiosk{
  text-align:center;
  padding:20px;
}

.big{
  font-size:40px;
  font-weight:bold;
}

.timer{
  font-size:70px;
  margin:20px 0;
  color:#00ff99;
}

.match{
  font-size:30px;
  margin:10px 0;
}

.bank{
  font-size:20px;
  opacity:0.7;
}

button{
  padding:12px 18px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
}

.start{background:#1f6f4a;color:white;}
.next{background:#444;color:white;}
.end{background:#b30000;color:white;}
</style>
</head>

<body>

<div id="kiosk">

<div class="big">🏆 PADEL-GÖTTER</div>

<div class="match" id="match">---</div>

<div class="timer" id="timer">00:00</div>

<div class="bank" id="bank">Bank: -</div>

<div>
<button class="start" onclick="start()">START</button>
<button class="end" onclick="endMatch()">MATCHENDE</button>
<button class="next" onclick="next()">NEXT</button>
</div>

</div>

<script>

/* =====================
   DEMO SPIELPLAN (kommt aus Engine)
===================== */

let schedule = [
  {a:["Marco","Stefan"], b:["David","Tobias"], bank:["Chris","Werner"]},
  {a:["Marco","David"], b:["Stefan","Chris"], bank:["Tobias","Werner"]},
  {a:["Marco","Tobias"], b:["Stefan","Werner"], bank:["David","Chris"]}
];

let index = 0;

let timeLeft = 18 * 60;
let timer = null;
let running = false;

/* =====================
   UI UPDATE
===================== */

function render(){
  let s = schedule[index];

  document.getElementById("match").innerText =
    s.a.join(" & ") + " vs " + s.b.join(" & ");

  document.getElementById("bank").innerText =
    "Bank: " + (s.bank.join(", ") || "-");
}

/* =====================
   TIMER
===================== */

function updateTimer(){
  let m = Math.floor(timeLeft / 60);
  let s = timeLeft % 60;

  document.getElementById("timer").innerText =
    String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}

/* =====================
   START
===================== */

function start(){

  if(running) return;

  running = true;

  timer = setInterval(()=>{

    if(timeLeft > 0){
      timeLeft--;
      updateTimer();
    } else {
      endMatch();
    }

  },1000);
}

/* =====================
   MATCHENDE
===================== */

function endMatch(){

  clearInterval(timer);
  running = false;

  timeLeft = 0;
  updateTimer();

  // optional: Sound
  console.log("🔔 Match beendet");
}

/* =====================
   NEXT MATCH
===================== */

function next(){

  clearInterval(timer);
  running = false;

  index++;

  if(index >= schedule.length){
    index = 0;
  }

  timeLeft = 18 * 60;

  render();
  updateTimer();
}

/* =====================
   INIT
===================== */

render();
updateTimer();

</script>

</body>
</html>
