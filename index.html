  <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Manager V11.0 Build 0003.1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  background:#2e8b57;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
  margin:2px;
}

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:8px;
  margin:5px 0;
}

.playerRow input[type="text"]{
  width:140px;
}

/* KIOSK */
.kioskMode #app{ display:none; }
.kioskMode #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:25px;
}

.kioskTimer{
  font-size:140px;
  color:#00ff99;
  font-weight:bold;
}

.kioskBox{
  font-size:22px;
  margin:6px;
}

/* PIN */
#pinOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  text-align:center;
  padding-top:120px;
  z-index:9999;
}
</style>
</head>

<body>

<!-- START MENU -->
<div id="app">

<div class="topbar">
  <div>🎾 Build 0003.1 FIX</div>
  <div>
    <button onclick="enterKiosk()">▶ Kiosk</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="section">
<h3>⚙️ Setup</h3>

<label>Gesamtzeit:</label>
<select id="total">
  <option value="120">120</option>
  <option value="180" selected>180</option>
</select>

<br><br>

<label>Spielzeit:</label>
<select id="match">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>

<br><br>

<div id="rounds">Runden: -</div>
</div>

<!-- MODE -->
<div class="section">
<h3>🎛 Modus</h3>
<button onclick="mode='turnier'; generate();">Turniermodus</button>
<button onclick="mode='gruppen'; generate();">Gruppenmodus</button>
</div>

<!-- PLAYERS -->
<div class="section">
<h3>👥 Spieler</h3>
<div id="players"></div>
</div>

<!-- PREVIEW -->
<div class="section">
<h3>📊 Vorschau</h3>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div class="kioskTimer" id="ktimer">00:00</div>

<div class="kioskBox" id="teams"></div>
<div class="kioskBox" id="bank"></div>
<div class="kioskBox" id="nextGame"></div>
<div class="kioskBox" id="roundInfo"></div>

<br>

<button onclick="startGame()">▶ Start</button>
<button onclick="nextGame()">➡ Next</button>
<button onclick="openExit()">⛔ Exit</button>

</div>

<!-- PIN -->
<div id="pinOverlay">
<h2>PIN</h2>
<input id="pin" type="password">
<br><br>
<button onclick="checkPin()">OK</button>
</div>

<script>

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;
let matchTime=0;
let timer=null;

/* PLAYERS */
function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";
  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox" ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">
        <input type="text" value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>`;
  });
}
renderPlayers();

/* ROUNDS */
function calcRounds(){
  let total=parseInt(document.getElementById("total").value);
  let match=parseInt(document.getElementById("match").value);
  let rounds=Math.floor(total/match);
  document.getElementById("rounds").innerText="Runden: "+rounds;
  return rounds;
}

/* SHUFFLE */
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

/* GROUP MODE -> schedule */
function generateGroups(){

  let list=players.filter(p=>p.active).map(p=>p.name);
  list=shuffle(list);

  let g1=[list[0],list[1]];
  let g2=[list[2],list[3]];
  let g3=[list[4],list[5]];

  let rounds=calcRounds();

  schedule=[];

  let pattern=[
    [g1,g2],
    [g1,g3],
    [g2,g3]
  ];

  for(let r=0;r<rounds;r++){

    let p=pattern[r%3];

    schedule.push({
      a:p[0],
      b:p[1],
      bank:[g1,g2,g3]
        .filter(x=>x!==p[0] && x!==p[1])
        .flat(),
      round:r+1
    });
  }
}

/* TURNIER MODE */
function generateTournament(){

  let list=players.filter(p=>p.active).map(p=>p.name);
  list=shuffle(list);

  let rounds=calcRounds();

  schedule=[];

  for(let r=0;r<rounds;r++){

    list=shuffle(list);

    schedule.push({
      a:[list[0],list[1]],
      b:[list[2],list[3]],
      bank:list.slice(4),
      round:r+1
    });
  }
}

/* MASTER GENERATE */
function generate(){
  if(mode==="gruppen") generateGroups();
  else generateTournament();

  renderPreview();
}

/* PREVIEW FIX */
function renderPreview(){

  let html="";

  if(!schedule.length){
    html="Kein Spielplan";
  } else {
    html="<b>Spielplan</b><br><br>";

    schedule.forEach((s,i)=>{
      html+=`
        Runde ${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}<br>
        Bank: ${s.bank.join(", ")}<br><br>
      `;
    });
  }

  document.getElementById("preview").innerHTML=html;
}

/* START */
function startGame(){
  index=0;
  matchTime=parseInt(document.getElementById("match").value)*60;
  update();
  startTimer();
}

/* TIMER */
function startTimer(){
  if(timer) return;

  timer=setInterval(()=>{

    if(matchTime>0) matchTime--;

    let m=Math.floor(matchTime/60);
    let s=matchTime%60;

    document.getElementById("ktimer").innerText=
      m+":"+String(s).padStart(2,"0");

  },1000);
}

/* NEXT */
function nextGame(){
  index++;
  if(index>=schedule.length) index=0;
  matchTime=parseInt(document.getElementById("match").value)*60;
  update();
}

/* UPDATE KIOSK */
function update(){

  if(!schedule.length) return;

  let s=schedule[index];

  document.getElementById("teams").innerHTML=
    "A: "+s.a.join(" / ")+"<br>B: "+s.b.join(" / ");

  document.getElementById("bank").innerHTML=
    "Bank: "+(s.bank.join(", ")||"-");

  document.getElementById("roundInfo").innerHTML=
    "Runde "+(index+1)+" / "+schedule.length;

  document.getElementById("nextGame").innerHTML=
    schedule[index+1]
    ? "Nächstes Spiel: "+schedule[index+1].a.join(" / ")+" vs "+schedule[index+1].b.join(" / ")
    : "Nächstes Spiel: -";
}

/* KIOSK */
function enterKiosk(){
  document.body.classList.add("kioskMode");
}

/* EXIT */
function openExit(){
  document.getElementById("pinOverlay").style.display="block";
}

/* PIN */
function checkPin(){
  if(document.getElementById("pin").value==="1234"){
    document.body.classList.remove("kioskMode");
  }
  document.getElementById("pin").value="";
  document.getElementById("pinOverlay").style.display="none";
}

</script>

</body>
</html>
