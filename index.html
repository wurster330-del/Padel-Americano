<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Manager</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
}

.screen { display:none; padding:30px; }
.active { display:block; }

button {
  font-size: 22px;
  padding: 14px 18px;
  margin: 6px;
  border-radius: 10px;
  border: none;
}

.selected {
  background: #2ea043 !important;
  color: white;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

/* COURT */
#courtScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#timer {
  font-size: 240px;
  font-weight: 900;
}
</style>
</head>

<body>

<!-- SETUP -->
<div id="setupScreen" class="screen active">

<h1>🎾 Setup Spielabend</h1>

<h2>👥 Spieler</h2>

<div class="grid">

<button onclick="togglePlayer(this,'Werner')">Werner</button>
<button onclick="togglePlayer(this,'Marco')">Marco</button>
<button onclick="togglePlayer(this,'David')">David</button>
<button onclick="togglePlayer(this,'Stefan')">Stefan</button>
<button onclick="togglePlayer(this,'Christian')">Christian</button>
<button onclick="togglePlayer(this,'Tobias')">Tobias</button>

</div>

<h3>➕ Extraspieler (frei)</h3>
<input id="extraName" placeholder="Name eingeben">

<button onclick="addExtra()">Hinzufügen</button>

<div id="extraList"></div>

<hr>

<h3>⏱️ Matchdauer</h3>
<button onclick="setMatchTime(15)">15 min</button>
<button onclick="setMatchTime(18)">18 min</button>
<button onclick="setMatchTime(20)">20 min</button>

<h3>🏁 Gesamtspielzeit</h3>
<button onclick="setTotalTime(120)">120 min</button>
<button onclick="setTotalTime(180)">180 min</button>

<br><br>

<button style="background:#2ea043;color:white;font-size:26px"
onclick="startGame()">START SPIELABEND</button>

</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<h2>Spielleiter</h2>
<div id="matchInfo"></div>

<button onclick="nextMatch()">NEXT</button>
<button onclick="startCourt()">START</button>

</div>

<!-- COURT -->
<div id="courtScreen">

<div id="courtMatch"></div>
<div id="countdown"></div>
<div id="timer"></div>

</div>

<script>

let players = ["Werner","Marco","David","Stefan","Christian","Tobias"];
let extraPlayers = [];

let selectedPlayers = [];
let matchTime = 20 * 60;
let totalTime = 120 * 60;

let matches = [];
let current = 0;
let seconds;

let timer;

// TOGGLE FIX PLAYERS
function togglePlayer(btn,name){

  if(selectedPlayers.includes(name)){
    selectedPlayers = selectedPlayers.filter(p=>p!==name);
    btn.classList.remove("selected");
  } else {
    selectedPlayers.push(name);
    btn.classList.add("selected");
  }
}

// EXTRA PLAYER
function addExtra(){
  let name = document.getElementById("extraName").value;
  if(!name) return;

  extraPlayers.push(name);
  selectedPlayers.push(name);

  document.getElementById("extraList").innerHTML +=
    "<div>➕ "+name+"</div>";
}

// SETTINGS
function setMatchTime(m){
  matchTime = m * 60;
}

function setTotalTime(m){
  totalTime = m * 60;
}

// MATCH GENERATION
function generateMatches(){

  let pool = [...selectedPlayers];

  matches = [];

  for(let i=0;i<pool.length;i+=4){
    if(pool[i+3]){
      matches.push([
        pool[i]+" + "+pool[i+1],
        pool[i+2]+" + "+pool[i+3]
      ]);
    }
  }

  if(matches.length === 0){
    matches = [["Nicht genug Spieler",""]];
  }
}

// START
function startGame(){

  if(selectedPlayers.length < 4){
    alert("Mindestens 4 Spieler nötig");
    return;
  }

  generateMatches();

  seconds = matchTime;

  document.getElementById("setupScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  showMatch();
}

// MATCH
function showMatch(){
  document.getElementById("matchInfo").innerHTML =
    matches[current][0]+"<br>vs<br>"+matches[current][1];
}

function nextMatch(){
  current = (current + 1) % matches.length;
  showMatch();
}

// COURT
function startCourt(){

  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("courtScreen").style.display="flex";

  document.getElementById("courtMatch").innerHTML =
    matches[current][0]+" VS "+matches[current][1];

  startCountdown(10);
}

function startCountdown(s){
  let c = s;
  const el = document.getElementById("countdown");

  let i=setInterval(()=>{
    el.innerText="Start in "+c;
    c--;
    if(c<0){
      clearInterval(i);
      el.innerText="";
      startTimer();
    }
  },1000);
}

function startTimer(){

  const el = document.getElementById("timer");

  timer = setInterval(()=>{

    let m = Math.floor(seconds/60);
    let s = seconds%60;

    el.innerText =
      String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

    seconds--;

    if(seconds<0){
      clearInterval(timer);
      end();
    }

  },1000);
}

function end(){
  document.getElementById("courtScreen").innerHTML =
    "<h1 style='font-size:80px'>MATCH BEENDET</h1>";
}

</script>

</body>
</html>
