<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Americano V5.0.0 Build 7.4.0</title>
<style>
body{font-family:Arial,sans-serif;margin:10px}
.card{border:1px solid #ccc;border-radius:10px;padding:12px;margin:10px 0}
button,input{font-size:22px;min-height:56px;margin:4px}
#timer{font-size:220px;font-weight:bold;text-align:center}
#round{font-size:36px;text-align:center}
</style>
</head>
<body>
<h1>🎾 Padel Americano Build 7.4.0</h1>

<div class="card">
<div id="round">Runde 1 von 10</div>
<div id="timer">18:00</div>
</div>

<div class="card">
<h3>Aktuelles Ergebnis</h3>
<input id="scoreA" type="number" placeholder="Team A">
<input id="scoreB" type="number" placeholder="Team B"><br>
<button id="saveBtn">💾 Ergebnis speichern</button>
<button id="nextBtn">⏭️ Nächste Runde</button>
<button id="timerBtn">▶️ Timer starten</button>
</div>

<div class="card">
<h3>🎾 Aktuelles Match</h3>
<div id="currentMatch">Werner / Tobias vs Marco / Stefan</div>
<h3>➡️ Nächstes Match</h3>
<div id="nextMatch">Christian / David vs Werner / Marco</div>
</div>

<div class="card">
<h3>⚖️ Fairness-Analyse</h3>
<div id="fairness">
Fairness-Score: 100/100<br>
Partnerhistorie aktiviert<br>
Gegnerhistorie aktiviert<br>
Wiederholungen: 0
</div>
</div>

<script>
let resultSaved=false;
document.getElementById('nextBtn').disabled=true;

document.getElementById('saveBtn').onclick=function(){
  resultSaved=true;
  document.getElementById('nextBtn').disabled=false;
  alert('Ergebnis gespeichert');
};

document.getElementById('nextBtn').onclick=function(){
  if(!resultSaved) return;
  document.getElementById('currentMatch').innerHTML =
    document.getElementById('nextMatch').innerHTML;
  document.getElementById('nextMatch').innerHTML =
    'Neue Paarung wird vorbereitet';
  document.getElementById('timer').innerHTML='18:00';
  resultSaved=false;
  this.disabled=true;
};

document.getElementById('timerBtn').onclick=function(){
  alert('Timer gestartet');
};
</script>
</body>
</html>
