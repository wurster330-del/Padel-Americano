<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Padel Manager</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: white;
      text-align: center;
    }

    .screen { display: none; padding: 40px; }
    .active { display: block; }

    h1, h2 { margin-top: 0; }

    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }

    .player {
      font-size: 24px;
      padding: 20px;
      border: none;
      border-radius: 12px;
      background: #1f6feb;
      color: white;
    }

    .start-btn {
      font-size: 28px;
      padding: 20px 40px;
      border: none;
      border-radius: 12px;
      background: #2ea043;
      color: white;
      margin-top: 20px;
    }

    button {
      font-size: 26px;
      padding: 18px 32px;
      margin: 10px;
      border: none;
      border-radius: 12px;
    }

    #matchInfo {
      font-size: 34px;
      margin: 40px 0;
    }

    /* COURT */
    #courtScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: white;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #courtMatch {
      font-size: 72px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    #countdown {
      font-size: 120px;
      font-weight: 800;
      color: orange;
      margin-bottom: 20px;
    }

    #timer {
      font-size: 280px;
      font-weight: 900;
      letter-spacing: 3px;
    }

    .green { color: #2ecc71; }
    .orange { color: #f39c12; }
    .red { color: #e74c3c; }
  </style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen active">
  <h1>🎾 Padel Manager</h1>

  <div class="players">
    <button class="player">Werner</button>
    <button class="player">Marco</button>
    <button class="player">David</button>
    <button class="player">Stefan</button>
  </div>

  <button id="startBtn" class="start-btn">START SPIELABEND</button>
</div>

<!-- SPIELLEITER -->
<div id="gameScreen" class="screen">
  <h2>Spielleiter</h2>

  <div id="matchInfo"></div>

  <button id="startMatchBtn">START MATCH</button>
  <button id="nextBtn">NEXT MATCH</button>
</div>

<!-- COURT -->
<div id="courtScreen">
  <div id="courtMatch"></div>
  <div id="countdown"></div>
  <div id="timer"></div>
</div>

<script>
const startBtn = document.getElementById("startBtn");
const startMatchBtn = document.getElementById("startMatchBtn");
const nextBtn = document.getElementById("nextBtn");

const startScreen = document.getElementById("startScreen");
const gameScreen = document.getElementById("gameScreen");
const courtScreen = document.getElementById("courtScreen");

const STORAGE_KEY = "padel_state_v1";

const matches = [
  ["Werner + Marco", "David + Stefan"],
  ["Werner + David", "Marco + Stefan"],
  ["Werner + Stefan", "Marco + David"]
];

let currentMatch = 0;
let timer;
let seconds = 1200;

// 🔊 Sound
function beep(freq = 800, duration = 200) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), duration);
}

// 💾 SAVE STATE
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    currentMatch,
    seconds
  }));
}

// 📥 LOAD STATE
function loadState() {
  const data = localStorage.getItem(STORAGE_KEY);
  if (!data) return;

  const state = JSON.parse(data);
  currentMatch = state.currentMatch ?? 0;
  seconds = state.seconds ?? 1200;
}

// MATCH ANZEIGE
function showMatch() {
  document.getElementById("matchInfo").innerHTML =
    matches[currentMatch][0] + "<br>vs<br>" + matches[currentMatch][1];
}

// START
startBtn.addEventListener("click", () => {
  startScreen.classList.remove("active");
  gameScreen.classList.add("active");
  showMatch();
});

// NEXT
nextBtn.addEventListener("click", () => {
  currentMatch = (currentMatch + 1) % matches.length;
  showMatch();
  saveState();
});

// START MATCH
startMatchBtn.addEventListener("click", () => {
  beep();
  startCourt();
});

// COURT MODE
function startCourt() {
  gameScreen.classList.remove("active");
  courtScreen.style.display = "flex";

  document.getElementById("courtMatch").innerHTML =
    matches[currentMatch][0] + " VS " + matches[currentMatch][1];

  startCountdown(10);
}

function startCountdown(sec) {
  let c = sec;
  const cd = document.getElementById("countdown");

  const interval = setInterval(() => {
    cd.innerText = "Start in " + c;
    c--;

    if (c < 0) {
      clearInterval(interval);
      cd.innerText = "";
      beep(1000);
      startTimer();
    }
  }, 1000);
}

function startTimer() {
  const t = document.getElementById("timer");

  timer = setInterval(() => {
    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;

    if (seconds === 600) beep(600, 400);

    let colorClass = "green";
    if (seconds < 300) colorClass = "orange";
    if (seconds < 60) colorClass = "red";

    t.className = colorClass;

    t.innerText =
      String(min).padStart(2, "0") + ":" +
      String(sec).padStart(2, "0");

    seconds--;

    saveState();

    if (seconds < 0) {
      clearInterval(timer);
      endMatch();
    }
  }, 1000);
}

// END MATCH
function endMatch() {
  beep(400, 600);

  courtScreen.innerHTML = "<h1 style='font-size:90px'>MATCH BEENDET</h1>";

  currentMatch = (currentMatch + 1) % matches.length;
  seconds = 1200;

  saveState();

  setTimeout(() => {
    courtScreen.style.display = "none";
    gameScreen.classList.add("active");
    showMatch();
  }, 3000);
}

// INIT
loadState();
showMatch();
</script>

</body>
</html>
