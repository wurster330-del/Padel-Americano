<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Manager V5.0 Beta</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f14;
    color: #fff;
}

header {
    padding: 15px;
    text-align: center;
    background: #1c1c25;
    font-size: 20px;
    font-weight: bold;
}

.screen {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.player {
    font-size: 22px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 20px;
    margin-top: 10px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
}

.primary { background: #2d7dff; color: white; }
.danger { background: #ff4d4d; color: white; }
.gray { background: #333; color: white; }

.timer {
    font-size: 80px;
    text-align: center;
    margin: 40px 0;
}

.match {
    font-size: 26px;
    text-align: center;
    margin: 20px 0;
}
</style>
</head>

<body>

<header>🎾 Padel Manager V5.0 Beta – Build 0001</header>

<!-- SETUP SCREEN -->
<div id="setup" class="screen active">
    <h2>Spielerauswahl</h2>

    <label class="player"><input type="checkbox" value="Werner" checked> Werner</label>
    <label class="player"><input type="checkbox" value="Marco" checked> Marco</label>
    <label class="player"><input type="checkbox" value="David" checked> David</label>
    <label class="player"><input type="checkbox" value="Stefan" checked> Stefan</label>

    <button class="primary" onclick="startGame()">Spiel starten</button>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">

    <div class="timer" id="timer">20:00</div>

    <div class="match" id="matchInfo">Match wird geladen...</div>

    <button class="primary" onclick="toggleTimer()">Start / Pause</button>
    <button class="gray" onclick="nextMatch()">Nächste Runde</button>
</div>

<script>
let players = [];
let pairs = [];
let matchIndex = 0;

let matchTime = 20 * 60;
let timeLeft = matchTime;
let timerRunning = false;
let interval = null;

// FIXED ROTATIONS FOR 4 PLAYERS
function generateMatches(p) {
    return [
        [p[0], p[1], p[2], p[3]],
        [p[0], p[2], p[1], p[3]],
        [p[0], p[3], p[1], p[2]]
    ];
}

function startGame() {
    players = Array.from(document.querySelectorAll('input[type=checkbox]:checked'))
        .map(cb => cb.value);

    if (players.length !== 4) {
        alert("Bitte genau 4 Spieler auswählen!");
        return;
    }

    pairs = generateMatches(players);
    matchIndex = 0;

    document.getElementById("setup").classList.remove("active");
    document.getElementById("game").classList.add("active");

    loadMatch();
}

function loadMatch() {
    let m = pairs[matchIndex];

    document.getElementById("matchInfo").innerHTML =
        `<b>${m[0]} + ${m[1]}</b><br>vs<br><b>${m[2]} + ${m[3]}</b>`;

    resetTimer();
}

function resetTimer() {
    timeLeft = matchTime;
    updateTimer();
    stopTimer();
}

function updateTimer() {
    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;
    document.getElementById("timer").innerText =
        `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function toggleTimer() {
    if (timerRunning) {
        stopTimer();
    } else {
        startTimer();
    }
}

function startTimer() {
    timerRunning = true;
    interval = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            updateTimer();
        } else {
            stopTimer();
            alert("Match beendet!");
        }
    }, 1000);
}

function stopTimer() {
    timerRunning = false;
    clearInterval(interval);
}

function nextMatch() {
    matchIndex++;
    if (matchIndex >= pairs.length) matchIndex = 0;
    loadMatch();
}
</script>

</body>
</html>
