<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal Final</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
  text-align:center;
  transition:0.3s;
}

/* 🔴 WARNING BLINK */
@keyframes blink {
  0% { background:#0b2f1d; }
  50% { background:#7a1c1c; }
  100% { background:#0b2f1d; }
}

.warning {
  animation: blink 1s infinite;
}

/* ================= ADMIN ================= */
#admin{
  padding:20px;
}

.panel{
  background:#255d3d;
  padding:15px;
  border-radius:12px;
  margin:10px auto;
  max-width:850px;
}

.playerBox{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.player{
  background:#1f6b42;
  padding:8px 10px;
  border-radius:8px;
}

/* ================= COURT ================= */
#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:15px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
  opacity:0.9;
}

#eventTime{
  font-size:5vh;
  font-weight:bold;
}

#matchTime{
  font-size:24vh;
  font-weight:bold;
  line-height:1;
}

/* TEAMS */
#teams{
  font-size:6vh;
  font-weight:bold;
  line-height:1.4;
}

/* BUTTONS */
.bar{
  display:flex;
  justify-content:center;
  gap:15px;
}

button{
  padding:14px 20px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#2e8b57;
  color:white;
}

.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:#b33a3a;
}

.startBtn{
  font-size:18px;
  padding:16px 26px;
  background:#3a9d5d;
}
</style>
</head>

<body>

<!-- ================= ADMIN ================= -->
<div id="admin">

<h1>🎾 Padel Terminal</h1>

<div class="panel">
<h3>Spieler Auswahl</h3>
<div id="playerBox" class="playerBox"></div>
</div>

<div class="panel">
<h3>Match Zeit</h3>
<select id="matchSelect">
  <option value="10">10</option>
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
  <option value="25">25</option>
  <option value="30">30</option>
</select>
</div>

<div class="panel">
<h3>Spielabend</h3>
<select id="eventSelect">
  <option value="120" selected>120</option>
  <option value="180">180</option>
</select>
</div>

<div class="panel">
<button class="startBtn" onclick="startCourt()">▶ START COURT</button>
</div>

</div>

<!-- ================= COURT ================= -->
<div id="court">

<button class="exit" onclick="exitCourt()">❌ EXIT</button>

<div class="top">
  <div id="eventTime">120:00</div>
  <div>COURT 1</div>
</div>

<div id="matchTime">18:00</div>

<div id="teams"></div>

<div class="bar">
  <button onclick="startMatch()">▶ START MATCH</button>
  <button onclick="pause()">⏸ PAUSE</button>
  <button onclick="nextMatch()">➡ NEXT</button>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= DATA ================= */

const players = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let active = new Set(players);
let rotation = 0;

/* TIMER */
let event = { total:120*60, remain:120*60 };
let match = { total:18*60, remain:18*60, interval:null };

/* WARNING STATE */
let warningActive = false;

/* ================= ADMIN ================= */

function renderPlayers(){
  const box = document.getElementById("playerBox");
  box.innerHTML = "";

  players.forEach(p=>{
    box.innerHTML += `
      <label class="player">
        <input type="checkbox" checked onchange="toggle('${p}',this.checked)">
        ${p}
      </label>
    `;
  });
}

function toggle(name,checked){
  if(checked) active.add(name);
  else active.delete(name);
}

/* ================= START COURT ================= */

function startCourt(){

  match.total = parseInt(matchSelect.value)*60;
  match.remain = match.total;

  event.total = parseInt(eventSelect.value)*60;
  event.remain = event.total;

  admin.style.display="none";
  court.style.display="flex";

  document.documentElement.requestFullscreen?.();

  render();
}

/* ================= MATCH CONTROL ================= */

function startMatch(){
  if(match.interval) return;

  match.interval = setInterval(()=>{

    if(match.remain>0){
      match.remain--;
      event.remain--;
    } else {
      nextMatch();
    }

    render();

  },1000);
}

function pause(){
  clearInterval(match.interval);
  match.interval=null;
}

/* ================= NEXT MATCH ================= */

function nextMatch(){

  beep.currentTime=0;
  beep.play();

  rotation=(rotation+2)%active.size;
  match.remain=match.total;

  warningActive=false;
  document.body.classList.remove("warning");
}

/* ================= EXIT ================= */

function exitCourt(){

  pause();

  court.style.display="none";
  admin.style.display="block";

  document.exitFullscreen?.();
}

/* ================= TEAMS ================= */

function getTeams(){

  const list=[...active];

  let a=[],b=[],c=[];

  for(let i=0;i<list.length;i++){
    let idx=(i+rotation)%list.length;

    if(i<2)a.push(list[idx]);
    else if(i<4)b.push(list[idx]);
    else c.push(list[idx]);
  }

  return {a,b,c};
}

/* ================= WARNING ================= */

function checkWarning(){

  if(match.remain<=30 && match.remain>0){

    if(!warningActive){
      warningActive=true;
      document.body.classList.add("warning");
    }

    beep.currentTime=0;
    beep.play();

  } else {

    if(warningActive){
      warningActive=false;
      document.body.classList.remove("warning");
    }
  }
}

/* ================= RENDER ================= */

function render(){

  let em=Math.floor(event.remain/60);
  let es=event.remain%60;

  let mm=Math.floor(match.remain/60);
  let ms=match.remain%60;

  eventTime.textContent=em+":"+String(es).padStart(2,"0");
  matchTime.textContent=mm+":"+String(ms).padStart(2,"0");

  let t=getTeams();

  teams.innerHTML=
    "A: "+t.a.join(" | ")+"<br>"+
    "B: "+t.b.join(" | ")+"<br>"+
    "BANK: "+t.c.join(" | ");

  checkWarning();
}

/* INIT */
renderPlayers();
render();

</script>

</body>
</html>
