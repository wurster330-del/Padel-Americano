<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Terminal FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071f14;
  color:white;
}

#wrap{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
  cursor:pointer;
  font-size:15px;
}

input, select{
  padding:6px;
  border-radius:6px;
  border:none;
  margin:4px;
}

.bigTimer{
  font-size:60px;
  text-align:center;
  font-weight:bold;
}

.teamBox{
  font-size:22px;
  font-weight:bold;
  margin:8px 0;
}

.small{
  opacity:0.8;
  font-size:13px;
}

.warning{
  color:red;
  text-align:center;
  display:none;
  font-weight:bold;
}

.blink{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.2;}}

#court{
  background:#0e3d26;
  padding:12px;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="wrap">

<h2>🎾 Padel Club Terminal – FINAL VERSION</h2>

<!-- ================= PLAYERS ================= -->
<div class="panel">
<h3>👥 Spieler</h3>
<div id="players"></div>

<h3>⏱ Einstellungen</h3>
<select id="matchTime">
  <option value="15">15 Min</option>
  <option value="18" selected>18 Min</option>
  <option value="20">20 Min</option>
</select>

<select id="eventTime">
  <option value="120" selected>120 Min</option>
  <option value="180">180 Min</option>
</select>

<br><br>
<button onclick="save()">💾 Speichern</button>
<button onclick="generate()">🏆 Turnier</button>
</div>

<!-- ================= TIMER ================= -->
<div class="panel">

<div class="bigTimer" id="matchTimer">18:00</div>

<div style="text-align:center;">
<button onclick="start()">▶ Start</button>
<button onclick="pause()">⏸ Pause</button>
<button onclick="next()">➡ Next</button>
</div>

<div class="warning" id="warn">⚠ 30 Sekunden</div>

</div>

<div class="panel">
<div class="bigTimer" id="eventTimer">120:00</div>
</div>

<!-- ================= COURT ================= -->
<div id="court"></div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= PLAYERS ================= */

let players=[
 {name:"Tobias",active:true},
 {name:"Werner",active:true},
 {name:"Christian",active:true},
 {name:"Stefan",active:true},
 {name:"David",active:true},
 {name:"Marco",active:true}
];

let schedule=[];
let index=0;

/* ================= TIMER ================= */

let matchSeconds=18*60;
let eventSeconds=120*60;

let match=matchSeconds;
let event=eventSeconds;

let run=null;

/* ================= LOAD PLAYERS ================= */

function renderPlayers(){
 let box=document.getElementById("players");
 box.innerHTML="";

 players.forEach((p,i)=>{
  box.innerHTML+=`
   <div>
    <input type="checkbox" ${p.active?"checked":""}
    onchange="players[${i}].active=!players[${i}].active">

    <input type="text" value="${p.name}"
    onchange="players[${i}].name=this.value">
   </div>
  `;
 });
}

/* ================= SAVE ================= */

function save(){
 localStorage.setItem("padel_final",JSON.stringify(players));
 alert("Gespeichert");
}

/* ================= FAIR GENERATOR ================= */

function generate(){

 let list=players.filter(p=>p.active).map(p=>p.name);

 schedule=[];
 index=0;

 let rounds=list.length;

 let usedPairs={};

 for(let r=0;r<rounds;r++){

  let best=null;

  let rot=[...list.slice(r),...list.slice(0,r)];

  let a=[rot[0],rot[1]];
  let b=[rot[2],rot[3]];
  let bank=rot.slice(4);

  function pairScore(x,y){
   let key=x+"-"+y;
   return usedPairs[key]||0;
  }

  let score =
   pairScore(a[0],a[1]) +
   pairScore(b[0],b[1]);

  best={a,b,bank,round:r+1};

  schedule.push(best);

  // update usage
  function add(x,y){
   let k1=x+"-"+y;
   let k2=y+"-"+x;
   usedPairs[k1]=(usedPairs[k1]||0)+1;
   usedPairs[k2]=(usedPairs[k2]||0)+1;
  }

  add(a[0],a[1]);
  add(b[0],b[1]);
 }

 render();
}

/* ================= TIMER ================= */

function start(){

 if(run) return;

 run=setInterval(()=>{

  match--;
  event--;

  if(match===30){
   warn.style.display="block";
   warn.classList.add("blink");
   beep();
  }

  if(match<=0){
   beep(); beep();
   next();
  }

  render();

 },1000);
}

function pause(){
 clearInterval(run);
 run=null;
}

function next(){
 index++;
 if(index>=schedule.length) index=0;
 match=matchSeconds;
 render();
}

/* ================= RENDER ================= */

function render(){

 matchTimer.textContent =
  Math.floor(match/60)+":"+String(match%60).padStart(2,"0");

 eventTimer.textContent =
  Math.floor(event/60)+":"+String(event%60).padStart(2,"0");

 renderPlayers();

 if(schedule.length===0){
  court.innerHTML="Noch kein Turnier";
  return;
 }

 let s=schedule[index];

 court.innerHTML=`
  <div class="teamBox">TEAM A: ${s.a.join(" | ")}</div>
  <div class="teamBox">TEAM B: ${s.b.join(" | ")}</div>
  <div class="small">Pause: ${s.bank.join(" | ")||"-"}</div>

  <div class="small">Runde ${s.round} / ${schedule.length}</div>
 `;
}

/* ================= SOUND ================= */

function beep(){
 let b=document.getElementById("beep");
 b.currentTime=0;
 b.play();
}

/* ================= INIT ================= */

renderPlayers();
render();

</script>

</body>
</html>
