<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Padel Club Manager V11.0</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:90px;
}

.topbar{
  position:sticky;
  top:0;
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.topbar button{
  background:#2e8b57;
  border:none;
  padding:10px 12px;
  border-radius:8px;
  color:white;
}

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.playerRow{
  display:flex;
  gap:8px;
  margin:4px 0;
  align-items:center;
}

.playerRow input[type="text"]{
  width:140px;
}

.playerRow input[type="checkbox"]{
  transform:scale(1.1);
}

/* TIMER */
.timerBox{
  font-size:60px;
  text-align:center;
  font-weight:900;
}

/* CONTROL */
.controlBar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0d3a25;
  display:flex;
  gap:5px;
  padding:10px;
}

.controlBar button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
}

/* KIOSK */
.kiosk #app{ display:none; }
.kiosk #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:40px;
  position:relative;
}

.kioskTimer{
  font-size:150px;
  color:#00ff99;
  font-weight:900;
}

.kioskInfo{
  font-size:28px;
  margin:6px;
}

/* PIN */
#pinOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
  text-align:center;
  padding-top:120px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 V11.0 BS1</div>
  <div>
    <button onclick="enterKiosk()">Kiosk</button>
    <button onclick="startGame()">▶ Spiel starten</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="section">
  <h3>⚙️ Setup</h3>

  <label>Gesamtzeit:</label>
  <select id="totalTime">
    <option value="120">120 Minuten</option>
    <option value="180" selected>180 Minuten</option>
  </select>

  <br><br>

  <label>Spielzeit:</label>
  <select id="matchTime">
    <option value="15">15 min</option>
    <option value="18" selected>18 min</option>
    <option value="20">20 min</option>
  </select>

  <br><br>

  <div id="roundInfo">Runden: -</div>
</div>

<!-- PLAYERS -->
<div class="section">
  <h3>👥 Spieler</h3>
  <div id="players"></div>
</div>

<!-- MODE -->
<div class="section">
  <h3>🎛 Modus</h3>
  <button onclick="mode='turnier'">Turnier</button>
  <button onclick="mode='gruppen'">Gruppen</button>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div class="kioskTimer" id="kioskTimer">00:00</div>

<div class="kioskInfo" id="kioskInfo">Bereit</div>

<div class="kioskInfo" id="kioskTeams"></div>

</div>

<!-- PIN -->
<div id="pinOverlay">
  <h2>PIN</h2>
  <input id="pin" type="password">
  <br><br>
  <button onclick="checkPin()">OK</button>
</div>

<!-- CONTROL -->
<div class="controlBar">
  <button onclick="updateRounds()">🔄 Berechnen</button>
  <button onclick="pauseTimer()">⏸ Pause</button>
</div>

<script>

/* ================= STATE ================= */

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let totalSeconds=0;
let matchSeconds=0;
let run=null;

/* ================= PLAYERS ================= */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox" ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">

        <input type="text" value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>`;
  });
}

renderPlayers();

/* ================= ROUNDS ================= */

function updateRounds(){

  let total=parseInt(document.getElementById("totalTime").value);
  let match=parseInt(document.getElementById("matchTime").value);

  let rounds=Math.floor(total/match);

  document.getElementById("roundInfo").innerText=
    "Runden: " + rounds;

  totalSeconds=total*60;
  matchSeconds=match*60;
}

/* initial */
updateRounds();

/* ================= GAME ================= */

function startGame(){

  updateRounds();

  document.getElementById("kioskInfo").innerText=
    "Turnier gestartet ("+mode+")";

  startTimer();
}

/* ================= TIMER ================= */

function startTimer(){

  if(run) return;

  run=setInterval(()=>{

    if(matchSeconds>0) matchSeconds--;

    let m=Math.floor(matchSeconds/60);
    let s=matchSeconds%60;

    let t=m+":"+String(s).padStart(2,"0");

    document.getElementById("kioskTimer").innerText=t;

  },1000);
}

function pauseTimer(){
  clearInterval(run);
  run=null;
}

/* ================= KIOSK ================= */

function enterKiosk(){
  document.body.classList.add("kiosk");
}

function openPin(){
  document.getElementById("pinOverlay").style.display="block";
}

function checkPin(){
  if(document.getElementById("pin").value==="1234"){
    document.body.classList.remove("kiosk");
  }
  document.getElementById("pin").value="";
  document.getElementById("pinOverlay").style.display="none";
}

</script>

</body>
</html>
