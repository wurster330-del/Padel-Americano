<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V3.0 Phase 2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
}

#wrap{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:14px 18px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  font-size:16px;
  margin:5px;
}

.bigTimer{
  font-size:80px;
  font-weight:bold;
  text-align:center;
}

.label{
  text-align:center;
  font-size:18px;
  opacity:0.8;
}

.warning{
  color:#ff4d4d;
  font-weight:bold;
  display:none;
  text-align:center;
  font-size:20px;
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.2;}
  100%{opacity:1;}
}
</style>
</head>

<body>

<div id="wrap">

<h1>🎾 Padel Terminal V3.0 – Phase 2</h1>

<!-- ================= MATCH TIMER ================= -->
<div class="panel">

<div class="label">MATCH TIMER</div>
<div class="bigTimer" id="matchTimer">18:00</div>

<div style="text-align:center;">
<button onclick="startMatch()">▶ Start</button>
<button onclick="pauseMatch()">⏸ Pause</button>
<button onclick="resetMatch()">🔄 Reset</button>
</div>

<div id="warn" class="warning">⚠ Noch 30 Sekunden</div>

</div>

<!-- ================= EVENT TIMER ================= -->
<div class="panel">

<div class="label">SPIELABEND TIMER</div>
<div class="bigTimer" id="eventTimer">120:00</div>

<div style="text-align:center;">
<button onclick="startEvent()">▶ Start Abend</button>
<button onclick="pauseEvent()">⏸ Pause</button>
<button onclick="resetEvent()">🔄 Reset</button>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

</div>

<script>

/* ================= SETTINGS ================= */

let matchSeconds = 18 * 60;
let eventSeconds = 120 * 60;

/* ================= STATE ================= */

let matchRun = null;
let eventRun = null;

/* ================= MATCH ================= */

let matchRemain = matchSeconds;
let eventRemain = eventSeconds;

let matchStarted = false;
let eventStarted = false;

function format(s){
  let m = Math.floor(s/60);
  let sec = s % 60;
  return m + ":" + String(sec).padStart(2,"0");
}

/* ================= RENDER ================= */

function render(){
  document.getElementById("matchTimer").textContent = format(matchRemain);
  document.getElementById("eventTimer").textContent = format(eventRemain);
}

/* ================= MATCH TIMER ================= */

function startMatch(){

  if(matchRun) return;

  matchRun = setInterval(()=>{

    if(matchRemain > 0){
      matchRemain--;
    }

    if(!eventStarted){
      startEvent(); // startet automatisch beim ersten Match
    }

    if(matchRemain === 30){
      let w = document.getElementById("warn");
      w.style.display="block";
      w.classList.add("blink");
      beep();
    }

    if(matchRemain === 0){
      beep();
      beep();
      pauseMatch();
    }

    render();

  },1000);
}

function pauseMatch(){
  clearInterval(matchRun);
  matchRun = null;
}

function resetMatch(){
  pauseMatch();
  matchRemain = matchSeconds;
  document.getElementById("warn").style.display="none";
  render();
}

/* ================= EVENT TIMER ================= */

function startEvent(){

  if(eventRun) return;

  eventStarted = true;

  eventRun = setInterval(()=>{

    if(eventRemain > 0){
      eventRemain--;
    }

    if(eventRemain === 0){
      beep();
      pauseEvent();
    }

    render();

  },1000);
}

function pauseEvent(){
  clearInterval(eventRun);
  eventRun = null;
}

function resetEvent(){
  pauseEvent();
  eventRemain = eventSeconds;
  render();
}

/* ================= SOUND ================= */

function beep(){
  let b = document.getElementById("beep");
  b.currentTime = 0;
  b.play();
}

/* INIT */
render();

</script>

</body>
</html>
