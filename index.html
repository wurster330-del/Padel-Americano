<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Padel Club Terminal V10.9</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.topbar button{
  background:#2e8b57;
  border:none;
  padding:10px 12px;
  border-radius:8px;
  color:white;
}

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.timer{
  font-size:80px;
  text-align:center;
  font-weight:900;
}

/* PLAYERS */
.playerRow{
  display:flex;
  gap:8px;
  margin:4px 0;
  align-items:center;
}

.playerRow input[type="text"]{
  width:140px;
}

.playerRow input[type="checkbox"]{
  transform:scale(1.1);
}

/* MODE SWITCH */
.modeBar{
  display:flex;
  gap:10px;
  margin:10px;
}

.modeBar button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2e8b57;
  color:white;
}

/* KIOSK */
.kiosk #app{ display:none; }
.kiosk #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:40px;
  position:relative;
}

.kioskTimer{
  font-size:180px;
  color:#00ff99;
  font-weight:900;
}

.kioskTeam{
  font-size:42px;
  margin:6px;
}

/* EXIT */
.kioskExit{
  position:absolute;
  top:10px;
  right:10px;
}

.kioskExit button{
  background:#2e8b57;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  color:white;
}

/* CONTROL */
.controlBar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0d3a25;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.controlBar button{
  flex:1;
  margin:0 5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
}

/* PIN */
#pinOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
  text-align:center;
  padding-top:120px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 V10.9</div>
  <div>
    <button onclick="enterKiosk()">Kiosk</button>
    <button onclick="generate()">Start</button>
  </div>
</div>

<!-- MODE -->
<div class="modeBar">
  <button onclick="setMode('turnier')">🎾 Turnier</button>
  <button onclick="setMode('gruppen')">🏷 Gruppen</button>
</div>

<!-- PLAYERS -->
<div class="section">
  <h3>👥 Spieler</h3>
  <div id="players"></div>
</div>

<!-- GROUPS -->
<div class="section" id="groupBox" style="display:none;">
  <h3>🏷 Gruppen</h3>
  <div id="groups"></div>
</div>

<!-- TIMER -->
<div class="section">
  <h3>⏱ Timer</h3>
  <div class="timer" id="timer">18:00</div>
</div>

<!-- COURT -->
<div class="section">
  <h3>🎾 Court</h3>
  <div id="court">Kein Spiel</div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div class="kioskExit">
  <button onclick="openPin()">🔒 Exit</button>
</div>

<div class="kioskTimer" id="kioskTimer">18:00</div>
<div class="kioskTeam" id="kioskA"></div>
<div class="kioskTeam" id="kioskB"></div>
<div class="kioskTeam" id="kioskBank"></div>

</div>

<!-- CONTROL -->
<div class="controlBar">
  <button onclick="startTimer()">▶ Start</button>
  <button onclick="pauseTimer()">⏸ Pause</button>
  <button onclick="nextMatch()">➡ Next</button>
</div>

<!-- PIN -->
<div id="pinOverlay">
  <h2>PIN</h2>
  <input id="pin" type="password">
  <br><br>
  <button onclick="checkPin()">OK</button>
</div>

<script>

/* ================= CONFIG ================= */

let mode="turnier";

/* ================= PLAYERS ================= */

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;

let matchTime=18*60;
let run=null;

/* ================= UI PLAYERS ================= */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox" ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">

        <input type="text" value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>`;
  });
}

renderPlayers();

/* ================= MODE ================= */

function setMode(m){
  mode=m;

  document.getElementById("groupBox").style.display =
    m==="gruppen" ? "block" : "none";
}

/* ================= GROUPS ================= */

function createGroups(list){

  list=list.sort(()=>Math.random()-0.5);

  let groups=[];

  for(let i=0;i<list.length;i+=2){
    groups.push([list[i],list[i+1]]);
  }

  return groups;
}

function showGroups(groups){

  let box=document.getElementById("groups");
  box.innerHTML="";

  groups.forEach((g,i)=>{
    box.innerHTML+=`
      <div>Gruppe ${String.fromCharCode(65+i)}: ${g.join(" + ")}</div>
    `;
  });
}

/* ================= GENERATE ================= */

function generate(){

  let list=players.filter(p=>p.active).map(p=>p.name);

  schedule=[];
  index=0;

  if(mode==="gruppen"){

    let groups=createGroups(list);
    showGroups(groups);

    return;
  }

  let rounds=10;

  for(let r=0;r<rounds;r++){

    list=list.sort(()=>Math.random()-0.5);

    let a=[list[0],list[1]];
    let b=[list[2],list[3]];
    let bank=list.slice(4);

    schedule.push({
      round:r+1,
      a,
      b,
      bank
    });
  }

  update();
}

/* ================= TIMER ================= */

function startTimer(){
  if(run) return;

  run=setInterval(()=>{

    if(matchTime>0) matchTime--;

    if(matchTime<=0){
      matchTime=0;
      clearInterval(run);
      run=null;
    }

    update();

  },1000);
}

function pauseTimer(){
  clearInterval(run);
  run=null;
}

/* ================= NEXT ================= */

function nextMatch(){
  index++;
  if(index>=schedule.length) index=0;
  matchTime=18*60;
  update();
}

/* ================= UPDATE ================= */

function update(){

  let t=Math.floor(matchTime/60)+":"+String(matchTime%60).padStart(2,"0");

  document.getElementById("timer").textContent=t;
  document.getElementById("kioskTimer").textContent=t;

  if(schedule.length==0) return;

  let s=schedule[index];

  document.getElementById("court").innerHTML=
  `A: ${s.a.join(" / ")}<br>
   B: ${s.b.join(" / ")}<br>
   BANK: ${s.bank.join(" / ")||"-"}<br>
   Runde ${s.round}`;
}

/* ================= KIOSK ================= */

function enterKiosk(){
  document.body.classList.add("kiosk");
  document.documentElement.requestFullscreen?.();
}

/* ================= PIN ================= */

function openPin(){
  document.getElementById("pinOverlay").style.display="block";
}

function checkPin(){
  if(document.getElementById("pin").value==="1234"){
    document.body.classList.remove("kiosk");
  }
  document.getElementById("pin").value="";
  document.getElementById("pinOverlay").style.display="none";
}

</script>

</body>
</html>
