tion cfg(x){r=x;i.innerHTML=`${x==4?120:180} Minuten / ${x==4?8:10} Runden`;l.innerHTML="";p.forEach(e=>l.innerHTML+=`<label><input type=checkbox onchange="up()"> ${e}</label><br>`);up()}function up(){let z=l.querySelectorAll("input:checked").length;c.textContent=`Ausgewählt: ${z} / ${r}`;b.disabled=z!=r}function sv(){localStorage.pam_beep=s.checked;alert("Gespeichert")}s.checked=localStorage.pam_beep==="true";ru();</script>
