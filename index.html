<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Manager V5.0 Beta</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f14;
    color: #fff;
}

header {
    padding: 14px;
    text-align: center;
    background: #1c1c25;
    font-size: 18px;
    font-weight: bold;
}

/* SCREENS */
.screen {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* SETUP */
.player {
    font-size: 22px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 20px;
    margin-top: 12px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
}

.primary { background: #2d7dff; color: white; }
.gray { background: #333; color: white; }

/* GAME LAYOUT */
.timer {
    font-size: 120px; /* ⬅️ DEUTLICH GRÖSSER */
    text-align: center;
    margin: 20px 0;
    font-weight: bold;
}

.matchBox {
    text-align: center;
    margin: 25px 0;
    padding: 20px;
    background: #1a1a22;
    border-radius: 12px;
}

.team {
    font-size: 34px;   /* ⬅️ GRÖSSER */
    font-weight: bold;
    margin: 8px 0;
}

.vs {
    font-size: 26px;
    margin: 10px 0;
    color: #aaa;
}

.controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 15px;
    background: #12121a;
}

.controls button {
    width: 32%;
    font-size: 18px;
}
</style>
</head>

<body>

<header>🎾 Padel Manager V5.0 Beta – Build 0002</header>

<!-- SETUP -->
<div id="setup" class="screen active">
    <h2>Spielerauswahl</h2>

    <label class="player"><input type="checkbox" value="Werner" checked> Werner</label>
    <label class="player"><input type="checkbox" value="Marco" checked> Marco</label>
    <label class="player"><input type="checkbox" value="David" checked> David</label>
    <label class="player"><input type="checkbox" value="Stefan" checked> Stefan</label>

    <button class="primary" onclick="startGame()">Spiel starten</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <div class="timer" id="timer">20:00</div>

    <div class="matchBox" id="matchInfo">
        <div class="team">Team 1</div>
        <div class="vs">vs</div>
        <div class="team">Team 2</div>
    </div>

    <div class="controls">
        <button class="primary" onclick="toggleTimer()">Start / Pause</button>
        <button class="gray" onclick="nextMatch()">Nächste</button>
        <button class="gray" onclick="resetGame()">Reset</button>
    </div>

</div>

<script>

let players = [];
let matches = [];
let index = 0;

let time = 20 * 60;
let remaining = time;
let running = false;
let interval;

// FIX: rotation
function generate(p) {
    return [
        [p[0], p[1], p[2], p[3]],
        [p[0], p[2], p[1], p[3]],
        [p[0], p[3], p[1], p[2]]
    ];
}

function startGame() {
    players = Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
        .map(x => x.value);

    if (players.length !== 4) {
        alert("Bitte genau 4 Spieler auswählen!");
        return;
    }

    matches = generate(players);
    index = 0;

    document.getElementById("setup").classList.remove("active");
    document.getElementById("game").classList.add("active");

    loadMatch();
}

function loadMatch() {
    let m = matches[index];

    document.getElementById("matchInfo").innerHTML = `
        <div class="team">${m[0]} + ${m[1]}</div>
        <div class="vs">vs</div>
        <div class="team">${m[2]} + ${m[3]}</div>
    `;

    resetTimer();
}

function resetTimer() {
    remaining = time;
    updateTimer();
    stopTimer();
}

function updateTimer() {
    let m = Math.floor(remaining / 60);
    let s = remaining % 60;
    document.getElementById("timer").innerText =
        `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function toggleTimer() {
    if (running) {
        stopTimer();
    } else {
        startTimer();
    }
}

function startTimer() {
    running = true;
    interval = setInterval(() => {
        if (remaining > 0) {
            remaining--;
            updateTimer();
        } else {
            stopTimer();
            alert("Match beendet!");
        }
    }, 1000);
}

function stopTimer() {
    running = false;
    clearInterval(interval);
}

function nextMatch() {
    index++;
    if (index >= matches.length) index = 0;
    loadMatch();
}

function resetGame() {
    index = 0;
    loadMatch();
}

</script>

</body>
</html>
