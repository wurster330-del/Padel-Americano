<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel-Götter V2.0</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{padding:12px;}

.topbar{
  background:#0f3a28;
  padding:12px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

button{
  padding:12px 16px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

.kioskMode #app{display:none;}
.kioskMode .kiosk{display:block;}

#timer{
  font-size:150px;
  color:#00ff99;
  font-weight:bold;
}

.match{
  font-size:38px;
  margin-top:20px;
}

.bank{
  font-size:28px;
  color:#ffd54a;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🏆 Padel-Götter V2.0</div>
<button onclick="openKiosk()">Kiosk</button>
</div>

<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<div class="section">
<h3>Setup</h3>

<label>Gesamtzeit</label>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<br><br>

<label>Matchzeit</label>
<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="mode='turnier'">Turnier</button>
<button onclick="mode='gruppe'">Gruppe</button>
</div>

<div class="section">
<button onclick="generate()">Spielplan erstellen</button>
<button onclick="remix()">Neu mischen</button>
</div>

<div class="section">
<h3>Spielplan</h3>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div class="kiosk">

<div id="timer">00:00</div>
<div id="match" class="match"></div>
<div id="bank" class="bank"></div>

<br>

<button onclick="startMatch()">Start</button>
<button onclick="next()">Next</button>
<button onclick="endMatch()">Matchende</button>
<button onclick="closeKiosk()">Exit</button>

</div>

<script>

/* =====================
   STATE
===================== */

let mode = "turnier";

let players = ["Marco","Stefan","David","Tobias","Chris","Werner"];
let selected = {};

let schedule = [];
let index = 0;

let timer = null;
let running = false;
let timeLeft = 0;

/* =====================
   INIT PLAYERS
===================== */

function init(){
  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p=>{
    selected[p] = true;

    const row = document.createElement("div");

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = true;

    cb.onchange = ()=> selected[p] = cb.checked;

    row.appendChild(cb);
    row.appendChild(document.createTextNode(p));

    box.appendChild(row);
  });
}

/* =====================
   ACTIVE PLAYERS
===================== */

function activePlayers(){
  return players.filter(p=>selected[p]);
}

/* =====================
   GROUP ENGINE
===================== */

function groupRound(p,r){

  if(p.length===4)
    return {a:[p[0],p[1]],b:[p[2],p[3]],bank:[]};

  if(p.length===5){
    return (r%2===0)
      ? {a:[p[0],p[1]],b:[p[2],p[3]],bank:[p[4]]}
      : {a:[p[2],p[3]],b:[p[0],p[1]],bank:[p[4]]};
  }

  if(p.length===6){
    const A=[p[0],p[1]];
    const B=[p[2],p[3]];
    const C=[p[4],p[5]];

    if(r%3===0) return {a:A,b:B,bank:C};
    if(r%3===1) return {a:B,b:C,bank:A};
    return {a:C,b:A,bank:B};
  }

  return {a:[],b:[],bank:[]};
}

/* =====================
   GENERATE (TIME FIXED)
===================== */

function generate(){

  let p = activePlayers();

  if(p.length < 4){
    alert("Mindestens 4 Spieler");
    return;
  }

  schedule = [];
  index = 0;

  let total = parseInt(document.getElementById("totalTime").value);
  let match = parseInt(document.getElementById("matchTime").value);

  let rounds = Math.floor(total / match);

  for(let r=0;r<rounds;r++){

    let a=[], b=[], bank=[];

    if(mode === "turnier"){

      let pool = [...p].sort(()=>Math.random()-0.5);

      a = [pool[0], pool[1]];
      b = [pool[2], pool[3]];
      bank = pool[4] ? [pool[4]] : [];
    }

    if(mode === "gruppe"){
      let g = groupRound(p,r);
      a = g.a;
      b = g.b;
      bank = g.bank;
    }

    schedule.push({a,b,bank});
  }

  render();
  update();
}

/* =====================
   REMIX
===================== */

function remix(){
  schedule = [];
  index = 0;
  generate();
}

/* =====================
   RENDER
===================== */

function render(){
  let box = document.getElementById("preview");
  box.innerHTML = "";

  schedule.forEach((s,i)=>{
    let d = document.createElement("div");
    d.innerText = `R${i+1}: ${s.a.join("/")} vs ${s.b.join("/")} | Bank: ${s.bank.join(",")||"keine"}`;
    box.appendChild(d);
  });
}

/* =====================
   KIOSK
===================== */

function openKiosk(){
  document.body.classList.add("kioskMode");
}

function closeKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =====================
   MATCH VIEW
===================== */

function update(){

  let s = schedule[index];
  if(!s) return;

  document.getElementById("match").innerText =
    s.a.join(" & ") + " 🆚 " + s.b.join(" & ");

  document.getElementById("bank").innerText =
    "Bank: " + (s.bank.join(", ") || "keine");
}

/* =====================
   TIMER (START FIX)
===================== */

function startMatch(){

  if(!schedule.length) return;

  let match = parseInt(document.getElementById("matchTime").value) * 60;

  timeLeft = match;
  running = true;

  clearInterval(timer);

  timer = setInterval(()=>{

    if(timeLeft <= 0){
      clearInterval(timer);
      running = false;
      document.getElementById("timer").innerText = "00:00";
      return;
    }

    timeLeft--;

    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;

    if(s < 10) s = "0"+s;

    document.getElementById("timer").innerText = `${m}:${s}`;

  },1000);
}

/* =====================
   NEXT
===================== */

function next(){

  if(!schedule.length) return;

  index = (index + 1) % schedule.length;
  update();

  startMatch();
}

/* =====================
   MATCH ENDE
===================== */

function endMatch(){
  clearInterval(timer);
  running = false;
  timeLeft = 0;
  document.getElementById("timer").innerText = "00:00";
}

/* INIT */
init();

</script>

</body>
</html>
