<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V2.2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
  text-align:center;
}

/* ADMIN */
#admin{padding:20px;}
.panel{
  background:#255d3d;
  padding:15px;
  border-radius:12px;
  margin:10px auto;
  max-width:800px;
}
.playerBox{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.player{
  background:#1f6b42;
  padding:8px;
  border-radius:8px;
}

/* COURT */
#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:15px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
}

#matchTime{
  font-size:22vh;
  font-weight:bold;
}

#eventTime{
  font-size:5vh;
}

#teams{
  font-size:5vh;
  font-weight:bold;
}

#nextBox{
  font-size:3vh;
  color:#ffd966;
}

#stats{
  font-size:2.5vh;
  opacity:0.8;
  margin-top:5px;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:#2e8b57;
  color:white;
}

.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:#b33a3a;
}
</style>
</head>

<body>

<!-- ================= ADMIN ================= -->
<div id="admin">

<h1>🎾 Padel Terminal V2.2</h1>

<div class="panel">
<h3>Spieler Auswahl</h3>
<div id="playerBox" class="playerBox"></div>
</div>

<div class="panel">
<h3>Matchzeit</h3>
<select id="matchSelect">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>
</div>

<div class="panel">
<h3>Spielabend</h3>
<select id="eventSelect">
  <option value="120" selected>120</option>
  <option value="180">180</option>
</select>
</div>

<div class="panel">
<button onclick="start()">▶ START</button>
</div>

</div>

<!-- ================= COURT ================= -->
<div id="court">

<button class="exit" onclick="exit()">❌ EXIT</button>

<div class="top">
  <div id="eventTime">120:00</div>
  <div>COURT 1</div>
</div>

<div id="matchTime">18:00</div>

<div id="teams"></div>

<div id="nextBox"></div>
<div id="stats"></div>

<div>
<button onclick="startMatch()">▶ START</button>
<button onclick="pause()">⏸ PAUSE</button>
<button onclick="next()">➡ NEXT</button>
</div>

</div>

<script>

/* ================= DATA ================= */

const allPlayers=["Tobias","Werner","Christian","Stefan","David","Marco"];

let active=[];
let rotation=0;

/* TIMER */
let event={total:0,remain:0};
let match={total:0,remain:0,interval:null};

/* STATS */
let stats={};

/* ================= INIT PLAYERS ================= */

function renderPlayers(){
  const box=document.getElementById("playerBox");
  box.innerHTML="";

  allPlayers.forEach(p=>{
    box.innerHTML+=`
      <label class="player">
        <input type="checkbox" checked onchange="toggle('${p}',this.checked)">
        ${p}
      </label>
    `;
  });
}

function toggle(name,checked){
  if(checked){
    active.push(name);
  }else{
    active=active.filter(x=>x!==name);
  }
}

/* ================= START ================= */

function start(){

  active=[...allPlayers];

  match.total=parseInt(matchSelect.value)*60;
  match.remain=match.total;

  event.total=parseInt(eventSelect.value)*60;
  event.remain=event.total;

  active.forEach(p=>{
    stats[p]={games:0};
  });

  admin.style.display="none";
  court.style.display="flex";

  render();
}

/* ================= FAIR ROTATION ENGINE ================= */

function pickTeam(pool,used){

  let best=null;
  let bestScore=9999;

  for(let i=0;i<pool.length;i++){
    for(let j=i+1;j<pool.length;j++){

      let a=pool[i];
      let b=pool[j];

      let score=
        (stats[a].games + stats[b].games) +
        (used.has(a)?5:0) +
        (used.has(b)?5:0);

      if(score<bestScore){
        bestScore=score;
        best=[a,b];
      }
    }
  }

  return best;
}

function generateMatch(){

  let pool=[...active];
  let used=new Set();

  let teamA=pickTeam(pool,used);
  used.add(teamA[0]);
  used.add(teamA[1]);

  let rest=pool.filter(p=>!used.has(p));
  let teamB=pickTeam(rest,used);

  let bank=pool.filter(p=>!teamA.includes(p)&&!teamB.includes(p));

  return {teamA,teamB,bank};
}

/* ================= MATCH ================= */

function startMatch(){

  if(match.interval) return;

  match.interval=setInterval(()=>{

    match.remain--;
    event.remain--;

    if(match.remain<=0){
      next();
    }

    render();

  },1000);
}

function pause(){
  clearInterval(match.interval);
  match.interval=null;
}

/* ================= NEXT ================= */

function next(){

  let m=generateMatch();

  // stats update
  m.teamA.concat(m.teamB).forEach(p=>{
    stats[p].games++;
  });

  rotation++;

  match.remain=match.total;

  lastMatch=m;

  render();
}

/* ================= EXIT ================= */

function exit(){
  pause();
  court.style.display="none";
  admin.style.display="block";
}

/* ================= RENDER ================= */

let lastMatch=null;

function render(){

  let em=Math.floor(event.remain/60);
  let es=event.remain%60;

  let mm=Math.floor(match.remain/60);
  let ms=match.remain%60;

  eventTime.textContent=em+":"+String(es).padStart(2,"0");
  matchTime.textContent=mm+":"+String(ms).padStart(2,"0");

  let m=lastMatch || generateMatch();

  teams.innerHTML=
    "TEAM A: "+m.teamA.join(" | ")+"<br>"+
    "TEAM B: "+m.teamB.join(" | ")+"<br>"+
    "BANK: "+m.bank.join(" | ");

  nextBox.innerHTML=
    "➡ NEXT PREVIEW LIVE";

  statsBox();
}

/* ================= STATS ================= */

function statsBox(){

  let txt="";

  for(let p of active){
    txt+=p+": "+(stats[p]?.games||0)+" Spiele | ";
  }

  stats.innerHTML=txt;
}

/* INIT */
renderPlayers();
render();

</script>

</body>
</html>
