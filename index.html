<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PADEL-GÖTTER PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 32px;
}

input {
    font-size: 20px;
    padding: 8px;
    margin: 5px;
    width: 220px;
}

button {
    font-size: 22px;
    padding: 15px 25px;
    margin: 8px;
    border-radius: 12px;
    border: none;
}

.start {background:#2ecc71;}
.stop {background:#f39c12;}
.reset {background:#e74c3c;}
.next {background:#3498db;}

.box {
    background:#222;
    padding:20px;
    border-radius:15px;
    margin:20px auto;
    max-width:500px;
}

.timer {
    font-size:80px;
    font-weight:bold;
}

.team {
    font-size:28px;
    margin:15px;
}

.small {
    font-size:20px;
}
</style>
</head>

<body>

<h1>🏆 PADEL-GÖTTER PRO</h1>

<div id="setup" class="box">

<h2>Spieler eingeben</h2>

<input id="p1" value="Marco"><br>
<input id="p2" value="Stefan"><br>
<input id="p3" value="David"><br>
<input id="p4" value="Tobias"><br>
<input id="p5" value="Chris"><br>
<input id="p6" value="Werner"><br>

<br>

<button onclick="teamsAuslosen()">🎲 Teams auslosen</button>

</div>


<div id="spiel" class="box" style="display:none">

<h2 id="runde"></h2>

<div class="team" id="match"></div>

<div class="team" id="bank"></div>

<div class="timer" id="timer">00:00</div>

<button class="start" onclick="start()">▶ START</button>
<button class="stop" onclick="stop()">⏸ STOPP</button>
<button class="reset" onclick="reset()">🔄 RESET</button>

<br>

<button class="next" onclick="naechstesMatch()">➡ NÄCHSTES MATCH</button>

<div class="small" id="meldung"></div>

</div>


<script>

let teams=[];
let aktuell=0;
let sekunden=0;
let lauf=null;
let runde=1;


// feste Rotation
let rotation=[
 [0,1,2],
 [1,2,0],
 [0,2,1]
];


function teamsAuslosen(){

let spieler=[
p1.value,p2.value,p3.value,
p4.value,p5.value,p6.value
];

spieler.sort(()=>Math.random()-0.5);

teams=[
 [spieler[0],spieler[1]],
 [spieler[2],spieler[3]],
 [spieler[4],spieler[5]]
];


document.getElementById("setup").style.display="none";
document.getElementById("spiel").style.display="block";

zeigeMatch();

}


function zeigeMatch(){

let r=rotation[aktuell%3];

document.getElementById("runde").innerHTML=
"Runde "+runde;

document.getElementById("match").innerHTML=
"🎾 "+teams[r[0]].join(" + ")
+"<br>🆚<br>"
+teams[r[1]].join(" + ");


document.getElementById("bank").innerHTML=
"🪑 Bank: "+teams[r[2]].join(" + ");

}


function anzeigen(){

let m=Math.floor(sekunden/60);
let s=sekunden%60;

timer.innerHTML=
String(m).padStart(2,"0")
+":"
+String(s).padStart(2,"0");


if(sekunden==1080){

meldung.innerHTML=
"🔔 MATCH ENDE – WECHSEL!";

navigator.vibrate?.(500);

}

}


function start(){

if(lauf==null){

lauf=setInterval(()=>{

sekunden++;
anzeigen();

},1000);

}

}


function stop(){

clearInterval(lauf);
lauf=null;

}


function reset(){

stop();

sekunden=0;
meldung.innerHTML="";

anzeigen();

}


function naechstesMatch(){

reset();

aktuell++;

runde++;

zeigeMatch();

}

</script>

</body>
</html>
