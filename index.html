<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Terminal V3.0 FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071f14;
  color:white;
}

#wrap{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
  font-size:16px;
}

input, select{
  padding:8px;
  border-radius:6px;
  border:none;
  margin:4px;
}

.bigTimer{
  font-size:70px;
  text-align:center;
  font-weight:bold;
}

.sectionTitle{
  font-size:20px;
  margin-bottom:10px;
}

/* COURT MODE */
#court{
  background:#0e3d26;
  padding:15px;
  border-radius:12px;
}

.teamBox{
  font-size:24px;
  font-weight:bold;
  margin:10px 0;
}

.next{
  color:#66d9ff;
  margin-top:10px;
}

/* WARNING */
.warning{
  color:red;
  text-align:center;
  display:none;
  font-size:18px;
  font-weight:bold;
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.2;}
}

/* small */
.small{
  opacity:0.8;
  font-size:14px;
}
</style>
</head>

<body>

<div id="wrap">

<h2>🎾 Padel Club Terminal V3.0 FINAL</h2>

<!-- ================= SETTINGS ================= -->
<div class="panel">
<div class="sectionTitle">👥 Spieler</div>

<div id="players"></div>

<br>

<div class="sectionTitle">⏱ Matchzeit</div>
<select id="matchTime">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>

<div class="sectionTitle">🕒 Spielabend</div>
<select id="eventTime">
  <option value="120" selected>120</option>
  <option value="180">180</option>
</select>

<br><br>
<button onclick="save()">💾 Speichern</button>
<button onclick="generate()">🏆 Turnier generieren</button>
</div>

<!-- ================= TIMER ================= -->
<div class="panel">

<div class="sectionTitle">⏱ MATCH TIMER</div>
<div class="bigTimer" id="matchTimer">18:00</div>

<div style="text-align:center;">
<button onclick="startMatch()">▶ Start</button>
<button onclick="pauseMatch()">⏸ Pause</button>
<button onclick="next()">➡ Next</button>
</div>

<div class="warning" id="warn">⚠ 30 Sekunden</div>

</div>

<div class="panel">

<div class="sectionTitle">🕒 SPIELABEND</div>
<div class="bigTimer" id="eventTimer">120:00</div>

</div>

<!-- ================= COURT ================= -->
<div id="court">

<div class="sectionTitle">📺 COURT MODE</div>

<div id="round"></div>

<div class="teamBox" id="teamA"></div>
<div class="teamBox" id="teamB"></div>

<div class="small" id="bank"></div>

<div class="next" id="next"></div>

</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= DATA ================= */

let players = [
 {name:"Tobias",active:true},
 {name:"Werner",active:true},
 {name:"Christian",active:true},
 {name:"Stefan",active:true},
 {name:"David",active:true},
 {name:"Marco",active:true}
];

let schedule=[];
let index=0;

/* ================= TIMER ================= */

let matchSeconds=18*60;
let eventSeconds=120*60;

let match=matchSeconds;
let event=eventSeconds;

let run=null;
let eventRun=null;

/* ================= INIT ================= */

function renderPlayers(){
 let box=document.getElementById("players");
 box.innerHTML="";

 players.forEach((p,i)=>{
  box.innerHTML+=`
   <div>
    <input type="checkbox" ${p.active?"checked":""}
    onchange="players[${i}].active=!players[${i}].active">

    <input type="text" value="${p.name}"
    onchange="players[${i}].name=this.value">
   </div>
  `;
 });
}

/* ================= SAVE ================= */

function save(){
 localStorage.setItem("padel",JSON.stringify(players));
 alert("Gespeichert");
}

/* ================= GENERATOR ================= */

function generate(){

 let list=players.filter(p=>p.active).map(p=>p.name);

 schedule=[];
 index=0;

 let rounds=list.length;

 for(let r=0;r<rounds;r++){

  let rot=[...list.slice(r),...list.slice(0,r)];

  let a=[rot[0],rot[1]];
  let b=[rot[2],rot[3]];
  let bank=rot.slice(4);

  schedule.push({a,b,bank,round:r+1});
 }

 render();
}

/* ================= MATCH TIMER ================= */

function startMatch(){

 if(run) return;

 run=setInterval(()=>{

  match--;
  event--;

  if(eventRun==null) startEvent();

  if(match===30){
   warn.style.display="block";
   warn.classList.add("blink");
   beep();
  }

  if(match<=0){
   beep(); beep();
   next();
  }

  render();

 },1000);
}

function pauseMatch(){
 clearInterval(run);
 run=null;
}

function next(){
 index++;
 if(index>=schedule.length) index=0;
 match=matchSeconds;
 render();
}

/* ================= EVENT ================= */

function startEvent(){
 eventRun=setInterval(()=>{
  event--;
  if(event<=0){
   beep();
   clearInterval(eventRun);
  }
  render();
 },1000);
}

/* ================= RENDER ================= */

function render(){

 let m=Math.floor(match/60);
 let s=match%60;

 let e=Math.floor(event/60);
 let es=event%60;

 matchTimer.textContent=`${m}:${String(s).padStart(2,"0")}`;
 eventTimer.textContent=`${e}:${String(es).padStart(2,"0")}`;

 if(schedule.length===0) return;

 let cur=schedule[index];

 round.textContent="Runde "+cur.round;

 teamA.textContent="TEAM A: "+cur.a.join(" | ");
 teamB.textContent="TEAM B: "+cur.b.join(" | ");
 bank.textContent="Bank: "+(cur.bank.join(" | ")||"-");

 let nextS=schedule[index+1]||schedule[0];

 next.textContent="NEXT: "+nextS.a.join(" / ")+" vs "+nextS.b.join(" / ");
}

/* ================= SOUND ================= */

function beep(){
 let b=document.getElementById("beep");
 b.currentTime=0;
 b.play();
}

/* INIT */
renderPlayers();
render();

</script>

</body>
</html>
