<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel System Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f3d26;
  color:white;
  text-align:center;
}

/* ================= ADMIN ================= */

#admin{
  padding:20px;
}

.panel{
  background:#255d3d;
  padding:15px;
  border-radius:12px;
  margin:10px auto;
  max-width:800px;
}

.playerBox{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.player{
  background:#1f6b42;
  padding:8px 10px;
  border-radius:8px;
}

input, select{
  padding:8px;
  border-radius:6px;
  border:none;
}

/* ================= COURT ================= */

#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:10px;
}

#matchTime{
  font-size:18vh;
  font-weight:bold;
}

#teams{
  font-size:5vh;
  font-weight:bold;
}

.top{
  display:flex;
  justify-content:space-between;
  opacity:0.8;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ================= ADMIN ================= -->
<div id="admin">

<h1>🎾 Padel Admin</h1>

<div class="panel">

<h3>Spieler</h3>
<div id="playerBox" class="playerBox"></div>

</div>

<div class="panel">
<h3>Match Zeit</h3>
<select id="matchSelect">
<option value="15">15 min</option>
<option value="18" selected>18 min</option>
<option value="20">20 min</option>
</select>
</div>

<div class="panel">
<h3>Spielabend</h3>
<select id="eventSelect">
<option value="120">120 min</option>
<option value="180" selected>180 min</option>
</select>
</div>

<div class="panel">
<button onclick="startCourt()">▶ Start Court Mode</button>
</div>

</div>

<!-- ================= COURT ================= -->
<div id="court">

<div class="top">
<div id="eventTime">120:00</div>
<div>COURT 1</div>
</div>

<div id="matchTime">18:00</div>

<div id="teams"></div>

<div>
<button onclick="nextMatch()">➡ Next</button>
<button onclick="exitCourt()">❌ Exit</button>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= DATA ================= */

const allPlayers = ["Tobias","Werner","Christian","Stefan","David","Marco"];
let active = new Set(allPlayers);
let rotation = 0;

let event = { total:120*60, remain:120*60 };
let match = { total:18*60, remain:18*60, interval:null };

/* ================= ADMIN ================= */

function renderPlayers(){
  const box = document.getElementById("playerBox");
  box.innerHTML = "";

  allPlayers.forEach(p=>{
    box.innerHTML += `
      <label class="player">
        <input type="checkbox" checked onchange="toggle('${p}',this.checked)">
        ${p}
      </label>
    `;
  });
}

function toggle(name,checked){
  if(checked) active.add(name);
  else active.delete(name);
}

/* ================= START ================= */

function startCourt(){

  match.total = parseInt(document.getElementById("matchSelect").value) * 60;
  match.remain = match.total;

  event.total = parseInt(document.getElementById("eventSelect").value) * 60;
  event.remain = event.total;

  document.getElementById("admin").style.display="none";
  document.getElementById("court").style.display="flex";

  goFullscreen();
  startMatch();
}

/* ================= FULLSCREEN ================= */

function goFullscreen(){
  document.documentElement.requestFullscreen?.();
}

/* ================= TEAMS ================= */

function getTeams(){

  const players = [...active];

  let a=[], b=[], bench=[];

  for(let i=0;i<players.length;i++){
    let idx = (i + rotation) % players.length;

    if(i < 2) a.push(players[idx]);
    else if(i < 4) b.push(players[idx]);
    else bench.push(players[idx]);
  }

  return {a,b,bench};
}

/* ================= MATCH FLOW ================= */

function startMatch(){
  if(match.interval) return;

  match.interval = setInterval(()=>{

    if(match.remain > 0){
      match.remain--;
      event.remain--;
    } else {
      nextMatch();
    }

    render();

  },1000);
}

function nextMatch(){
  rotation = (rotation + 2) % active.size;
  match.remain = match.total;
  document.getElementById("beep").play();
}

/* ================= EXIT ================= */

function exitCourt(){
  pause();
  document.getElementById("court").style.display="none";
  document.getElementById("admin").style.display="block";

  document.exitFullscreen?.();
}

function pause(){
  clearInterval(match.interval);
  match.interval = null;
}

/* ================= RENDER ================= */

function render(){

  let em = Math.floor(event.remain/60);
  let es = event.remain%60;

  let mm = Math.floor(match.remain/60);
  let ms = match.remain%60;

  document.getElementById("eventTime").textContent =
    em+":"+String(es).padStart(2,"0");

  document.getElementById("matchTime").textContent =
    mm+":"+String(ms).padStart(2,"0");

  const {a,b,bench} = getTeams();

  document.getElementById("teams").innerHTML =
    "A: "+a.join(" | ")+"<br>"+
    "B: "+b.join(" | ")+"<br>"+
    "Bank: "+bench.join(" | ");
}

/* INIT */
renderPlayers();
render();

</script>

</body>
</html>
