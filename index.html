<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Padel Manager</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: white;
      text-align: center;
    }

    .screen {
      display: none;
      padding: 40px;
    }

    .active {
      display: block;
    }

    h1, h2 {
      margin-top: 0;
    }

    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }

    .player {
      font-size: 24px;
      padding: 20px;
      border: none;
      border-radius: 12px;
      background: #1f6feb;
      color: white;
    }

    .start-btn {
      font-size: 28px;
      padding: 20px 40px;
      border: none;
      border-radius: 12px;
      background: #2ea043;
      color: white;
      margin-top: 20px;
    }

    #matchInfo {
      font-size: 32px;
      margin: 40px 0;
    }

    button {
      font-size: 24px;
      padding: 15px 30px;
      margin: 10px;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- START SCREEN -->
  <div id="startScreen" class="screen active">

    <h1>🎾 Padel Manager</h1>

    <div class="players">
      <button class="player">Werner</button>
      <button class="player">Marco</button>
      <button class="player">David</button>
      <button class="player">Stefan</button>
    </div>

    <button id="startBtn" class="start-btn">
      Spiel starten
    </button>

  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">

    <h2>Spielleiter</h2>

    <div id="matchInfo">
      Werner + Marco<br>
      vs<br>
      David + Stefan
    </div>

    <button id="nextBtn">Next</button>
    <button id="resetBtn">Reset</button>

  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");

    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    const matches = [
      ["Werner + Marco", "David + Stefan"],
      ["Werner + David", "Marco + Stefan"],
      ["Werner + Stefan", "Marco + David"]
    ];

    let currentMatch = 0;

    startBtn.addEventListener("click", () => {
      startScreen.classList.remove("active");
      gameScreen.classList.add("active");
      showMatch();
    });

    nextBtn.addEventListener("click", () => {
      currentMatch++;
      if (currentMatch >= matches.length) currentMatch = 0;
      showMatch();
    });

    resetBtn.addEventListener("click", () => {
      currentMatch = 0;
      startScreen.classList.add("active");
      gameScreen.classList.remove("active");
    });

    function showMatch() {
      document.getElementById("matchInfo").innerHTML =
        matches[currentMatch][0] + "<br>vs<br>" + matches[currentMatch][1];
    }
  </script>

</body>
</html>
