<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Manager</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin: 10px;
    }

    .screen {
        width: 100%;
        max-width: 800px;
        padding: 10px;
        box-sizing: border-box;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        margin: 5px 0;
        font-size: 18px;
        border-radius: 8px;
        border: none;
    }

    button {
        background: #1f1f1f;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #333;
    }

    .timer {
        font-size: 60px;
        text-align: center;
        margin: 20px 0;
    }

    .teams {
        text-align: center;
        font-size: 20px;
        margin: 10px 0;
    }

    .round {
        text-align: center;
        font-size: 18px;
        color: #aaa;
    }

    .hidden {
        display: none;
    }
</style>
</head>

<body>

<h1>Padel Manager</h1>

<div class="screen" id="setup">
    <input id="p1" placeholder="Spieler 1">
    <input id="p2" placeholder="Spieler 2">
    <input id="p3" placeholder="Spieler 3">
    <input id="p4" placeholder="Spieler 4">
    <input id="p5" placeholder="Spieler 5 (optional)">
    <input id="p6" placeholder="Spieler 6 (optional)">

    <select id="count">
        <option value="4">4 Spieler</option>
        <option value="5">5 Spieler</option>
        <option value="6">6 Spieler</option>
    </select>

    <select id="time">
        <option value="120">120 Minuten</option>
        <option value="180">180 Minuten</option>
    </select>

    <button onclick="startGame()">Spiel starten</button>
</div>

<div class="screen hidden" id="game">

    <div class="round" id="round">Runde 1</div>

    <div class="timer" id="timer">00:00:00</div>

    <div class="teams" id="teams"></div>

    <button onclick="toggleTimer()">Start / Pause</button>
    <button onclick="nextRound()">Nächste Runde</button>
    <button onclick="toggleFullscreen()">Vollbild</button>
    <button onclick="resetGame()">Neues Spiel</button>

</div>

<script>
let players = [];
let playingTime = 0;
let timeLeft = 0;
let interval = null;
let running = false;
let round = 1;
let lastPair = "";

function startGame() {
    players = [
        p1.value, p2.value, p3.value, p4.value, p5.value, p6.value
    ].filter(p => p);

    const selectedCount = parseInt(document.getElementById("count").value);
    players = players.slice(0, selectedCount);

    playingTime = parseInt(document.getElementById("time").value) * 60;
    timeLeft = playingTime;

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    generateTeams();
    updateTimer();
}

function formatTime(s) {
    const h = String(Math.floor(s / 3600)).padStart(2, "0");
    const m = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
    const sec = String(s % 60).padStart(2, "0");
    return `${h}:${m}:${sec}`;
}

function updateTimer() {
    document.getElementById("timer").innerText = formatTime(timeLeft);
}

function toggleTimer() {
    if (running) {
        clearInterval(interval);
        running = false;
    } else {
        interval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimer();
            } else {
                clearInterval(interval);
                beep();
            }
        }, 1000);
        running = true;
    }
}

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function generateTeams() {
    let tries = 0;
    let valid = false;
    let p, teamA, teamB, bench;

    while (!valid && tries < 20) {
        let shuffled = shuffle([...players]);

        bench = shuffled.slice(4);
        p = shuffled.slice(0, 4);

        teamA = p.slice(0, 2).sort().join("-");
        teamB = p.slice(2, 4).sort().join("-");

        let key = teamA + "|" + teamB;

        if (key !== lastPair) {
            lastPair = key;
            valid = true;

            document.getElementById("teams").innerHTML =
                `<b>Team A:</b> ${p[0]} & ${p[1]}<br>
                 <b>Team B:</b> ${p[2]} & ${p[3]}<br>
                 ${bench.length ? "<b>Pause:</b> " + bench.join(", ") : ""}`;
        }
        tries++;
    }
}

function nextRound() {
    clearInterval(interval);
    running = false;

    round++;
    document.getElementById("round").innerText = "Runde " + round;

    generateTeams();
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

function resetGame() {
    location.reload();
}

function beep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.value = 800;
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
}
</script>

</body>
</html>
