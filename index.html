<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Padel Club Terminal V9 FINAL</title>

<style>
/* =========================
   BASIS DESIGN
========================= */

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#071f14;
  color:white;
}

#wrap{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

/* =========================
   PANELS
========================= */

.panel{
  background:#1f5e3a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* =========================
   BUTTONS
========================= */

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
  font-size:16px;
}

/* =========================
   KIOSK MODE
========================= */

.kiosk #wrap{
  display:none;
}

.kiosk #kiosk{
  display:block;
}

#kiosk{
  display:none;
  height:100vh;
  text-align:center;
  background:#000;
  padding-top:80px;
}

/* große Anzeige */
.big{
  font-size:120px;
  font-weight:900;
}

.small{
  opacity:0.8;
}

/* =========================
   TIMER STYLE (PLACEHOLDER)
========================= */

.timer{
  font-size:80px;
  text-align:center;
  font-weight:900;
}
</style>
</head>

<body>

<div id="wrap">

  <h2>🎾 Padel Club Terminal V9 FINAL</h2>

  <!-- ================= SETUP ================= -->
  <div class="panel">
    <button onclick="enterKiosk()">🔲 Kiosk starten</button>
  </div>

  <div class="panel">
    <h3>👥 Spieler (Phase 1 Platzhalter)</h3>
    <p>Hier kommt Phase 2: Spieler + Turnier</p>
  </div>

  <div class="panel">
    <h3>⏱ Timer (Phase 1 Platzhalter)</h3>
    <div class="timer">18:00</div>
  </div>

  <div class="panel">
    <h3>🎾 Court (Phase 1 Platzhalter)</h3>
    <p>Hier kommt Phase 3: Matchanzeige</p>
  </div>

</div>

<!-- ================= KIOSK ================= -->
<div id="kiosk">
  <div class="big">KIOSK MODE</div>
  <div class="small">Phase 1 - Grundgerüst aktiv</div>
</div>

<script>

/* =========================
   KIOSK CONTROL
========================= */

function enterKiosk(){
  document.body.classList.add("kiosk");

  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}

</script>

</body>
</html>
