<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel PRO MODE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f16;
  color:white;
}

#app{padding:10px;}

.topbar{
  background:#123b28;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:14px 18px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.section{
  background:#184d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:10px;
  align-items:center;
  margin:5px 0;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timer{
  font-size:160px;
  color:#00ff99;
  font-weight:900;
}

.big{font-size:44px;margin:18px;}
.bank{font-size:40px;color:#ffd54a;}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🎾 PRO MODE</div>
<button onclick="enterKiosk()">Kiosk</button>
</div>

<div class="section">
<h3>Spieler</h3>

<div id="players"></div>

<div id="error" style="color:#ff6666;"></div>
</div>

<div class="section">
<h3>Setup</h3>

<label>Gesamtzeit</label>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<br><br>

<label>Matchzeit</label>
<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="setMode('turnier')">Turnier</button>
<button onclick="setMode('gruppe')">Gruppe</button>
</div>

<div class="section">
<button onclick="generate()">Spielplan erstellen</button>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timer">00:00</div>

<div id="mode" class="big"></div>
<div id="round" class="big"></div>
<div id="teams" class="big"></div>
<div id="bank" class="big"></div>

<button onclick="startTimer()">Start</button>
<button onclick="nextMatch()">Next</button>
<button onclick="exitKiosk()">Exit</button>

</div>

<script>

/* =====================
   STATE SAFE
===================== */

let mode="turnier";
let schedule=[];
let index=0;
let timer=null;
let timeLeft=0;
let finished=false;

/* =====================
   SAFE PLAYERS
===================== */

let players=["Marco","Stefan","David","Tobias","Chris","Werner"];
let selected={};

/* =====================
   ERROR SYSTEM (PRO)
===================== */

function error(msg){
  document.getElementById("error").innerText="⚠️ "+msg;
}

/* =====================
   INIT PLAYERS SAFE
===================== */

function renderPlayers(){

  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach(p=>{
    selected[p]=true;

    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox" checked onchange="selected['${p}']=this.checked">
        <span>${p}</span>
      </div>
    `;
  });
}

/* =====================
   SAFE ACTIVE PLAYERS
===================== */

function activePlayers(){

  let list = players.filter(p=>selected[p]);

  if(list.length < 4){
    error("Mindestens 4 Spieler nötig!");
    return [];
  }

  error("");
  return list;
}

/* =====================
   MODE
===================== */

function setMode(m){
  mode=m;
}

/* =====================
   SAFE GENERATE ENGINE
===================== */

function generate(){

  try{

    let p = activePlayers();
    if(p.length < 4) return;

    schedule=[];
    index=0;

    let total = parseInt(document.getElementById("totalTime").value);
    let match = parseInt(document.getElementById("matchTime").value);

    if(match <= 0 || total <= 0){
      error("Ungültige Zeiten!");
      return;
    }

    let rounds = Math.floor(total / match);

    if(rounds < 1){
      error("Zu wenige Runden!");
      return;
    }

    for(let r=0;r<rounds;r++){

      let pool=[...p].sort(()=>Math.random()-0.5);

      let a=[],b=[],bank=[];

      if(mode==="turnier"){

        if(p.length===5){
          bank=[pool[0]];
          let rest=pool.slice(1);
          a=[rest[0],rest[1]];
          b=[rest[2],rest[3]];
        }

        else if(p.length===6){
          bank=[pool[0],pool[1]];
          let rest=pool.slice(2);
          a=[rest[0],rest[1]];
          b=[rest[2],rest[3]];
        }

        else{
          a=[pool[0],pool[1]];
          b=[pool[2],pool[3]];
        }
      }

      if(mode==="gruppe"){

        if(p.length===6){
          let A=[p[0],p[1]];
          let B=[p[2],p[3]];
          let C=[p[4],p[5]];

          let rot=r%3;

          if(rot===0){a=A;b=B;bank=C;}
          if(rot===1){a=B;b=C;bank=A;}
          if(rot===2){a=C;b=A;bank=B;}
        }

        else{
          a=[p[0],p[1]];
          b=[p[2],p[3]];
        }
      }

      schedule.push({a,b,bank});
    }

    render();
    update();

  }catch(e){
    error("Systemfehler: "+e.message);
  }
}

/* =====================
   SAFE RENDER
===================== */

function render(){

  try{

    let box=document.getElementById("preview");
    if(!box) return;

    let html="";

    schedule.forEach((s,i)=>{
      if(!s.a || !s.b) return;

      html+=`
      R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}
      | Bank: ${s.bank?.join(", ") || "keine"}<br>
      `;
    });

    box.innerHTML=html;

  }catch(e){
    error("Render Fehler");
  }
}

/* =====================
   SAFE UPDATE
===================== */

function update(){

  let s=schedule[index];
  if(!s) return;

  document.getElementById("mode").innerText=
    mode==="turnier"?"🏆 Turnier":"👥 Gruppe";

  document.getElementById("round").innerText=
    "Runde "+(index+1);

  document.getElementById("teams").innerText=
    s.a.join(" / ")+" vs "+s.b.join(" / ");

  document.getElementById("bank").innerText=
    "Bank: "+(s.bank.join(", ")||"keine");
}

/* =====================
   KIOSK
===================== */

function enterKiosk(){
  document.body.classList.add("kioskMode");
}

function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =====================
   TIMER SAFE
===================== */

function startTimer(){

  timeLeft = parseInt(document.getElementById("matchTime").value)*60;

  clearInterval(timer);

  timer=setInterval(()=>{

    timeLeft--;

    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;

    document.getElementById("timer").innerText=`${m}:${s}`;

    if(timeLeft<=0){
      clearInterval(timer);
      finished=true;
    }

  },1000);
}

/* =====================
   NEXT SAFE
===================== */

function nextMatch(){

  if(!finished) return;

  index++;

  if(index>=schedule.length)
    index=0;

  finished=false;

  update();
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
