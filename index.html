<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Padel Manager</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: white;
      text-align: center;
    }

    .screen { display: none; padding: 40px; }
    .active { display: block; }

    h1, h2 { margin-top: 0; }

    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }

    .player {
      font-size: 24px;
      padding: 20px;
      border: none;
      border-radius: 12px;
      background: #1f6feb;
      color: white;
    }

    .start-btn {
      font-size: 28px;
      padding: 20px 40px;
      border: none;
      border-radius: 12px;
      background: #2ea043;
      color: white;
      margin-top: 20px;
    }

    button {
      font-size: 24px;
      padding: 15px 30px;
      margin: 10px;
      border: none;
      border-radius: 10px;
    }

    #matchInfo {
      font-size: 32px;
      margin: 40px 0;
    }

    /* ===== COURT MODE ===== */
    #courtScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #courtMatch {
      font-size: 48px;
      margin-bottom: 30px;
    }

    #timer {
      font-size: 120px;
      font-weight: bold;
    }

    #countdown {
      font-size: 80px;
      color: orange;
    }
  </style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen active">
  <h1>🎾 Padel Manager</h1>

  <div class="players">
    <button class="player">Werner</button>
    <button class="player">Marco</button>
    <button class="player">David</button>
    <button class="player">Stefan</button>
  </div>

  <button id="startBtn" class="start-btn">Spiel starten</button>
</div>

<!-- SPIELLEITER -->
<div id="gameScreen" class="screen">
  <h2>Spielleiter</h2>

  <div id="matchInfo"></div>

  <button id="startMatchBtn">START</button>
  <button id="nextBtn">NEXT</button>
  <button id="resetBtn">RESET</button>
</div>

<!-- COURT -->
<div id="courtScreen">
  <div id="courtMatch"></div>
  <div id="countdown"></div>
  <div id="timer"></div>
</div>

<script>
const startBtn = document.getElementById("startBtn");
const startMatchBtn = document.getElementById("startMatchBtn");
const nextBtn = document.getElementById("nextBtn");
const resetBtn = document.getElementById("resetBtn");

const startScreen = document.getElementById("startScreen");
const gameScreen = document.getElementById("gameScreen");
const courtScreen = document.getElementById("courtScreen");

const matches = [
  ["Werner + Marco", "David + Stefan"],
  ["Werner + David", "Marco + Stefan"],
  ["Werner + Stefan", "Marco + David"]
];

let currentMatch = 0;
let timer;
let seconds = 600; // 10 Minuten Testwert

function showMatch() {
  document.getElementById("matchInfo").innerHTML =
    matches[currentMatch][0] + "<br>vs<br>" + matches[currentMatch][1];
}

startBtn.addEventListener("click", () => {
  startScreen.classList.remove("active");
  gameScreen.classList.add("active");
  showMatch();
});

nextBtn.addEventListener("click", () => {
  currentMatch = (currentMatch + 1) % matches.length;
  showMatch();
});

resetBtn.addEventListener("click", () => {
  currentMatch = 0;
  gameScreen.classList.remove("active");
  startScreen.classList.add("active");
});

startMatchBtn.addEventListener("click", () => {
  startCourt();
});

function startCourt() {
  gameScreen.classList.remove("active");
  courtScreen.style.display = "flex";

  document.getElementById("courtMatch").innerHTML =
    matches[currentMatch][0] + " VS " + matches[currentMatch][1];

  startCountdown(10);
}

function startCountdown(sec) {
  let c = sec;

  const cd = document.getElementById("countdown");

  const interval = setInterval(() => {
    cd.innerText = "Start in " + c;
    c--;

    if (c < 0) {
      clearInterval(interval);
      cd.innerText = "";
      startTimer();
    }
  }, 1000);
}

function startTimer() {
  const t = document.getElementById("timer");

  timer = setInterval(() => {
    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;

    t.innerText =
      String(min).padStart(2, "0") + ":" +
      String(sec).padStart(2, "0");

    seconds--;

    if (seconds < 0) {
      clearInterval(timer);
      endMatch();
    }
  }, 1000);
}

function endMatch() {
  courtScreen.innerHTML = "<h1>MATCH BEENDET</h1>";

  setTimeout(() => {
    courtScreen.style.display = "none";
    gameScreen.classList.add("active");
    seconds = 600;
  }, 3000);
}
</script>

</body>
</html>
