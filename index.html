<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Manager V4.7</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

select, input, button {
    width:90%;
    padding:10px;
    margin:5px;
    font-size:18px;
}

button {
    background:#222;
    color:white;
    border:none;
    border-radius:8px;
}

#matchTimer {
    font-size:95px;
    font-weight:bold;
}

.warn { color:orange; }
.danger {
    color:red;
    animation:blink 0.8s infinite;
}

@keyframes blink {
    50% {opacity:0.2;}
}

.box {
    margin:10px;
    padding:10px;
    background:#1a1a1a;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>Padel Manager V4.7</h2>

<div id="setup">

<!-- FIXED PLAYERS -->
<select id="p1">
<option>Marco</option><option>Tobias</option><option>Werner</option>
<option>David</option><option>Christian</option><option>Stefan</option>
</select>

<select id="p2">
<option>Marco</option><option selected>Tobias</option><option>Werner</option>
<option>David</option><option>Christian</option><option>Stefan</option>
</select>

<select id="p3">
<option>Marco</option><option>Tobias</option><option selected>Werner</option>
<option>David</option><option>Christian</option><option>Stefan</option>
</select>

<select id="p4">
<option>Marco</option><option>Tobias</option><option>Werner</option>
<option selected>David</option><option>Christian</option><option>Stefan</option>
</select>

<select id="p5">
<option>Marco</option><option>Tobias</option><option>Werner</option>
<option>David</option><option selected>Christian</option><option>Stefan</option>
</select>

<select id="p6">
<option>Marco</option><option>Tobias</option><option>Werner</option>
<option>David</option><option>Christian</option><option selected>Stefan</option>
</select>

<select id="count">
<option value="4">4 Spieler</option>
<option value="5">5 Spieler</option>
<option value="6" selected>6 Spieler</option>
</select>

<select id="sessionTime">
<option value="120">120 Minuten</option>
<option value="180">180 Minuten</option>
</select>

<select id="matchTime">
<option value="15">15</option>
<option value="18">18</option>
<option value="20" selected>20</option>
<option value="25">25</option>
</select>

<select id="warning">
<option value="0">kein Signal</option>
<option value="60">60s vorher</option>
<option value="30" selected>30s vorher</option>
</select>

<button onclick="start()">Spiel starten</button>

</div>

<div id="game" style="display:none">

<div class="box">
<div id="matchTimer">00:00</div>
</div>

<div class="box">
<b>Gesamtzeit:</b> <span id="sessionTimer">00:00:00</span>
</div>

<div class="box">
<b>Runde:</b> <span id="round">1</span>
</div>

<div class="box" id="current"></div>
<div class="box" id="next"></div>

<button onclick="toggle()">Start / Pause</button>
<button onclick="nextRound()">Nächste Runde</button>

</div>

<script>

let schedule=[];
let current=0;
let round=1;

let sessionLeft=0;
let matchLeft=0;

let sessionInterval;
let matchInterval;

let running=false;

let sessionDuration=0;
let matchDuration=0;
let warningTime=0;

function getPlayers(){
return [
p1.value,p2.value,p3.value,p4.value,p5.value,p6.value
];
}

function start(){

let players=getPlayers().slice(0,parseInt(count.value));

sessionDuration=parseInt(sessionTime.value)*60;
matchDuration=parseInt(matchTime.value)*60;
warningTime=parseInt(warning.value);

sessionLeft=sessionDuration;
matchLeft=matchDuration;

buildSchedule(players);

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

render();
updateUI();
}

function buildSchedule(p){

schedule=[];

for(let i=0;i<10;i++){

let rot=[...p];
for(let r=0;r<i;r++) rot.push(rot.shift());

schedule.push({
a:[rot[0],rot[1]],
b:[rot[2],rot[3]],
bench:rot.slice(4)
});
}
}

function toggle(){

if(running){
clearInterval(sessionInterval);
clearInterval(matchInterval);
running=false;
}else{
running=true;

sessionInterval=setInterval(()=>{
if(sessionLeft>0){
sessionLeft--;
document.getElementById("sessionTimer").innerText=format(sessionLeft);
}
},1000);

startMatch();
}
}

function startMatch(){

clearInterval(matchInterval);

matchLeft=matchDuration;

matchInterval=setInterval(()=>{

if(matchLeft>0){
matchLeft--;

let el=document.getElementById("matchTimer");
el.innerText=format(matchLeft);

el.className="";

if(matchLeft<=60 && matchLeft>30) el.classList.add("warn");
if(matchLeft<=30 && matchLeft>0) el.classList.add("danger");

}else{
clearInterval(matchInterval);
}

},1000);
}

function nextRound(){

if(current < schedule.length-1){
current++;
round++;
render();
startMatch();
}
}

function render(){

let g=schedule[current];

document.getElementById("round").innerText=round;

document.getElementById("current").innerHTML=
"<b>JETZT</b><br>"+
"A: "+g.a.join(" + ")+"<br>"+
"B: "+g.b.join(" + ")+"<br>"+
(g.bench.length?"Pause: "+g.bench:"");

let n=schedule[current+1];

document.getElementById("next").innerHTML=
n?
"<b>NÄCHSTES MATCH</b><br>"+
"A: "+n.a.join(" + ")+"<br>"+
"B: "+n.b.join(" + ")+"<br>"+
(n.bench.length?"Pause: "+n.bench:"")
:
"<b>NÄCHSTES MATCH</b><br>— Ende —";
}

function updateUI(){
document.getElementById("sessionTimer").innerText=format(sessionLeft);
document.getElementById("matchTimer").innerText=format(matchLeft);
}

function format(s){
let h=String(Math.floor(s/3600)).padStart(2,"0");
let m=String(Math.floor((s%3600)/60)).padStart(2,"0");
let sec=String(s%60).padStart(2,"0");
return h+":"+m+":"+sec;
}

</script>

</body>
</html>
