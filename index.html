<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal Stable</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
  text-align:center;
}

/* ADMIN */
#admin{
  padding:20px;
}

.panel{
  background:#255d3d;
  padding:15px;
  border-radius:12px;
  margin:10px auto;
  max-width:850px;
}

/* COURT */
#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:15px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
  opacity:0.9;
}

/* TIMER */
#eventTime{
  font-size:5vh;
  font-weight:bold;
}

#matchTime{
  font-size:24vh;
  font-weight:bold;
}

/* TEAMS */
#teams{
  font-size:6vh;
  font-weight:bold;
}

/* BUTTONS */
button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:#2e8b57;
  color:white;
}
.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:#b33a3a;
}
</style>
</head>

<body>

<!-- ================= ADMIN ================= -->
<div id="admin">

<h1>🎾 Padel Terminal</h1>

<div class="panel">
<h3>Match Zeit</h3>
<select id="matchSelect">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>
</div>

<div class="panel">
<h3>Spielabend</h3>
<select id="eventSelect">
  <option value="120" selected>120</option>
  <option value="180">180</option>
</select>
</div>

<div class="panel">
<button onclick="start()">▶ START</button>
</div>

</div>

<!-- ================= COURT ================= -->
<div id="court">

<button class="exit" onclick="exit()">❌ EXIT</button>

<div class="top">
  <div id="eventTime">120:00</div>
  <div>COURT 1</div>
</div>

<div id="matchTime">18:00</div>

<div id="teams"></div>

<div>
<button onclick="startMatch()">▶ START MATCH</button>
<button onclick="pause()">⏸ PAUSE</button>
<button onclick="next()">➡ NEXT</button>
</div>

</div>

<script>

/* ================= DATA ================= */

const players=["Tobias","Werner","Christian","Stefan","David","Marco"];

let active=[...players];
let rotation=0;

/* TIMERS */
let event={total:120*60,remain:120*60,started:false};
let match={total:18*60,remain:18*60,interval:null};

/* ================= START ================= */

function start(){

  match.total=parseInt(matchSelect.value)*60;
  match.remain=match.total;

  event.total=parseInt(eventSelect.value)*60;
  event.remain=event.total;

  admin.style.display="none";
  court.style.display="flex";

  document.documentElement.requestFullscreen?.();

  render();
}

/* ================= MATCH ================= */

function startMatch(){

  if(match.interval) return;

  // Event startet NUR beim ersten Match
  if(!event.started){
    event.started=true;
  }

  match.interval=setInterval(()=>{

    match.remain--;
    event.remain--;   // 🔥 läuft durchgehend weiter

    if(match.remain<=0){
      next();
    }

    render();

  },1000);
}

/* ================= NEXT ================= */

function next(){

  rotation=(rotation+2)%active.length;
  match.remain=match.total;

  render();
}

/* ================= PAUSE ================= */

function pause(){
  clearInterval(match.interval);
  match.interval=null;
}

/* ================= EXIT ================= */

function exit(){
  pause();
  court.style.display="none";
  admin.style.display="block";
  document.exitFullscreen?.();
}

/* ================= TEAMS ================= */

function getTeams(){

  let a=[],b=[],c=[];

  for(let i=0;i<active.length;i++){
    let idx=(i+rotation)%active.length;

    if(i<2)a.push(active[idx]);
    else if(i<4)b.push(active[idx]);
    else c.push(active[idx]);
  }

  return{a,b,c};
}

/* ================= RENDER ================= */

function render(){

  let em=Math.floor(event.remain/60);
  let es=event.remain%60;

  let mm=Math.floor(match.remain/60);
  let ms=match.remain%60;

  eventTime.textContent=em+":"+String(es).padStart(2,"0");
  matchTime.textContent=mm+":"+String(ms).padStart(2,"0");

  let t=getTeams();

  teams.innerHTML=
    "A: "+t.a.join(" | ")+"<br>"+
    "B: "+t.b.join(" | ")+"<br>"+
    "BANK: "+t.c.join(" | ");
}

render();

</script>

</body>
</html>
