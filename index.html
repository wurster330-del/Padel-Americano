<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Timer V2</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#184b2f;
  color:white;
  text-align:center;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{margin:10px 0}

#timer{
  font-size:120px;
  font-weight:bold;
  margin:10px 0;
}

#info{
  font-size:22px;
}

.row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:10px 0;
}

button{
  padding:12px 16px;
  font-size:16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#2e8b57;
  color:white;
}

.panel{
  margin-top:20px;
  background:#255d3d;
  padding:15px;
  border-radius:12px;
}

.teams{
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
}

.team{
  min-width:120px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>🎾 Padel Timer</h1>

  <div id="info">Runde 1</div>
  <div id="timer">00:00</div>

  <div class="row">
    <button onclick="start()">▶ Start</button>
    <button onclick="pause()">⏸ Pause</button>
    <button onclick="reset()">⏹ Reset</button>
    <button onclick="nextRound()">🔄 Runde</button>
  </div>

  <div class="row">
    <button onclick="setPlayers(4)">4 Spieler</button>
    <button onclick="setPlayers(5)">5 Spieler</button>
    <button onclick="setPlayers(6)">6 Spieler</button>
  </div>

  <div class="panel">
    <div class="teams">
      <div>
        <b>TEAM A</b>
        <div id="teamA"></div>
      </div>

      <div>
        <b>TEAM B</b>
        <div id="teamB"></div>
      </div>
    </div>

    <div id="bench" style="margin-top:10px;"></div>
  </div>
</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
preload="auto"></audio>

<script>
let state = {
  players:["Tobias","Werner","Christian","Stefan","David","Marco"],
  rotation:0,
  round:1,
  remain:0,
  total:0,
  interval:null
};

const timerEl = document.getElementById("timer");
const infoEl = document.getElementById("info");
const teamAEl = document.getElementById("teamA");
const teamBEl = document.getElementById("teamB");
const benchEl = document.getElementById("bench");

function setGameTime(){
  const n = state.players.length;
  state.total = (n <= 4 ? 120 : 180) * 60;
  state.remain = state.total;
}

function setPlayers(n){
  state.players = state.players.slice(0,n);
  state.rotation = 0;
  state.round = 1;
  setGameTime();
  draw();
}

function getTeams(){
  const p = state.players;
  const a = [];
  const b = [];
  const bench = [];

  for(let i=0;i<p.length;i++){
    const idx = (i + state.rotation) % p.length;

    if(i < 2) a.push(p[idx]);
    else if(i < 4) b.push(p[idx]);
    else bench.push(p[idx]);
  }

  return {a,b,bench};
}

function draw(){
  let m = Math.floor(state.remain/60);
  let s = state.remain%60;

  timerEl.textContent =
    String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

  infoEl.textContent = "Runde " + state.round;

  const {a,b,bench} = getTeams();

  teamAEl.innerHTML = a.join("<br>") || "-";
  teamBEl.innerHTML = b.join("<br>") || "-";
  benchEl.textContent = "Bank: " + bench.join(", ");
}

function tick(){
  if(state.remain <= 0){
    pause();
    document.getElementById("beep").play();
    alert("Zeit vorbei!");
    return;
  }
  state.remain--;
  draw();
}

function start(){
  if(state.interval) return;
  state.interval = setInterval(tick,1000);
}

function pause(){
  clearInterval(state.interval);
  state.interval = null;
}

function reset(){
  pause();
  setGameTime();
  draw();
}

function nextRound(){
  state.rotation = (state.rotation + 1) % state.players.length;
  state.round++;
  draw();
}

// INIT
setGameTime();
draw();
</script>

</body>
</html>
