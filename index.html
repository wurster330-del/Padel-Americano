<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Manager</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

input, select, button {
    width: 90%;
    padding: 10px;
    margin: 5px;
    font-size: 18px;
}

button {
    background: #222;
    color: white;
    border: none;
    border-radius: 8px;
}

.timer {
    font-size: 60px;
    margin: 10px;
}

.box {
    margin: 10px;
    padding: 10px;
    background: #1a1a1a;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>Padel Manager</h2>

<div id="setup">
    <input id="p1" placeholder="Spieler 1">
    <input id="p2" placeholder="Spieler 2">
    <input id="p3" placeholder="Spieler 3">
    <input id="p4" placeholder="Spieler 4">
    <input id="p5" placeholder="Spieler 5">
    <input id="p6" placeholder="Spieler 6">

    <select id="count">
        <option value="4">4 Spieler</option>
        <option value="5">5 Spieler</option>
        <option value="6">6 Spieler</option>
    </select>

    <select id="time">
        <option value="120">120 Minuten</option>
        <option value="180">180 Minuten</option>
    </select>

    <button onclick="start()">Spiel starten</button>
</div>

<div id="game" style="display:none">

<div class="timer" id="timer">00:00:00</div>

<div class="box">
<b>Runde:</b> <span id="round">1</span><br>
<b>Matchzeit:</b> 20 Minuten
</div>

<div class="box" id="current"></div>

<div class="box" id="next"></div>

<button onclick="toggle()">Start / Pause</button>
<button onclick="next()">Nächste Runde</button>

</div>

<script>

let players=[];
let round=1;
let time=0;
let total=0;
let match=20*60;
let running=false;
let interval;
let last="";

let currentMatch="";
let nextMatch="";

function start(){

players=[
p1.value,p2.value,p3.value,p4.value,p5.value,p6.value
].filter(x=>x);

players=players.slice(0,parseInt(count.value));

total=parseInt(time.value)*60;
time=total;

document.getElementById("setup").style.display="none";
document.getElementById("game").style.display="block";

generate();
render();
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}

function generate(){

let p=shuffle([...players]);

let a=p.slice(0,2);
let b=p.slice(2,4);
let bench=p.slice(4);

currentMatch={
a,b,bench
};

// NEXT MATCH
let p2=shuffle([...players]);

let a2=p2.slice(0,2);
let b2=p2.slice(2,4);
let bench2=p2.slice(4);

nextMatch={
a:a2,b:b2,bench:bench2
};
}

function render(){

document.getElementById("round").innerText=round;

document.getElementById("current").innerHTML=
"<b>JETZT</b><br>"+
"A: "+currentMatch.a.join(" + ")+"<br>"+
"B: "+currentMatch.b.join(" + ")+"<br>"+
(currentMatch.bench.length?"Pause: "+currentMatch.bench:"");

document.getElementById("next").innerHTML=
"<b>NÄCHSTES MATCH</b><br>"+
"A: "+nextMatch.a.join(" + ")+"<br>"+
"B: "+nextMatch.b.join(" + ")+"<br>"+
(nextMatch.bench.length?"Pause: "+nextMatch.bench:"");
}

function toggle(){

if(running){
clearInterval(interval);
running=false;
}else{
interval=setInterval(()=>{
if(time>0){
time--;
document.getElementById("timer").innerText=format(time);
}else{
clearInterval(interval);
}
},1000);
running=true;
}
}

function next(){
round++;
generate();
render();
}

function format(s){
let h=String(Math.floor(s/3600)).padStart(2,"0");
let m=String(Math.floor((s%3600)/60)).padStart(2,"0");
let sec=String(s%60).padStart(2,"0");
return h+":"+m+":"+sec;
}

</script>

</body>
</html>
