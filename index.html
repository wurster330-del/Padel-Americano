<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Padel Club Terminal V10.4.1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#03140f;
  color:white;
}

/* 📱 iPad optimiertes Layout */
#app{
  padding:10px;
  max-width:1000px;
  margin:auto;
}

h1{
  text-align:center;
  margin:10px 0;
}

h2{
  margin:6px 0 8px 0;
}

/* Panels kompakter */
.panel{
  background:#185c3b;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

/* Buttons größer für Touch */
button{
  padding:14px 18px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  font-size:16px;
}

/* Timer klarer */
.timer{
  font-size:90px;
  text-align:center;
  font-weight:900;
  margin:5px 0;
}

/* Spieler kompakter */
.playerRow{
  display:flex;
  gap:8px;
  margin:2px 0;
  align-items:center;
}

input{
  flex:1;
  padding:8px;
  font-size:16px;
}

/* KIOSK */
.kiosk #app{ display:none; }
.kiosk #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:30px;
}

.kioskTimer{
  font-size:180px;
  font-weight:900;
  color:#00ff99;
  margin-bottom:10px;
}

.kioskTeam{
  font-size:42px;
  margin:6px;
}

/* Control Bar */
.controlBar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0d3a25;
  display:flex;
  justify-content:center;
  padding:8px;
  gap:8px;
}

.controlBar button{
  flex:1;
  max-width:140px;
}

/* PIN */
#pinOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
  text-align:center;
  padding-top:120px;
}

#pinOverlay input{
  font-size:28px;
  padding:10px;
}
</style>
</head>

<body>

<div id="app">

<h1>🎾 V10.4.1</h1>

<div class="panel">
<button onclick="enterKiosk()">📺 Kiosk</button>
<button onclick="generate()">🏆 Turnier</button>
</div>

<div class="panel">
<h2>⏱ Timer</h2>
<div class="timer" id="timer">18:00</div>
</div>

<div class="panel">
<h2>👥 Spieler</h2>
<div id="players"></div>
</div>

<div class="panel">
<h2>🎾 Court</h2>
<div id="court">Kein Turnier</div>
</div>

</div>

<!-- 📺 KIOSK -->
<div id="kiosk">
  <div class="kioskTimer" id="kioskTimer">18:00</div>
  <div class="kioskTeam" id="kioskA"></div>
  <div class="kioskTeam" id="kioskB"></div>
  <div class="kioskTeam" id="kioskBank"></div>
  <div class="kioskTeam" id="kioskInfo"></div>

  <!-- 🔒 Exit -->
  <div style="position:fixed;top:10px;right:10px;">
    <button onclick="openPin()">🔒</button>
  </div>
</div>

<!-- CONTROL -->
<div class="controlBar">
<button onclick="startTimer()">▶ Start</button>
<button onclick="pauseTimer()">⏸ Pause</button>
<button onclick="nextMatch()">➡ Next</button>
</div>

<!-- PIN -->
<div id="pinOverlay">
  <h2>PIN</h2>
  <input id="pin" type="password">
  <br><br>
  <button onclick="checkPin()">OK</button>
</div>

<script>

/* ================= PLAYERS ================= */

let players = [
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;

let matchTime=18*60;
let run=null;

/* ================= UI ================= */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox" ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">

        <input type="text" value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>`;
  });
}

renderPlayers();

/* ================= GENERATE ================= */

function generate(){

  let list=players.filter(p=>p.active).map(p=>p.name);

  schedule=[];
  index=0;

  let rounds=6;

  for(let r=0;r<rounds;r++){

    list=list.sort(()=>Math.random()-0.5);

    let a=[list[0],list[1]];
    let b=[list[2],list[3]];
    let bank=list.slice(4);

    schedule.push({round:r+1,a,b,bank});
  }

  update();
}

/* ================= TIMER ================= */

function startTimer(){
  if(run) return;

  run=setInterval(()=>{

    if(matchTime>0) matchTime--;

    if(matchTime<=0){
      matchTime=0;
      clearInterval(run);
      run=null;
    }

    update();

  },1000);
}

function pauseTimer(){
  clearInterval(run);
  run=null;
}

/* ================= NEXT ================= */

function nextMatch(){
  index++;
  if(index>=schedule.length) index=0;
  matchTime=18*60;
  update();
}

/* ================= UPDATE ================= */

function update(){

  let t=Math.floor(matchTime/60)+":"+String(matchTime%60).padStart(2,"0");

  document.getElementById("timer").textContent=t;
  document.getElementById("kioskTimer").textContent=t;

  if(schedule.length==0) return;

  let s=schedule[index];

  document.getElementById("court").innerHTML=
  `A: ${s.a.join(" / ")}<br>
   B: ${s.b.join(" / ")}<br>
   BANK: ${s.bank.join(" / ")||"-"}<br>
   Runde ${s.round}`;

  document.getElementById("kioskA").textContent="A: "+s.a.join(" / ");
  document.getElementById("kioskB").textContent="B: "+s.b.join(" / ");
  document.getElementById("kioskBank").textContent="BANK: "+(s.bank.join(" / ")||"-");
}

/* ================= KIOSK ================= */

function enterKiosk(){
  document.body.classList.add("kiosk");
  document.documentElement.requestFullscreen?.();
}

/* ================= PIN ================= */

function openPin(){
  document.getElementById("pinOverlay").style.display="block";
}

function checkPin(){
  if(document.getElementById("pin").value==="1234"){
    document.body.classList.remove("kiosk");
  }
  document.getElementById("pinOverlay").style.display="none";
}

</script>

</body>
</html>
