<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel-Götter V2.1 Integrated</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{
  display:flex;
  height:100vh;
}

/* LEFT: CONTROL */
#control{
  width:35%;
  padding:15px;
  background:#124d35;
  overflow:auto;
}

/* RIGHT: KIOSK */
#kiosk{
  width:65%;
  background:#000;
  text-align:center;
  padding:20px;
}

/* UI */
.section{
  margin-bottom:15px;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.start{background:#1f6f4a;color:white;}
.next{background:#444;color:white;}
.end{background:#b30000;color:white;}
.exit{background:#666;color:white;}

/* KIOSK UI */
.big{
  font-size:40px;
  font-weight:bold;
}

.match{
  font-size:70px;
  margin:20px 0;
  font-weight:bold;
}

.timer{
  font-size:200px;
  color:#00ff99;
  font-weight:bold;
  line-height:1;
}

.bank{
  font-size:55px;
  opacity:0.95;
  margin-top:15px;
}

.player{
  display:flex;
  gap:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="app">

<!-- =====================
     CONTROL PANEL
===================== -->
<div id="control">

<h2>🏆 Padel-Götter V2.1</h2>

<h3>Spieler</h3>
<div id="players"></div>

<h3>Modus</h3>
<button onclick="setMode('turnier')">Turnier</button>
<button onclick="setMode('gruppe')">Gruppe</button>

<h3>Zeit</h3>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>

<div class="section">
<button onclick="generate()">Spielplan erstellen</button>
<button onclick="remix()">Neu mischen</button>
</div>

</div>

<!-- =====================
     KIOSK
===================== -->
<div id="kiosk">

<div class="big">🏆 PADEL-GÖTTER</div>

<div class="match" id="match">---</div>

<div class="timer" id="timer">00:00</div>

<div class="bank" id="bank">-</div>

<div>
<button class="start" onclick="start()">START</button>
<button class="end" onclick="endMatch()">MATCHENDE</button>
<button class="next" onclick="next()">NEXT</button>
<button class="exit" onclick="exitKiosk()">EXIT</button>
</div>

</div>

</div>

<script>

/* =====================
   STATE
===================== */

let mode = "turnier";
let players = ["Marco","Stefan","David","Tobias","Chris","Werner"];
let active = {};
let schedule = [];
let index = 0;

let fixedTeams = [];

let timeLeft = 18 * 60;
let timer = null;
let running = false;

/* =====================
   INIT PLAYERS
===================== */

function init(){
  let box = document.getElementById("players");

  players.forEach(p=>{
    active[p] = true;

    let row = document.createElement("div");
    row.className = "player";

    let cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = true;
    cb.onchange = ()=> active[p] = cb.checked;

    row.appendChild(cb);
    row.appendChild(document.createTextNode(p));

    box.appendChild(row);
  });
}

/* =====================
   HELPERS
===================== */

function getPlayers(){
  return players.filter(p=>active[p]);
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

/* =====================
   MODE
===================== */

function setMode(m){
  mode = m;
}

/* =====================
   GROUP FIXED TEAMS
===================== */

function createTeams(p){

  let pool = shuffle(p);
  fixedTeams = [];

  if(pool.length === 6){
    fixedTeams = [
      [pool[0],pool[1]],
      [pool[2],pool[3]],
      [pool[4],pool[5]]
    ];
  }

  if(pool.length === 5){
    fixedTeams = [
      [pool[0],pool[1]],
      [pool[2],pool[3]],
      [pool[4]]
    ];
  }

  if(pool.length === 4){
    fixedTeams = [
      [pool[0],pool[1]],
      [pool[2],pool[3]]
    ];
  }
}

/* =====================
   TURNIER ROUND
===================== */

function turnierRound(p){

  let pool = shuffle(p);

  return {
    a:[pool[0],pool[1]],
    b:[pool[2],pool[3]],
    bank: pool.length === 6 ? [pool[4],pool[5]] : [pool[4] || ""]
  };
}

/* =====================
   GROUP ROUND (FIXED TEAMS)
===================== */

function groupRound(r){

  let t = fixedTeams;

  if(t.length === 2){
    return {a:t[0], b:t[1], bank:[]};
  }

  switch(r % 3){
    case 0: return {a:t[0], b:t[1], bank:t[2]};
    case 1: return {a:t[1], b:t[2], bank:t[0]};
    case 2: return {a:t[2], b:t[0], bank:t[1]};
  }
}

/* =====================
   GENERATE ENGINE
===================== */

function generate(){

  let p = getPlayers();

  const total = Number(document.getElementById("totalTime").value);
  const match = Number(document.getElementById("matchTime").value);

  const rounds = Math.floor(total / match);

  schedule = [];
  index = 0;

  if(mode === "gruppe"){
    createTeams(p);
  }

  for(let r=0;r<rounds;r++){

    let round;

    if(mode === "turnier"){
      round = turnierRound(p);
    } else {
      round = groupRound(r);
    }

    schedule.push(round);
  }

  render();
}

/* =====================
   REMIX
===================== */

function remix(){

  schedule = [];
  index = 0;

  if(mode === "gruppe"){
    createTeams(getPlayers());
  }

  generate();
}

/* =====================
   KIOSK RENDER
===================== */

function render(){

  let s = schedule[index];

  if(!s) return;

  document.getElementById("match").innerText =
    s.a.join(" & ") + " vs " + s.b.join(" & ");

  document.getElementById("bank").innerText =
    "Bank: " + (s.bank.join(", ") || "-");
}

/* =====================
   TIMER
===================== */

function updateTimer(){

  let m = Math.floor(timeLeft / 60);
  let s = timeLeft % 60;

  document.getElementById("timer").innerText =
    String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}

/* =====================
   START
===================== */

function start(){

  if(running) return;

  running = true;

  timer = setInterval(()=>{

    if(timeLeft > 0){
      timeLeft--;
      updateTimer();
    } else {
      endMatch();
    }

  },1000);
}

/* =====================
   MATCHENDE
===================== */

function endMatch(){

  clearInterval(timer);
  running = false;

  timeLeft = 0;
  updateTimer();
}

/* =====================
   NEXT
===================== */

function next(){

  clearInterval(timer);
  running = false;

  index++;

  if(index >= schedule.length){
    index = 0;
  }

  const match = Number(document.getElementById("matchTime").value);
  timeLeft = match * 60;

  render();
  updateTimer();
}

/* =====================
   EXIT
===================== */

function exitKiosk(){

  clearInterval(timer);
  running = false;

  document.getElementById("match").innerText = "⛔ KIOSK PAUSIERT";
  document.getElementById("bank").innerText = "-";
}

/* INIT */
init();
updateTimer();

</script>

</body>
</html>
