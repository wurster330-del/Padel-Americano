<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Timer Selection</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#184b2f;
  color:white;
  text-align:center;
}

.wrap{max-width:900px;margin:auto;padding:20px}

h1{margin:10px 0}

.row{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  cursor:pointer;
}

.panel{
  margin-top:20px;
  background:#255d3d;
  padding:15px;
  border-radius:12px;
}

.playerBox{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:10px;
}

.player{
  padding:10px;
  background:#1f6b42;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>🎾 Padel Auswahl System</h1>

<!-- PLAYERS -->
<div class="playerBox" id="playerBox"></div>

<div class="row">
<button onclick="applySelection()">✔ Auswahl übernehmen</button>
<button onclick="selectAll()">Alle wählen</button>
<button onclick="clearSelection()">Reset Auswahl</button>
</div>

<!-- TIMER -->
<div class="panel">
<div><b>Spielabend:</b> <span id="eventTime">120:00</span></div>
<div><b>Match:</b> <span id="matchTime">18:00</span></div>
</div>

<!-- TEAMS -->
<div class="panel">
<div id="teams"></div>
</div>

</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

// ================= DATA =================
const allPlayers = ["Tobias","Werner","Christian","Stefan","David","Marco"];
let activePlayers = [...allPlayers];
let selected = new Set(allPlayers);

let rotation = 0;

let event = { total:120*60, remain:120*60, interval:null };
let match = { total:18*60, remain:18*60, interval:null };

// ================= DOM =================
const box = document.getElementById("playerBox");
const teamsEl = document.getElementById("teams");
const eventEl = document.getElementById("eventTime");
const matchEl = document.getElementById("matchTime");

// ================= UI =================
function renderPlayers(){
  box.innerHTML = "";

  allPlayers.forEach(p=>{
    box.innerHTML += `
      <label class="player">
        <input type="checkbox" checked onchange="togglePlayer('${p}',this.checked)">
        ${p}
      </label>
    `;
  });
}

function togglePlayer(name, checked){
  if(checked) selected.add(name);
  else selected.delete(name);
}

// ================= APPLY =================
function applySelection(){
  activePlayers = [...selected];

  if(activePlayers.length < 4){
    alert("Mindestens 4 Spieler!");
    return;
  }

  rotation = 0;
  setEventTime();
  render();
}

function selectAll(){
  selected = new Set(allPlayers);
  renderPlayers();
}

function clearSelection(){
  selected.clear();
  renderPlayers();
}

// ================= TIME =================
function setEventTime(){
  if(activePlayers.length === 4){
    event.total = 120 * 60;
  } else {
    event.total = 180 * 60;
  }
  event.remain = event.total;
}

// ================= TEAMS =================
function getTeams(){
  let a=[],b=[],bench=[];

  for(let i=0;i<activePlayers.length;i++){
    let idx = (i + rotation) % activePlayers.length;

    if(i < 2) a.push(activePlayers[idx]);
    else if(i < 4) b.push(activePlayers[idx]);
    else bench.push(activePlayers[idx]);
  }

  return {a,b,bench};
}

// ================= TIMER =================
setInterval(()=>{
  if(event.remain > 0) event.remain--;
  if(match.remain > 0) match.remain--;
  render();
},1000);

// ================= RENDER =================
function render(){

  let em = Math.floor(event.remain/60);
  let es = event.remain%60;

  let mm = Math.floor(match.remain/60);
  let ms = match.remain%60;

  eventEl.textContent =
    String(em).padStart(2,"0")+":"+String(es).padStart(2,"0");

  matchEl.textContent =
    String(mm).padStart(2,"0")+":"+String(ms).padStart(2,"0");

  let {a,b,bench} = getTeams();

  teamsEl.innerHTML =
    "<b>Team A:</b> "+a.join(", ")+"<br>"+
    "<b>Team B:</b> "+b.join(", ")+"<br>"+
    "<b>Bank:</b> "+bench.join(", ");
}

// INIT
renderPlayers();
render();

</script>

</body>
</html>
