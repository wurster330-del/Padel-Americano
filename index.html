<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Padel Club Terminal V10.2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#04130d;
  color:white;
}

#app{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

.panel{
  background:#1a5335;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
}

.timer{
  font-size:80px;
  text-align:center;
  font-weight:900;
}

.warning{
  color:red;
  text-align:center;
  display:none;
  font-weight:bold;
}

.playerRow{
  display:flex;
  gap:10px;
  margin:6px 0;
}

input[type="text"]{
  flex:1;
}

.teamBox{
  text-align:center;
  font-weight:bold;
  margin:5px;
}

/* KIOSK */
.kiosk #app{ display:none; }
.kiosk #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:40px;
}

.kioskTimer{
  font-size:180px;
  color:#00ff99;
  font-weight:bold;
}

.kioskTeam{
  font-size:40px;
}

/* CONTROL */
.controlBar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:center;
  background:#0d3a25;
  padding:10px;
  gap:10px;
}

/* PIN */
#pinOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
  text-align:center;
  padding-top:120px;
}
</style>
</head>

<body>

<div id="app">

<h1>🎾 V10.2 LIVE</h1>

<div class="panel">
<button onclick="enterKiosk()">📺 Kiosk</button>
<button onclick="generate()">🏆 Turnier</button>
<button onclick="resetStorage()">🔄 Reset</button>
</div>

<div class="panel">
<h3>⏱ Timer</h3>
<div class="timer" id="timer">18:00</div>
<div class="warning" id="warning">⚠ 30 SEKUNDEN</div>
</div>

<div class="panel">
<h3>👥 Spieler</h3>
<div id="players"></div>
</div>

<div class="panel">
<h3>📊 Statistik</h3>
<div id="stats"></div>
</div>

<div class="panel">
<h3>🎾 Court</h3>
<div id="court">Kein Turnier</div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">
  <div class="kioskTimer" id="kioskTimer">18:00</div>
  <div class="kioskTeam" id="kioskA"></div>
  <div class="kioskTeam" id="kioskB"></div>
  <div class="kioskTeam" id="kioskBank"></div>
  <div class="kioskTeam" id="kioskInfo"></div>
</div>

<!-- CONTROL -->
<div class="controlBar">
<button onclick="startTimer()">▶ Start</button>
<button onclick="pauseTimer()">⏸ Pause</button>
<button onclick="nextMatch()">➡ Next</button>
</div>

<!-- PIN -->
<div id="pinOverlay">
  <h2>PIN</h2>
  <input id="pin" type="password">
  <button onclick="checkPin()">OK</button>
</div>

<script>

/* ================= STATE ================= */

let players = [];
let schedule = [];
let index = 0;

let matchMinutes = 18;
let matchTime = matchMinutes * 60;
let run = null;

/* ================= LOAD ================= */

function load(){
  let data = localStorage.getItem("v102");
  if(data){
    let d = JSON.parse(data);
    players = d.players;
    schedule = d.schedule || [];
    index = d.index || 0;
    matchTime = d.matchTime || matchMinutes*60;
  } else {
    players = [
      {name:"Marco",active:true},
      {name:"Stefan",active:true},
      {name:"David",active:true},
      {name:"Tobias",active:true},
      {name:"Christian",active:true},
      {name:"Werner",active:true}
    ];
  }
}

/* ================= SAVE ================= */

function save(){
  localStorage.setItem("v102", JSON.stringify({
    players,schedule,index,matchTime
  }));
}

/* ================= RENDER PLAYERS ================= */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
    <div class="playerRow">
      <input type="checkbox" ${p.active?"checked":""}
      onchange="players[${i}].active=this.checked;save()">

      <input type="text" value="${p.name}"
      onchange="players[${i}].name=this.value;save()">
    </div>`;
  });
}

/* ================= STATS ================= */

function renderStats(){
  let stats={};

  players.forEach(p=>{
    stats[p.name]={games:0};
  });

  schedule.forEach(s=>{
    [...s.a,...s.b].forEach(n=>{
      if(stats[n]) stats[n].games++;
    });
  });

  let html="";
  for(let k in stats){
    html+=`${k}: ${stats[k].games} Spiele<br>`;
  }

  document.getElementById("stats").innerHTML=html;
}

/* ================= GENERATE ================= */

function generate(){
  let list=players.filter(p=>p.active).map(p=>p.name);

  schedule=[];

  let rounds=8;

  for(let r=0;r<rounds;r++){

    list=list.sort(()=>Math.random()-0.5);

    let a=[list[0],list[1]];
    let b=[list[2],list[3]];
    let bank=list.slice(4);

    schedule.push({round:r+1,a,b,bank});
  }

  save();
  update();
}

/* ================= TIMER ================= */

function startTimer(){
  if(run) return;

  run=setInterval(()=>{
    if(matchTime>0) matchTime--;

    if(matchTime<=0){
      matchTime=0;
      clearInterval(run);
    }

    update();
    save();

  },1000);
}

function pauseTimer(){
  clearInterval(run);
  run=null;
  save();
}

/* ================= NEXT ================= */

function nextMatch(){
  index++;
  if(index>=schedule.length) index=0;
  matchTime=matchMinutes*60;
  save();
  update();
}

/* ================= UPDATE ================= */

function update(){

  let t=Math.floor(matchTime/60)+":"+String(matchTime%60).padStart(2,"0");

  document.getElementById("timer").textContent=t;
  document.getElementById("kioskTimer").textContent=t;

  if(schedule.length==0) return;

  let s=schedule[index];

  document.getElementById("court").innerHTML=
  `A: ${s.a.join(" / ")}<br>
   B: ${s.b.join(" / ")}<br>
   BANK: ${s.bank.join(" / ")||"-"}<br>
   Runde ${s.round}`;

  document.getElementById("kioskA").textContent="A: "+s.a.join(" / ");
  document.getElementById("kioskB").textContent="B: "+s.b.join(" / ");
  document.getElementById("kioskBank").textContent="BANK: "+(s.bank.join(" / ")||"-");

  renderStats();
}

/* ================= KIOSK ================= */

function enterKiosk(){
  document.body.classList.add("kiosk");
  document.documentElement.requestFullscreen?.();
}

/* ================= PIN ================= */

function checkPin(){
  if(document.getElementById("pin").value==="1234"){
    document.body.classList.remove("kiosk");
  }
}

/* ================= RESET ================= */

function resetStorage(){
  localStorage.removeItem("v102");
  location.reload();
}

/* ================= INIT ================= */

load();
renderPlayers();
update();

</script>

</body>
</html>
