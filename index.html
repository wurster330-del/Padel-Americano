<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Terminal V10.3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#03140f;
  color:white;
}

#app{ padding:15px; max-width:1000px; margin:auto; }

.panel{
  background:#185c3b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:12px 16px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
}

.timer{
  font-size:80px;
  text-align:center;
  font-weight:bold;
}

.playerRow{
  display:flex;
  gap:10px;
  margin:6px 0;
}

input{ flex:1; }

.kiosk #app{ display:none; }
.kiosk #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:40px;
}

.kioskTimer{
  font-size:170px;
  color:#00ff99;
  font-weight:bold;
}

.kioskTeam{
  font-size:40px;
}

.controlBar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0d3a25;
  display:flex;
  justify-content:center;
  padding:10px;
}
</style>
</head>

<body>

<div id="app">

<h1>🎾 V10.3 SMART FAIRNESS</h1>

<div class="panel">
<button onclick="enterKiosk()">📺 Kiosk</button>
<button onclick="generate()">🏆 Turnier</button>
</div>

<div class="panel">
<h2>⏱ Timer</h2>
<div class="timer" id="timer">18:00</div>
</div>

<div class="panel">
<h2>👥 Spieler</h2>
<div id="players"></div>
</div>

<div class="panel">
<h2>📊 Fairness</h2>
<div id="fairness"></div>
</div>

<div class="panel">
<h2>🎾 Court</h2>
<div id="court"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">
  <div class="kioskTimer" id="kioskTimer">18:00</div>
  <div class="kioskTeam" id="kioskA"></div>
  <div class="kioskTeam" id="kioskB"></div>
  <div class="kioskTeam" id="kioskBank"></div>
</div>

<script>

/* ================= PLAYERS ================= */

let players=[
  {name:"Marco"},
  {name:"Stefan"},
  {name:"David"},
  {name:"Tobias"},
  {name:"Christian"},
  {name:"Werner"}
];

let schedule=[];
let index=0;

let stats={};

/* ================= INIT STATS ================= */

function initStats(){
  players.forEach(p=>{
    stats[p.name]={
      games:0,
      bank:0,
      partners:{},
      opponents:{}
    };
  });
}

/* ================= FAIRNESS SCORE ================= */

function score(a,b){

  function s(p){
    let x=stats[p];

    return (
      -x.games*2
      -x.bank*3
    );
  }

  return s(a)+s(b);
}

/* ================= BEST TEAM ================= */

function bestTeams(list){

  let best=null;
  let bestScore=-99999;

  for(let i=0;i<list.length;i++){
    for(let j=i+1;j<list.length;j++){
      let a=[list[i],list[j]];

      for(let x=0;x<list.length;x++){
        for(let y=x+1;y<list.length;y++){

          if(x==i||x==j||y==i||y==j) continue;

          let b=[list[x],list[y]];

          let sc=score(a[0],a[1])+score(b[0],b[1]);

          if(sc>bestScore){
            bestScore=sc;
            best={a,b};
          }
        }
      }
    }
  }

  return best;
}

/* ================= GENERATE ================= */

function generate(){

  let list=players.map(p=>p.name);

  schedule=[];
  index=0;

  initStats();

  for(let r=0;r<6;r++){

    let best=bestTeams(list);

    best.a.forEach(p=>stats[p].games++);
    best.b.forEach(p=>stats[p].games++);

    let used=new Set([...best.a,...best.b]);
    let bank=list.filter(x=>!used.has(x));

    bank.forEach(p=>stats[p].bank++);

    schedule.push({
      round:r+1,
      a:best.a,
      b:best.b,
      bank
    });
  }

  update();
}

/* ================= UPDATE ================= */

function update(){

  if(schedule.length==0) return;

  let s=schedule[index];

  document.getElementById("court").innerHTML=
  `A: ${s.a.join(" / ")}<br>
   B: ${s.b.join(" / ")}<br>
   BANK: ${s.bank.join(" / ")}`;

  document.getElementById("kioskA").textContent="A: "+s.a.join(" / ");
  document.getElementById("kioskB").textContent="B: "+s.b.join(" / ");
  document.getElementById("kioskBank").textContent="BANK: "+s.bank.join(" / ");

  renderFairness();
}

/* ================= FAIRNESS UI ================= */

function renderFairness(){

  let html="";

  players.forEach(p=>{
    let s=stats[p.name];

    let rating=
      s.games<=2?"⭐⭐⭐⭐⭐":
      s.games<=4?"⭐⭐⭐⭐":
      s.games<=6?"⭐⭐⭐":"⭐⭐";

    html+=`${p.name} ${rating} (G:${s.games} B:${s.bank})<br>`;
  });

  document.getElementById("fairness").innerHTML=html;
}

/* ================= PLAYERS UI ================= */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>`;
  });
}

/* ================= KIOSK ================= */

function enterKiosk(){
  document.body.classList.add("kiosk");
}

/* ================= INIT ================= */

renderPlayers();
initStats();

</script>

</body>
</html>
