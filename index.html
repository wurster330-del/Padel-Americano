<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Manager V11 MASTER 0011 FRE v2</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  border:none;
  padding:12px 14px;
  border-radius:10px;
  color:#fff;
  margin:4px;
  cursor:pointer;
  font-weight:bold;
  background:#1f6f4a;
}

.mode-btn.active{
  box-shadow:0 0 10px #00ff99;
}

.mode-btn.turnier.active{ background:#2e8b57; }
.mode-btn.gruppen.active{ background:#1e90ff; }

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:8px;
  margin:5px 0;
}

#fairnessBox{
  background:#0b2d1d;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  font-size:14px;
  color:#b6ffda;
}

/* KIOSK */
.kioskMode #app{ display:none; }
.kioskMode #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:25px;
}

.kioskTimer{
  font-size:140px;
  color:#00ff99;
}

.kioskBox{
  font-size:22px;
  margin:6px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 V11 MASTER 0011 FRE v2</div>
  <button onclick="enterKiosk()">▶ Kiosk</button>
</div>

<!-- SETTINGS -->
<div class="section">
<h3>⚙️ Setup</h3>

<label>Gesamtzeit:</label>
<select id="total">
  <option value="120">120</option>
  <option value="180" selected>180</option>
</select>

<br><br>

<label>Spielzeit:</label>
<select id="match">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>
</div>

<!-- MODE -->
<div class="section">
<h3>🎛 Modus</h3>

<button id="btnTurnier" class="mode-btn turnier active" onclick="setMode('turnier')">🏆 Turnier</button>
<button id="btnGruppen" class="mode-btn gruppen" onclick="setMode('gruppen')">👥 Gruppen</button>

</div>

<!-- PLAYERS -->
<div class="section">
<h3>👥 Spieler</h3>
<div id="players"></div>
</div>

<!-- PREVIEW -->
<div class="section">
<h3>📊 Spielplan</h3>
<div id="preview"></div>

<div id="fairnessBox">FRE v2: noch keine Bewertung</div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div class="kioskTimer" id="ktimer">00:00</div>

<div class="kioskBox" id="teams"></div>
<div class="kioskBox" id="bank"></div>
<div class="kioskBox" id="nextGame"></div>
<div class="kioskBox" id="roundInfo"></div>

<br>

<button onclick="startGame()">▶ Start</button>
<button onclick="nextGame()">➡ Next</button>
<button onclick="exitKiosk()">⛔ Exit</button>

</div>

<script>

/* =========================
   STATE
========================= */

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;
let stats={};

/* =========================
   UI PLAYERS
========================= */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox"
        ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">

        <input type="text"
        value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>
    `;
  });
}

/* =========================
   MODE
========================= */

function setMode(m){
  mode=m;

  document.getElementById("btnTurnier").classList.remove("active");
  document.getElementById("btnGruppen").classList.remove("active");

  if(m==="turnier"){
    document.getElementById("btnTurnier").classList.add("active");
  } else {
    document.getElementById("btnGruppen").classList.add("active");
  }

  generate();
}

/* =========================
   FRE v2 INIT
========================= */

function initStats(){
  stats={};

  players.filter(p=>p.active).forEach(p=>{
    stats[p.name]={
      bench:0,
      games:0,
      partners:{},
      opponents:{}
    };
  });
}

/* =========================
   SCORE ENGINE
========================= */

function evaluateCandidate(c){

  let score=1000;

  let active=players.filter(p=>p.active).map(p=>p.name);
  let bank=active.filter(p=>!c.a.includes(p)&&!c.b.includes(p));

  bank.forEach(p=>{
    score -= (stats[p]?.bench||0)*80;
  });

  c.a.forEach(p=>{
    c.b.forEach(o=>{
      score -= (stats[p]?.opponents?.[o]||0)*70;
    });
  });

  c.a.forEach(p=>{
    c.a.forEach(o=>{
      if(p!==o){
        score -= (stats[p]?.partners?.[o]||0)*40;
      }
    });
  });

  return score;
}

/* =========================
   UPDATE STATS
========================= */

function applyStats(c){

  let a=c.a;
  let b=c.b;
  let bank=c.bank;

  a.concat(b).forEach(p=>{
    stats[p].games++;
  });

  bank.forEach(p=>{
    stats[p].bench++;
  });

  a.forEach(p=>{
    b.forEach(o=>{
      stats[p].opponents[o]=(stats[p].opponents[o]||0)+1;
      stats[o].opponents[p]=(stats[o].opponents[p]||0)+1;
    });
  });

  a.forEach(p=>{
    a.forEach(o=>{
      if(p!==o){
        stats[p].partners[o]=(stats[p].partners[o]||0)+1;
      }
    });
  });

  b.forEach(p=>{
    b.forEach(o=>{
      if(p!==o){
        stats[p].partners[o]=(stats[p].partners[o]||0)+1;
      }
    });
  });
}

/* =========================
   GENERATE (FRE v2)
========================= */

function buildTurnier(){

  let list=players.filter(p=>p.active).map(p=>p.name);

  schedule=[];
  initStats();

  let rounds=calcRounds();

  for(let r=0;r<rounds;r++){

    let best=null;
    let bestScore=-99999;

    for(let i=0;i<50;i++){

      let pool=[...list].sort(()=>Math.random()-0.5);

      let c={
        a:[pool[0],pool[1]],
        b:[pool[2],pool[3]],
        bank:pool.slice(4)
      };

      let s=evaluateCandidate(c);

      if(s>bestScore){
        bestScore=s;
        best=c;
      }
    }

    applyStats(best);

    schedule.push({
      a:best.a,
      b:best.b,
      bank:best.bank,
      round:r+1
    });
  }

  renderFairness(bestScore);
}

function buildGruppen(){

  let list=players.filter(p=>p.active).map(p=>p.name);

  schedule=[];
  initStats();

  let rounds=calcRounds();

  for(let r=0;r<rounds;r++){

    let pool=[...list].sort(()=>Math.random()-0.5);

    let g1=[pool[0],pool[1]];
    let g2=[pool[2],pool[3]];
    let g3=[pool[4],pool[5]];

    let pattern=[
      [g1,g2],
      [g1,g3],
      [g2,g3]
    ];

    let p=pattern[r%3];

    let bank=[g1,g2,g3].flat().filter(x=>!p[0].includes(x)&&!p[1].includes(x));

    schedule.push({
      a:p[0],
      b:p[1],
      bank,
      round:r+1
    });
  }
}

/* =========================
   FAIRNESS DISPLAY
========================= */

function renderFairness(score){

  let percent=Math.max(65,Math.min(100,Math.round(80+score/60)));

  let color=percent>90?"🟢":percent>80?"🟡":"🔴";

  document.getElementById("fairnessBox").innerHTML=
    `${color} FRE v2 Fairness Index: ${percent}%`;
}

/* =========================
   CORE
========================= */

function calcRounds(){
  let total=parseInt(document.getElementById("total").value);
  let match=parseInt(document.getElementById("match").value);
  return Math.floor(total/match);
}

function generate(){
  if(mode==="turnier") buildTurnier();
  if(mode==="gruppen") buildGruppen();
  index=0;
  renderPreview();
  update();
}

/* =========================
   PREVIEW
========================= */

function renderPreview(){

  let html="<b>Spielplan</b><br><br>";

  schedule.forEach((s,i)=>{
    html+=`R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}<br>`;
  });

  document.getElementById("preview").innerHTML=html;
}

/* =========================
   KIOSK
========================= */

function enterKiosk(){
  document.body.classList.add("kioskMode");
}

function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =========================
   GAME FLOW
========================= */

function startGame(){
  index=0;
  update();
}

function nextGame(){
  index++;
  if(index>=schedule.length) index=0;
  update();
}

function update(){

  let s=schedule[index];
  if(!s) return;

  document.getElementById("teams").innerHTML=
    `A: ${s.a.join(" / ")}<br>B: ${s.b.join(" / ")}`;

  document.getElementById("bank").innerHTML=
    `Bank: ${s.bank.join(", ")}`;

  document.getElementById("roundInfo").innerHTML=
    `Runde ${index+1}/${schedule.length}`;

  document.getElementById("nextGame").innerHTML=
    schedule[index+1]
    ? `Nächstes: ${schedule[index+1].a.join(" / ")} vs ${schedule[index+1].b.join(" / ")}`
    : "Ende";
}

/* INIT */
renderPlayers();
generate();

</script>

</body>
</html>
