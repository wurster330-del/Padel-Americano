<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Padel Club Terminal V10.6</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.topbar button{
  background:#2e8b57;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  color:white;
}

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.timer{
  font-size:80px;
  text-align:center;
  font-weight:900;
}

/* PLAYERS */
.playerRow{
  display:flex;
  gap:8px;
  margin:4px 0;
  align-items:center;
}

.playerRow input[type="text"]{
  width:140px;
}

/* KIOSK */
.kiosk #app{ display:none; }
.kiosk #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:40px;
  position:relative;
}

.kioskTimer{
  font-size:180px;
  color:#00ff99;
  font-weight:900;
}

.kioskTeam{
  font-size:42px;
  margin:6px;
}

/* EXIT */
.kioskExit{
  position:absolute;
  top:10px;
  right:10px;
}

.kioskExit button{
  background:#2e8b57;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  color:white;
}

/* CONTROL */
.controlBar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0d3a25;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.controlBar button{
  flex:1;
  margin:0 5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
}

/* PIN */
#pinOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:9999;
  text-align:center;
  padding-top:120px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 V10.6</div>
  <div>
    <button onclick="enterKiosk()">Kiosk</button>
    <button onclick="generate()">Turnier</button>
  </div>
</div>

<div class="section">
  <h3>⏱ Timer</h3>
  <div class="timer" id="timer">18:00</div>
</div>

<div class="section">
  <h3>👥 Spieler</h3>
  <div id="players"></div>
</div>

<div class="section">
  <h3>🎾 Court</h3>
  <div id="court">Kein Turnier</div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div class="kioskExit">
  <button onclick="openPin()">🔒 Exit</button>
</div>

<div class="kioskTimer" id="kioskTimer">18:00</div>
<div class="kioskTeam" id="kioskA"></div>
<div class="kioskTeam" id="kioskB"></div>
<div class="kioskTeam" id="kioskBank"></div>

</div>

<!-- CONTROL -->
<div class="controlBar">
  <button onclick="startTimer()">▶ Start</button>
  <button onclick="pauseTimer()">⏸ Pause</button>
  <button onclick="nextMatch()">➡ Next</button>
</div>

<!-- PIN -->
<div id="pinOverlay">
  <h2>PIN</h2>
  <input id="pin" type="password">
  <br><br>
  <button onclick="checkPin()">OK</button>
</div>

<script>

/* ================= PLAYERS ================= */

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;

let matchTime=18*60;
let run=null;

/* ================= STATS ================= */

let stats={};

function initStats(){
  stats={};
  players.forEach(p=>{
    stats[p.name]={games:0,banks:0};
  });
}

/* ================= SCORE ================= */

function scorePlayer(name){
  let s=stats[name];
  return -(s.games*3 + s.banks*5);
}

/* ================= BEST MATCH ================= */

function bestMatch(list){

  let best=null;
  let bestScore=-99999;

  for(let i=0;i<list.length;i++){
    for(let j=i+1;j<list.length;j++){
      for(let x=0;x<list.length;x++){
        for(let y=x+1;y<list.length;y++){

          if(x==i||x==j||y==i||y==j) continue;

          let a=[list[i],list[j]];
          let b=[list[x],list[y]];

          let sc=
            scorePlayer(a[0])+scorePlayer(a[1])+
            scorePlayer(b[0])+scorePlayer(b[1]);

          if(sc>bestScore){
            bestScore=sc;
            best={a,b};
          }
        }
      }
    }
  }

  return best;
}

/* ================= GENERATE ================= */

function generate(){

  initStats();

  let list=players.filter(p=>p.active).map(p=>p.name);

  schedule=[];
  index=0;

  for(let r=0;r<6;r++){

    let best=bestMatch(list);

    let used=new Set([...best.a,...best.b]);
    let bank=list.filter(x=>!used.has(x));

    best.a.forEach(p=>stats[p].games++);
    best.b.forEach(p=>stats[p].games++);
    bank.forEach(p=>stats[p].banks++);

    schedule.push({
      round:r+1,
      a:best.a,
      b:best.b,
      bank
    });
  }

  update();
}

/* ================= TIMER ================= */

function startTimer(){
  if(run) return;

  run=setInterval(()=>{

    if(matchTime>0) matchTime--;

    if(matchTime<=0){
      matchTime=0;
      clearInterval(run);
      run=null;
    }

    update();

  },1000);
}

function pauseTimer(){
  clearInterval(run);
  run=null;
}

/* ================= NEXT ================= */

function nextMatch(){
  index++;
  if(index>=schedule.length) index=0;
  matchTime=18*60;
  update();
}

/* ================= UPDATE ================= */

function update(){

  let t=Math.floor(matchTime/60)+":"+String(matchTime%60).padStart(2,"0");

  document.getElementById("timer").textContent=t;
  document.getElementById("kioskTimer").textContent=t;

  if(schedule.length==0) return;

  let s=schedule[index];

  document.getElementById("court").innerHTML=
  `A: ${s.a.join(" / ")}<br>
   B: ${s.b.join(" / ")}<br>
   BANK: ${s.bank.join(" / ")||"-"}<br>
   Runde ${s.round}`;

  document.getElementById("kioskA").textContent="A: "+s.a.join(" / ");
  document.getElementById("kioskB").textContent="B: "+s.b.join(" / ");
  document.getElementById("kioskBank").textContent="BANK: "+(s.bank.join(" / ")||"-");
}

/* ================= KIOSK ================= */

function enterKiosk(){
  document.body.classList.add("kiosk");
  document.documentElement.requestFullscreen?.();
}

/* ================= PIN ================= */

function openPin(){
  document.getElementById("pinOverlay").style.display="block";
}

function checkPin(){
  if(document.getElementById("pin").value==="1234"){
    document.body.classList.remove("kiosk");
  }
  document.getElementById("pin").value="";
  document.getElementById("pinOverlay").style.display="none";
}

</script>

</body>
</html>
