<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Padel Club Terminal V9 FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#04130d;
  color:white;
}

#wrap{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

.panel{
  background:#1a5335;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  margin:5px;
  font-size:16px;
}

.timer{
  font-size:80px;
  text-align:center;
  font-weight:900;
}

.warning{
  color:red;
  text-align:center;
  display:none;
  font-weight:bold;
}

.teamBox{
  font-size:22px;
  font-weight:900;
  text-align:center;
  margin:6px;
}

/* ================= KIOSK ================= */

.kiosk #wrap{ display:none; }
.kiosk #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:40px;
}

.kioskTimer{
  font-size:180px;
  font-weight:900;
  color:#00ff99;
}

.kioskTeam{
  font-size:50px;
  font-weight:900;
  margin:15px;
}

.kioskSmall{
  opacity:0.7;
  font-size:24px;
}

/* ================= CONTROL ================= */

.controlBar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#0d3a25;
  display:flex;
  justify-content:center;
  padding:10px;
  gap:10px;
}
</style>
</head>

<body>

<div id="wrap">

<h2>🎾 V9 FINAL – Phase 8 Stable</h2>

<div class="panel">
<button onclick="enterKiosk()">🔲 Kiosk</button>
<button onclick="generate()">🏆 Turnier erstellen</button>
</div>

<div class="panel">
<h3>⏱ Timer</h3>
<div class="timer" id="timer">18:00</div>
<div class="warning" id="warning">⚠ 30 SEKUNDEN</div>
</div>

<div class="panel">
<h3>🎾 Court</h3>
<div id="court">Kein Turnier</div>
</div>

</div>

<!-- ================= KIOSK ================= -->
<div id="kiosk">

<div class="kioskTimer" id="kioskTimer">18:00</div>
<div class="kioskTeam" id="kioskA"></div>
<div class="kioskTeam" id="kioskB"></div>
<div class="kioskSmall" id="kioskInfo"></div>

</div>

<!-- ================= CONTROL ================= -->
<div class="controlBar">
<button onclick="startTimer()">▶ Start</button>
<button onclick="pauseTimer()">⏸ Pause</button>
<button onclick="nextMatch()">➡ Next</button>
</div>

<script>

/* ================= PLAYERS ================= */

let players = [
  {name:"Marco", active:true},
  {name:"Stefan", active:true},
  {name:"David", active:true},
  {name:"Tobias", active:true},
  {name:"Christian", active:true},
  {name:"Werner", active:true}
];

let schedule = [];
let index = 0;

/* ================= TIMER ================= */

let matchMinutes = 18;
let breakMinutes = 2;

let matchTime = matchMinutes * 60;
let run = null;

/* ================= CORE EVENT LOGIC ================= */

function generate(){

  let list = players.filter(p => p.active).map(p => p.name);

  if(list.length < 4){
    alert("Mindestens 4 Spieler nötig");
    return;
  }

  schedule = [];
  index = 0;

  // 🎯 EVENTZEIT LOGIK
  let eventMinutes = (list.length === 4) ? 120 : 180;

  // ⏱ realistische Rundendauer
  let roundMinutes = matchMinutes + breakMinutes;

  let rounds = Math.floor(eventMinutes / roundMinutes);

  if(rounds < 3) rounds = 3;

  for(let r = 0; r < rounds; r++){

    list = list.sort(() => Math.random() - 0.5);

    let a = [list[0], list[1]];
    let b = [list[2], list[3]];

    let bank = list.slice(4);

    schedule.push({
      round: r + 1,
      a,
      b,
      bank
    });
  }

  update();
}

/* ================= TIMER ================= */

function startTimer(){
  if(run) return;

  run = setInterval(()=>{

    if(matchTime > 0) matchTime--;

    if(matchTime === 30){
      document.getElementById("warning").style.display="block";
    }

    if(matchTime <= 0){
      matchTime = 0;
      nextMatch();
      return;
    }

    update();

  },1000);
}

function pauseTimer(){
  clearInterval(run);
  run = null;
}

function nextMatch(){

  index++;
  if(index >= schedule.length) index = 0;

  matchTime = matchMinutes * 60;
  document.getElementById("warning").style.display="none";

  update();
}

/* ================= UPDATE ================= */

function update(){

  let t = Math.floor(matchTime/60)+":"+String(matchTime%60).padStart(2,"0");

  document.getElementById("timer").textContent = t;
  document.getElementById("kioskTimer").textContent = t;

  if(schedule.length === 0){
    document.getElementById("court").innerHTML = "Kein Turnier";
    return;
  }

  let s = schedule[index];

  document.getElementById("court").innerHTML = `
    <div class="teamBox">TEAM A: ${s.a.join(" / ")}</div>
    <div class="teamBox">TEAM B: ${s.b.join(" / ")}</div>
    <div class="teamBox">BANK: ${s.bank.join(" / ") || "-"}</div>
    <div class="teamBox">RUNDE ${s.round} / ${schedule.length}</div>
  `;

  document.getElementById("kioskA").textContent = "TEAM A: " + s.a.join(" / ");
  document.getElementById("kioskB").textContent = "TEAM B: " + s.b.join(" / ");
  document.getElementById("kioskInfo").textContent =
    "Runde " + s.round + " / " + schedule.length;
}

/* ================= KIOSK ================= */

function enterKiosk(){
  document.body.classList.add("kiosk");
  document.documentElement.requestFullscreen?.();
  update();
}

</script>

</body>
</html>
