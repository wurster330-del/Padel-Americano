<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Fix Court</title>

<style>
body{
  margin:0;
  background:#0b2f1d;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* START */
#start{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

button{
  padding:16px 22px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#2e8b57;
  color:white;
}

/* COURT */
#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:15px;
}

#matchTime{
  font-size:20vh;
  font-weight:bold;
}

#teams{
  font-size:5vh;
  font-weight:bold;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:18px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="start">
  <h1>🎾 Padel Court</h1>
  <button onclick="start()">▶ Start Game</button>
</div>

<!-- COURT -->
<div id="court">

<div class="top">
  <div id="eventTime">120:00</div>
  <div>COURT 1</div>
</div>

<div id="matchTime">18:00</div>

<div id="teams"></div>

<div>
<button onclick="next()">NEXT</button>
<button onclick="exit()">EXIT</button>
</div>

</div>

<script>

const players = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let rotation = 0;

let event = 120*60;
let match = 18*60;

/* START */
function start(){

  document.getElementById("start").style.display="none";
  document.getElementById("court").style.display="flex";

  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }

  render();

  setInterval(()=>{
    if(match>0) match--;
    else next();

    if(event>0) event--;

    render();
  },1000);
}

/* TEAMS */
function getTeams(){
  let a=[], b=[], c=[];

  for(let i=0;i<players.length;i++){
    let idx=(i+rotation)%players.length;

    if(i<2)a.push(players[idx]);
    else if(i<4)b.push(players[idx]);
    else c.push(players[idx]);
  }

  return {a,b,c};
}

/* NEXT */
function next(){
  rotation = (rotation + 2) % players.length;
  match = 18*60;
}

/* EXIT */
function exit(){
  document.getElementById("court").style.display="none";
  document.getElementById("start").style.display="flex";

  if(document.exitFullscreen){
    document.exitFullscreen();
  }
}

/* RENDER */
function render(){

  let em=Math.floor(event/60);
  let es=event%60;

  let mm=Math.floor(match/60);
  let ms=match%60;

  document.getElementById("eventTime").textContent=
    em+":"+String(es).padStart(2,"0");

  document.getElementById("matchTime").textContent=
    mm+":"+String(ms).padStart(2,"0");

  const t=getTeams();

  document.getElementById("teams").innerHTML=
    "A: "+t.a.join(" | ")+"<br>"+
    "B: "+t.b.join(" | ")+"<br>"+
    "BANK: "+t.c.join(" | ");
}

</script>

</body>
</html>
