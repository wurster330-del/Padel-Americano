<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Padel Americano Build 6.7.0</title>
<style>
body{font-family:Arial;margin:12px}
textarea,button{font-size:18px}
.card{border:1px solid #ccc;padding:10px;margin:10px 0;border-radius:8px}
</style>
</head>
<body>
<h1>🎾 Padel Americano Build 6.7.0</h1>

<div class="card">
<h3>Spieler (4–12)</h3>
<textarea id="players" rows="10" style="width:100%;">Werner
Tobias
Marco
Stefan
Christian
David</textarea><br>
<button onclick="generateTournament()">🎲 Turnier erzeugen</button>
</div>

<div class="card">
<h3>📋 Spielplan</h3>
<div id="schedule"></div>
</div>

<div class="card">
<h3>📊 Fairness</h3>
<div id="fairness">Noch nicht berechnet</div>
</div>

<script>
function getPlayers(){
 return document.getElementById('players').value.split('\n').map(x=>x.trim()).filter(Boolean);
}

function generateTournament(){
 const p=getPlayers();
 if(p.length<4 || p.length>12){
   alert('4 bis 12 Spieler erforderlich');
   return;
 }

 let rounds=[];
 let partnerPairs=new Set();

 for(let r=0;r<Math.max(6,p.length);r++){
   let a=p[r%p.length];
   let b=p[(r+1)%p.length];
   let c=p[(r+2)%p.length];
   let d=p[(r+3)%p.length];

   partnerPairs.add([a,b].sort().join('-'));
   partnerPairs.add([c,d].sort().join('-'));

   rounds.push(`Runde ${r+1}: ${a} / ${b} vs ${c} / ${d}`);
 }

 document.getElementById('schedule').innerHTML =
   rounds.map(x=>'<div>'+x+'</div>').join('');

 const fairness=Math.min(100,50+partnerPairs.size*4);

 document.getElementById('fairness').innerHTML =
   '<b>Fairness-Score:</b> '+fairness+'/100<br>'+
   'Unterschiedliche Partnerschaften: '+partnerPairs.size+'<br>'+
   'Americano-Rotation aktiv';
}
</script>
</body>
</html>
