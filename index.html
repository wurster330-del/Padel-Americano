<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel ULTRA PRO V13</title>

<meta name="theme-color" content="#071a12">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071a12;
  color:white;
}

#app{padding:12px;}

.topbar{
  background:#0f3a28;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:14px 18px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:10px;
  margin:6px 0;
  align-items:center;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timer{
  font-size:180px;
  color:#00ff99;
  font-weight:900;
}

.big{font-size:48px;margin:20px;}
.bank{font-size:42px;color:#ffd54a;}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🎾 ULTRA PRO V13</div>
<button id="kioskBtn">Kiosk</button>
</div>

<!-- PLAYERS -->
<div class="section">
<h3>Spieler auswählen</h3>
<div id="playerList"></div>
</div>

<!-- SETUP -->
<div class="section">
<h3>Setup</h3>

<label>Gesamtzeit</label>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<br><br>

<label>Matchzeit</label>
<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<!-- MODE -->
<div class="section">
<h3>Modus</h3>
<button id="btnTurnier">🏆 Turnier</button>
<button id="btnGruppe">👥 Gruppe</button>
</div>

<div class="section">
<button id="btnGenerate">Spielplan erstellen</button>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timer">00:00</div>

<div id="mode" class="big"></div>
<div id="round" class="big"></div>
<div id="teams" class="big"></div>
<div id="bank" class="big"></div>

<button id="btnStart">Start</button>
<button id="btnNext">Next</button>
<button id="btnExit">Exit</button>

</div>

<script>

/* =====================
   STATE ENGINE
===================== */

let mode="turnier";
let players=["Marco","Stefan","David","Tobias","Chris","Werner"];
let selected={};
let schedule=[];
let index=0;

let timer=null;
let timeLeft=0;
let finished=false;

/* =====================
   INIT PLAYERS
===================== */

function initPlayers(){
  const box=document.getElementById("playerList");
  box.innerHTML="";

  players.forEach(p=>{
    selected[p]=true;

    const row=document.createElement("div");
    row.className="playerRow";

    const cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=true;

    cb.addEventListener("change",()=>{
      selected[p]=cb.checked;
    });

    const label=document.createElement("span");
    label.innerText=p;

    row.appendChild(cb);
    row.appendChild(label);
    box.appendChild(row);
  });
}

/* =====================
   ACTIVE PLAYERS
===================== */

function activePlayers(){
  return players.filter(p=>selected[p]);
}

/* =====================
   FAIR ENGINE (ULTRA PRO)
===================== */

function pickBalanced(pool, lastBank){

  // verhindert direkt gleiche Bank
  let filtered = pool.filter(p=>!lastBank.includes(p));

  if(filtered.length < 1) filtered = pool;

  return filtered.sort(()=>Math.random()-0.5);
}

/* =====================
   GENERATE ENGINE
===================== */

function generate(){

  const p = activePlayers();

  if(p.length < 4){
    alert("Mindestens 4 Spieler!");
    return;
  }

  schedule=[];
  index=0;

  const total = +document.getElementById("totalTime").value;
  const match = +document.getElementById("matchTime").value;

  const rounds = Math.floor(total / match);

  let lastBank=[];

  for(let r=0;r<rounds;r++){

    let pool = pickBalanced([...p], lastBank);

    let a=[],b=[],bank=[];

    if(mode==="turnier"){

      if(p.length===6){
        bank=[pool[0],pool[1]];
        let rest=pool.slice(2);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }

      else if(p.length===5){
        bank=[pool[0]];
        let rest=pool.slice(1);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }

      else{
        a=[pool[0],pool[1]];
        b=[pool[2],pool[3]];
      }
    }

    if(mode==="gruppe"){

      if(p.length===6){

        let A=[p[0],p[1]];
        let B=[p[2],p[3]];
        let C=[p[4],p[5]];

        let rot=r%3;

        if(rot===0){a=A;b=B;bank=C;}
        if(rot===1){a=B;b=C;bank=A;}
        if(rot===2){a=C;b=A;bank=B;}
      }
      else{
        a=[p[0],p[1]];
        b=[p[2],p[3]];
      }
    }

    lastBank = bank;

    schedule.push({a,b,bank});
  }

  render();
  update();
}

/* =====================
   RENDER
===================== */

function render(){

  const box=document.getElementById("preview");
  box.innerHTML="";

  schedule.forEach((s,i)=>{
    const div=document.createElement("div");
    div.innerText =
      `R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")} | Bank: ${s.bank.join(", ")}`;
    box.appendChild(div);
  });
}

/* =====================
   KIOSK
===================== */

function enterKiosk(){
  document.body.classList.add("kioskMode");
}

function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =====================
   TIMER
===================== */

function startTimer(){

  timeLeft = +document.getElementById("matchTime").value * 60;

  clearInterval(timer);

  timer=setInterval(()=>{

    timeLeft--;

    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;

    document.getElementById("timer").innerText=`${m}:${s}`;

    if(timeLeft<=0){
      clearInterval(timer);
      finished=true;
    }

  },1000);
}

/* =====================
   NEXT
===================== */

function nextMatch(){
  if(!finished) return;

  index = (index+1) % schedule.length;
  finished=false;

  update();
}

/* =====================
   UPDATE
===================== */

function update(){

  const s=schedule[index];
  if(!s) return;

  document.getElementById("mode").innerText =
    mode==="turnier"?"🏆 Turnier":"👥 Gruppe";

  document.getElementById("round").innerText =
    "Runde "+(index+1);

  document.getElementById("teams").innerText =
    s.a.join(" / ")+" vs "+s.b.join(" / ");

  document.getElementById("bank").innerText =
    "Bank: "+(s.bank.join(", ")||"keine");
}

/* =====================
   EVENTS
===================== */

document.getElementById("btnGenerate").addEventListener("click",generate);
document.getElementById("btnTurnier").addEventListener("click",()=>mode="turnier");
document.getElementById("btnGruppe").addEventListener("click",()=>mode="gruppe");
document.getElementById("btnStart").addEventListener("click",startTimer);
document.getElementById("btnNext").addEventListener("click",nextMatch);
document.getElementById("btnExit").addEventListener("click",exitKiosk);
document.getElementById("kioskBtn").addEventListener("click",enterKiosk);

/* INIT */
initPlayers();

</script>

</body>
</html>
