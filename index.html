<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Padel Manager V5.0 Beta</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f14;
    color: #fff;
}

/* HEADER (nur Setup sichtbar) */
header {
    padding: 14px;
    text-align: center;
    background: #1c1c25;
    font-size: 18px;
    font-weight: bold;
}

/* SCREENS */
.screen {
    display: none;
    padding: 20px;
}
.active {
    display: block;
}

/* SETUP */
.player {
    font-size: 22px;
    margin: 10px 0;
}

button {
    padding: 18px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
}

.primary { background: #2d7dff; color: white; }
.gray { background: #333; color: white; }

.setupBtn {
    width: 100%;
    margin-top: 12px;
}

/* FULLSCREEN GAME MODE */
#game {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #0f0f14;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#game.active {
    display: flex;
}

/* TIMER */
.timer {
    font-size: 200px; /* 🔥 deutlich größer */
    font-weight: bold;
    text-align: center;
}

/* MATCH DISPLAY */
.matchBox {
    text-align: center;
    margin-top: 20px;
}

.team {
    font-size: 48px;
    font-weight: bold;
}

.vs {
    font-size: 30px;
    margin: 10px 0;
    color: #aaa;
}

/* STATUS TEXT */
.status {
    font-size: 24px;
    color: #aaa;
    margin-top: 20px;
}
</style>
</head>

<body>

<header id="header">🎾 Padel Manager V5.0 Beta – Build 0004</header>

<!-- SETUP -->
<div id="setup" class="screen active">
    <h2>Spielerauswahl</h2>

    <label class="player"><input type="checkbox" value="Werner" checked> Werner</label>
    <label class="player"><input type="checkbox" value="Marco" checked> Marco</label>
    <label class="player"><input type="checkbox" value="David" checked> David</label>
    <label class="player"><input type="checkbox" value="Stefan" checked> Stefan</label>

    <button class="primary setupBtn" onclick="startGame()">Spiel starten</button>
</div>

<!-- GAME -->
<div id="game">

    <div class="status" id="status">Bereit...</div>

    <div class="timer" id="timer">00:00</div>

    <div class="matchBox" id="matchInfo"></div>

</div>

<script>

let players = [];
let matches = [];
let index = 0;

let totalTime = 20 * 60;
let remaining = totalTime;
let interval;
let running = false;

let prepCountdown = 10;
let prepInterval;

// MATCH GENERATION
function generate(p) {
    return [
        [p[0], p[1], p[2], p[3]],
        [p[0], p[2], p[1], p[3]],
        [p[0], p[3], p[1], p[2]]
    ];
}

function startGame() {
    players = Array.from(document.querySelectorAll("input[type=checkbox]:checked"))
        .map(x => x.value);

    if (players.length !== 4) {
        alert("Bitte genau 4 Spieler auswählen!");
        return;
    }

    matches = generate(players);
    index = 0;

    document.getElementById("setup").classList.remove("active");
    document.getElementById("game").classList.add("active");

    loadMatch();
    startPrepPhase();
}

function loadMatch() {
    let m = matches[index];

    document.getElementById("matchInfo").innerHTML = `
        <div class="team">${m[0]} + ${m[1]}</div>
        <div class="vs">vs</div>
        <div class="team">${m[2]} + ${m[3]}</div>
    `;
}

function startPrepPhase() {
    let status = document.getElementById("status");
    let timer = document.getElementById("timer");

    prepCountdown = 10;
    timer.innerText = "00:10";
    status.innerText = "Bereit...";

    prepInterval = setInterval(() => {
        prepCountdown--;
        timer.innerText = "00:" + prepCountdown.toString().padStart(2,'0');

        if (prepCountdown <= 0) {
            clearInterval(prepInterval);
            startMatch();
        }
    }, 1000);
}

function startMatch() {
    document.getElementById("status").innerText = "Spiel läuft";

    remaining = totalTime;
    updateTimer();

    running = true;

    interval = setInterval(() => {
        if (remaining > 0) {
            remaining--;
            updateTimer();
        } else {
            stopTimer();
            document.getElementById("status").innerText = "Match beendet";
            alert("Match beendet!");
        }
    }, 1000);
}

function updateTimer() {
    let m = Math.floor(remaining / 60);
    let s = remaining % 60;

    document.getElementById("timer").innerText =
        `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function stopTimer() {
    clearInterval(interval);
    running = false;
}

</script>

</body>
</html>
