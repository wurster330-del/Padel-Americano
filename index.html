<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel-Götter V2.1 Engine</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{padding:12px;}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
}

.player{
  display:flex;
  gap:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div id="app">

<h2>🏆 Padel-Götter V2.1 ENGINE</h2>

<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="setMode('turnier')">Turnier</button>
<button onclick="setMode('gruppe')">Gruppe</button>
</div>

<div class="section">
<h3>Spielplan</h3>
<button onclick="generate()">Spielplan erstellen</button>
<button onclick="remix()">Neu mischen</button>

<div id="output"></div>
</div>

</div>

<script>

/* =====================
   STATE
===================== */

let mode = "turnier";

let players = ["Marco","Stefan","David","Tobias","Chris","Werner"];
let active = {};
let schedule = [];

/* =====================
   INIT
===================== */

function init(){
  let box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p=>{
    active[p] = true;

    let row = document.createElement("div");
    row.className="player";

    let cb = document.createElement("input");
    cb.type="checkbox";
    cb.checked=true;
    cb.onchange=()=>active[p]=cb.checked;

    row.appendChild(cb);
    row.appendChild(document.createTextNode(p));

    box.appendChild(row);
  });
}

/* =====================
   HELPERS
===================== */

function getPlayers(){
  return players.filter(p=>active[p]);
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

/* =====================
   GROUP ENGINE (FIXED FAIR ROTATION)
===================== */

function groupRound(p,r){

  const n = p.length;

  if(n === 4){
    return {a:[p[0],p[1]], b:[p[2],p[3]], bank:[]};
  }

  if(n === 5){
    const order = [...p];
    return (r%2===0)
      ? {a:[order[0],order[1]], b:[order[2],order[3]], bank:[order[4]]}
      : {a:[order[1],order[2]], b:[order[3],order[4]], bank:[order[0]]};
  }

  if(n === 6){

    const A = [p[0],p[1]];
    const B = [p[2],p[3]];
    const C = [p[4],p[5]];

    switch(r % 3){
      case 0: return {a:A, b:B, bank:C};
      case 1: return {a:B, b:C, bank:A};
      case 2: return {a:C, b:A, bank:B};
    }
  }

  return {a:[],b:[],bank:[]};
}

/* =====================
   TURNIER ENGINE (BANK FIXED)
===================== */

function turnierRound(p){

  const pool = shuffle(p);

  let a = [pool[0], pool[1]];
  let b = [pool[2], pool[3]];

  let bank = [];

  if(pool.length === 6){
    bank = [pool[4], pool[5]];
  }

  if(pool.length === 5){
    bank = [pool[4]];
  }

  return {a,b,bank};
}

/* =====================
   GENERATE
===================== */

function generate(){

  let p = getPlayers();

  if(p.length < 4){
    alert("Mindestens 4 Spieler");
    return;
  }

  schedule = [];

  let rounds = 6;

  for(let r=0;r<rounds;r++){

    let round;

    if(mode === "turnier"){
      round = turnierRound(p);
    } else {
      let shuffled = shuffle(p);
      round = groupRound(shuffled,r);
    }

    schedule.push(round);
  }

  render();
}

/* =====================
   REMIX
===================== */

function remix(){
  schedule = [];
  generate();
}

/* =====================
   OUTPUT
===================== */

function render(){

  let box = document.getElementById("output");
  box.innerHTML = "";

  schedule.forEach((s,i)=>{

    let div = document.createElement("div");

    div.innerHTML =
      `<b>R${i+1}</b>: ${s.a.join(" & ")} vs ${s.b.join(" & ")}
       <br>Bank: ${s.bank.join(", ") || "keine"}`;

    box.appendChild(div);
  });
}

/* INIT */
init();

</script>

</body>
</html>
