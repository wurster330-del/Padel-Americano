 <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Manager V11 MASTER 0012 FRE v3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02140e;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#0f3b26;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  border:none;
  padding:12px 14px;
  border-radius:10px;
  color:#fff;
  margin:4px;
  cursor:pointer;
  font-weight:bold;
  background:#1f6f4a;
}

.mode-btn.active{
  box-shadow:0 0 10px #00ff99;
}

.mode-btn.turnier.active{ background:#2e8b57; }
.mode-btn.gruppen.active{ background:#1e90ff; }

.section{
  background:#185c3b;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:8px;
  margin:5px 0;
}

#fairnessBox{
  background:#0b2d1d;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  font-size:14px;
}

#optBtn{
  background:#ffb300;
  color:black;
  font-weight:bold;
}

/* KIOSK */
.kioskMode #app{ display:none; }
.kioskMode #kiosk{ display:block; }

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:25px;
}

.kioskTimer{
  font-size:140px;
  color:#00ff99;
}

.kioskBox{
  font-size:22px;
  margin:6px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 V11 MASTER 0012 FRE v3</div>
  <button onclick="enterKiosk()">▶ Kiosk</button>
</div>

<!-- SETTINGS -->
<div class="section">
<h3>⚙️ Setup</h3>

<label>Gesamtzeit:</label>
<select id="total">
  <option value="120">120</option>
  <option value="180" selected>180</option>
</select>

<br><br>

<label>Spielzeit:</label>
<select id="match">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>
</div>

<!-- MODE -->
<div class="section">
<h3>🎛 Modus</h3>

<button id="btnTurnier" class="mode-btn turnier active" onclick="setMode('turnier')">🏆 Turnier</button>
<button id="btnGruppen" class="mode-btn gruppen" onclick="setMode('gruppen')">👥 Gruppen</button>

</div>

<!-- PLAYERS -->
<div class="section">
<h3>👥 Spieler</h3>
<div id="players"></div>
</div>

<!-- PREVIEW -->
<div class="section">
<h3>📊 Spielplan</h3>

<div id="preview"></div>

<div id="fairnessBox">FRE v3: noch keine Bewertung</div>

<button id="optBtn" onclick="optimize()">⚡ Spielplan optimieren</button>

</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div class="kioskTimer" id="ktimer">00:00</div>

<div class="kioskBox" id="teams"></div>
<div class="kioskBox" id="bank"></div>
<div class="kioskBox" id="nextGame"></div>
<div class="kioskBox" id="roundInfo"></div>

<br>

<button onclick="startGame()">▶ Start</button>
<button onclick="nextGame()">➡ Next</button>
<button onclick="exitKiosk()">⛔ Exit</button>

</div>

<script>

/* =========================
   STATE
========================= */

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Christian",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;

/* =========================
   UI
========================= */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";
  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox"
        ${p.active?"checked":""}
        onchange="players[${i}].active=this.checked">

        <input type="text"
        value="${p.name}"
        onchange="players[${i}].name=this.value">
      </div>`;
  });
}

/* =========================
   MODE
========================= */

function setMode(m){
  mode=m;

  document.getElementById("btnTurnier").classList.remove("active");
  document.getElementById("btnGruppen").classList.remove("active");

  if(m==="turnier"){
    document.getElementById("btnTurnier").classList.add("active");
  } else {
    document.getElementById("btnGruppen").classList.add("active");
  }

  generate();
}

/* =========================
   SIMPLE TEAM BUILDER
========================= */

function buildTeams(list){

  let p=[...list].sort(()=>Math.random()-0.5);

  let a=[p[0],p[1]];
  let b=[p[2],p[3]];
  let bank=p.slice(4);

  return {a,b,bank};
}

/* =========================
   GROUP FIX
========================= */

let groups=null;

function buildGroups(){
  let list=players.filter(p=>p.active).map(p=>p.name);
  list=list.sort(()=>Math.random()-0.5);

  groups=[
    [list[0],list[1]],
    [list[2],list[3]],
    [list[4],list[5]]
  ];
}

function groupMatch(r){

  let p=[
    [groups[0],groups[1]],
    [groups[0],groups[2]],
    [groups[1],groups[2]]
  ];

  let sel=p[r%3];

  let bank=groups.flat().filter(x=>!sel[0].includes(x)&&!sel[1].includes(x));

  return {a:sel[0],b:sel[1],bank};
}

/* =========================
   FRE v3 SCORE
========================= */

function score(schedule){

  let map={};

  schedule.forEach(s=>{
    s.bank.forEach(p=>{
      map[p]=(map[p]||0)+1;
    });
  });

  let values=Object.values(map);

  let avg=values.reduce((a,b)=>a+b,0)/values.length;

  let variance=values.reduce((a,b)=>a+Math.pow(b-avg,2),0);

  return 100 - variance; // simple fairness score
}

/* =========================
   GENERATE
========================= */

function generate(){

  schedule=[];
  index=0;

  let list=players.filter(p=>p.active).map(p=>p.name);
  let rounds=calcRounds();

  if(mode==="gruppen"){
    buildGroups();
    for(let r=0;r<rounds;r++){
      schedule.push(groupMatch(r));
    }
  }

  if(mode==="turnier"){
    for(let r=0;r<rounds;r++){
      schedule.push(buildTeams(list));
    }
  }

  render();
  update();
}

/* =========================
   OPTIMIZER
========================= */

function optimize(){

  let best=null;
  let bestScore=-999;

  for(let i=0;i<20;i++){

    generate();

    let s=score(schedule);

    if(s>bestScore){
      bestScore=s;
      best=JSON.parse(JSON.stringify(schedule));
    }
  }

  schedule=best;

  renderFairness(bestScore);
  render();
  update();
}

/* =========================
   CALC
========================= */

function calcRounds(){
  let total=parseInt(document.getElementById("total").value);
  let match=parseInt(document.getElementById("match").value);
  return Math.floor(total/match);
}

/* =========================
   RENDER
========================= */

function render(){

  let html="<b>Spielplan</b><br><br>";

  schedule.forEach((s,i)=>{
    html+=`R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}<br>`;
  });

  document.getElementById("preview").innerHTML=html;
}

/* =========================
   FAIRNESS DISPLAY
========================= */

function renderFairness(s){

  let c=s>85?"🟢":s>70?"🟡":"🔴";

  document.getElementById("fairnessBox").innerHTML=
    `${c} FRE v3 Fairness Score: ${Math.round(s)}%`;
}

/* =========================
   KIOSK
========================= */

function enterKiosk(){document.body.classList.add("kioskMode");}
function exitKiosk(){document.body.classList.remove("kioskMode");}

function startGame(){index=0;update();}
function nextGame(){index++;if(index>=schedule.length)index=0;update();}

function update(){

  let s=schedule[index];
  if(!s) return;

  document.getElementById("teams").innerHTML=
    `A: ${s.a.join(" / ")}<br>B: ${s.b.join(" / ")}`;

  document.getElementById("bank").innerHTML=
    `Bank: ${s.bank.join(", ")}`;

  document.getElementById("roundInfo").innerHTML=
    `Runde ${index+1}/${schedule.length}`;
}

/* INIT */
renderPlayers();
generate();

</script>

</body>
</html>
