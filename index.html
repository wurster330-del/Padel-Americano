<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel-Götter PRO 1.3</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{padding:12px;}

.topbar{
  background:#0f3a28;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

button{
  padding:14px 18px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:10px;
  align-items:center;
  margin:6px 0;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timer{
  font-size:170px;
  color:#00ff99;
  font-weight:900;
}

.big{font-size:44px;margin:18px;}
.bank{font-size:38px;color:#ffd54a;}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🎾 Padel-Götter PRO 1.3</div>
<button id="kioskBtn">Kiosk</button>
</div>

<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<div class="section">
<h3>Setup</h3>

<label>Gesamtzeit</label>
<select id="totalTime">
<option value="120">120</option>
<option value="180" selected>180</option>
</select>

<br><br>

<label>Matchzeit</label>
<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<div class="section">
<h3>Modus</h3>
<button id="btnTurnier">🏆 Turnier</button>
<button id="btnGruppe">👥 Gruppe</button>
</div>

<div class="section">
<button id="btnGenerate">Spielplan erstellen</button>
<button id="btnRemix">🔄 Neu mischen</button>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timer">00:00</div>

<div id="mode" class="big"></div>
<div id="round" class="big"></div>
<div id="teams" class="big"></div>
<div id="bank" class="big"></div>

<button id="btnStart">Start</button>
<button id="btnNext">Next</button>
<button id="btnEnd">Matchende</button>
<button id="btnExit">Exit</button>

</div>

<script>

/* =====================
   STATE
===================== */

let mode="turnier";

let players=["Marco","Stefan","David","Tobias","Chris","Werner"];
let selected={};

let schedule=[];
let index=0;

let timer=null;
let timeLeft=0;
let finished=false;

/* =====================
   INIT
===================== */

function initPlayers(){

  const box=document.getElementById("players");
  box.innerHTML="";

  players.forEach(p=>{
    selected[p]=true;

    const row=document.createElement("div");
    row.className="playerRow";

    const cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=true;

    cb.onchange=()=>selected[p]=cb.checked;

    row.appendChild(cb);
    row.appendChild(document.createTextNode(p));

    box.appendChild(row);
  });
}

/* =====================
   HELPERS
===================== */

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

/* =====================
   SCORE SYSTEM
===================== */

function score(plan, history){

  let s=0;

  plan.bank.forEach(p=>{
    if(history[p]?.bank>0) s+=10;
  });

  if(plan.a[0]===plan.a[1]) s+=5;
  if(plan.b[0]===plan.b[1]) s+=5;

  return s;
}

/* =====================
   CREATE SINGLE PLAN
===================== */

function createPlan(p,r){

  let pool=shuffle(p);

  let a=[],b=[],bank=[];

  if(mode==="turnier"){

    if(p.length===6){
      bank=[pool[0],pool[1]];
      let rest=pool.slice(2);
      a=[rest[0],rest[1]];
      b=[rest[2],rest[3]];
    }

    else if(p.length===5){
      bank=[pool[0]];
      let rest=pool.slice(1);
      a=[rest[0],rest[1]];
      b=[rest[2],rest[3]];
    }

    else{
      a=[pool[0],pool[1]];
      b=[pool[2],pool[3]];
    }
  }

  if(mode==="gruppe"){

    if(p.length===4){
      a=[p[0],p[1]];
      b=[p[2],p[3]];
    }

    else if(p.length===5){
      const rot=r%2;
      a=rot?[p[2],p[3]]:[p[0],p[1]];
      b=rot?[p[0],p[1]]:[p[2],p[3]];
      bank=[p[4]];
    }

    else if(p.length===6){

      const A=[p[0],p[1]];
      const B=[p[2],p[3]];
      const C=[p[4],p[5]];

      const rot=r%3;

      if(rot===0){a=A;b=B;bank=C;}
      if(rot===1){a=B;b=C;bank=A;}
      if(rot===2){a=C;b=A;bank=B;}
    }
  }

  return {a,b,bank};
}

/* =====================
   SMART GENERATOR (V1.3 CORE)
===================== */

function generate(){

  const p=players.filter(x=>selected[x]);

  if(p.length<4){
    alert("Mindestens 4 Spieler");
    return;
  }

  schedule=[];
  index=0;

  const total=+totalTime.value;
  const match=+matchTime.value;

  const rounds=Math.floor(total/match);

  let history={};
  p.forEach(x=>{
    history[x]={bank:0};
  });

  for(let r=0;r<rounds;r++){

    let best=null;
    let bestScore=999999;

    // 100 Varianten testen
    for(let i=0;i<100;i++){

      let plan=createPlan(p,r);

      let s=score(plan,history);

      if(s<bestScore){
        best=plan;
        bestScore=s;
      }
    }

    best.bank.forEach(x=>{
      history[x].bank++;
    });

    schedule.push(best);
  }

  render();
  update();
}

/* =====================
   REMIX BUTTON
===================== */

function remix(){
  generate();
}

/* =====================
   UI
===================== */

function render(){

  const box=document.getElementById("preview");
  box.innerHTML="";

  schedule.forEach((s,i)=>{
    const div=document.createElement("div");
    div.innerText=
      `R${i+1}: ${s.a.join("/")} vs ${s.b.join("/")} | Bank: ${s.bank.join(", ")||"keine"}`;
    box.appendChild(div);
  });
}

function update(){

  const s=schedule[index];
  if(!s) return;

  document.getElementById("mode").innerText=
    mode==="turnier"?"🏆 Turnier":"👥 Gruppe";

  document.getElementById("round").innerText="Runde "+(index+1);
  document.getElementById("teams").innerText=
    s.a.join(" / ")+" vs "+s.b.join(" / ");
  document.getElementById("bank").innerText=
    "Bank: "+(s.bank.join(", ")||"keine");
}

/* =====================
   TIMER
===================== */

function startTimer(){

  timeLeft=+matchTime.value*60;
  clearInterval(timer);

  timer=setInterval(()=>{

    timeLeft--;

    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;

    document.getElementById("timer").innerText=`${m}:${s}`;

    if(timeLeft<=0){
      clearInterval(timer);
      finished=true;
    }

  },1000);
}

/* =====================
   NEXT
===================== */

function next(){
  if(!finished)return;
  index=(index+1)%schedule.length;
  finished=false;
  update();
}

/* =====================
   MATCH END
===================== */

function endMatch(){
  clearInterval(timer);
  finished=true;
  timeLeft=0;
  document.getElementById("timer").innerText="00:00";
}

/* =====================
   MODE
===================== */

btnTurnier.onclick=()=>mode="turnier";
btnGruppe.onclick=()=>mode="gruppe";

/* =====================
   KIOSK
===================== */

kioskBtn.onclick=()=>document.body.classList.add("kioskMode");
btnExit.onclick=()=>document.body.classList.remove("kioskMode");

/* =====================
   EVENTS
===================== */

btnGenerate.onclick=generate;
btnRemix.onclick=remix;
btnStart.onclick=startTimer;
btnNext.onclick=next;
btnEnd.onclick=endMatch;

/* INIT */
initPlayers();

</script>

</body>
</html>
