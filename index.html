<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Padel-Götter PRO 1.1</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#061b12;
  color:white;
}

#app{padding:12px;}

.topbar{
  background:#0f3a28;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

button{
  padding:14px 18px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.section{
  background:#124d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

.playerRow{
  display:flex;
  gap:10px;
  align-items:center;
  margin:6px 0;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timer{
  font-size:170px;
  color:#00ff99;
  font-weight:900;
}

.big{font-size:44px;margin:18px;}
.bank{font-size:38px;color:#ffd54a;}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🎾 Padel-Götter PRO 1.1</div>
<button id="kioskBtn">Kiosk</button>
</div>

<!-- PLAYERS -->
<div class="section">
<h3>Spieler Auswahl</h3>
<div id="players"></div>
</div>

<!-- SETUP -->
<div class="section">
<h3>Setup</h3>

<label>Gesamtzeit</label>
<select id="totalTime">
<option value="120">120 min</option>
<option value="180" selected>180 min</option>
</select>

<br><br>

<label>Matchzeit</label>
<select id="matchTime">
<option value="15">15 min</option>
<option value="18" selected>18 min</option>
<option value="20">20 min</option>
</select>
</div>

<!-- MODE -->
<div class="section">
<h3>Modus</h3>
<button id="btnTurnier">🏆 Turnier</button>
<button id="btnGruppe">👥 Gruppe</button>
</div>

<div class="section">
<button id="btnGenerate">Spielplan erstellen</button>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timer">00:00</div>

<div id="mode" class="big"></div>
<div id="round" class="big"></div>
<div id="teams" class="big"></div>
<div id="bank" class="big"></div>

<button id="btnStart">Start</button>
<button id="btnNext">Next</button>
<button id="btnExit">Exit</button>

</div>

<script>

/* =====================
   STATE
===================== */

let mode = "turnier";

let players = ["Marco","Stefan","David","Tobias","Chris","Werner"];
let selected = {};

let schedule = [];
let index = 0;

let timer = null;
let timeLeft = 0;
let finished = false;

/* =====================
   INIT PLAYERS
===================== */

function initPlayers(){

  const box = document.getElementById("players");
  box.innerHTML = "";

  players.forEach(p=>{

    selected[p] = true;

    const row = document.createElement("div");
    row.className = "playerRow";

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = true;

    cb.addEventListener("change", ()=>{
      selected[p] = cb.checked;
    });

    const label = document.createElement("span");
    label.innerText = p;

    row.appendChild(cb);
    row.appendChild(label);

    box.appendChild(row);
  });
}

/* =====================
   ACTIVE PLAYERS
===================== */

function activePlayers(){
  return players.filter(p=>selected[p]);
}

/* =====================
   FAIR SCORE ENGINE
===================== */

function generate(){

  const p = activePlayers();

  if(p.length < 4){
    alert("Mindestens 4 Spieler!");
    return;
  }

  schedule = [];
  index = 0;

  const total = +totalTime.value;
  const match = +matchTime.value;

  const rounds = Math.floor(total / match);

  // =========================
  // FAIRNESS MEMORY SYSTEM
  // =========================
  let stats = {};

  p.forEach(x=>{
    stats[x] = {
      played:0,
      bank:0,
      lastBank:false
    };
  });

  function score(player){
    let s = stats[player];
    return s.played + (s.bank * 3) + (s.lastBank ? 5 : 0);
  }

  function pickBank(pool,count){
    return [...pool]
      .sort((a,b)=>score(a)-score(b))
      .slice(0,count);
  }

  for(let r=0;r<rounds;r++){

    let pool = [...p].sort(()=>Math.random()-0.5);

    let a=[], b=[], bank=[];

    let bankCount = p.length===6 ? 2 : (p.length===5 ? 1 : 0);

    bank = pickBank(pool, bankCount);

    let rest = pool.filter(x=>!bank.includes(x));

    a = [rest[0], rest[1]];
    b = [rest[2], rest[3]];

    // =====================
    // UPDATE STATS
    // =====================

    bank.forEach(x=>{
      stats[x].bank++;
      stats[x].lastBank = true;
    });

    rest.forEach(x=>{
      stats[x].played++;
      stats[x].lastBank = false;
    });

    schedule.push({a,b,bank});
  }

  renderPreview();
  update();
}

/* =====================
   PREVIEW
===================== */

function renderPreview(){

  const box = document.getElementById("preview");
  box.innerHTML = "";

  schedule.forEach((s,i)=>{

    const div = document.createElement("div");

    div.innerText =
      `R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")} | Bank: ${s.bank.join(", ") || "keine"}`;

    box.appendChild(div);
  });
}

/* =====================
   UPDATE KIOSK
===================== */

function update(){

  const s = schedule[index];
  if(!s) return;

  document.getElementById("mode").innerText =
    mode === "turnier" ? "🏆 Turnier" : "👥 Gruppe";

  document.getElementById("round").innerText =
    "Runde " + (index + 1);

  document.getElementById("teams").innerText =
    s.a.join(" / ") + " vs " + s.b.join(" / ");

  document.getElementById("bank").innerText =
    "Bank: " + (s.bank.join(", ") || "keine");
}

/* =====================
   TIMER
===================== */

function startTimer(){

  timeLeft = +matchTime.value * 60;

  clearInterval(timer);

  timer = setInterval(()=>{

    timeLeft--;

    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    if(s < 10) s = "0" + s;

    document.getElementById("timer").innerText = `${m}:${s}`;

    if(timeLeft <= 0){
      clearInterval(timer);
      finished = true;
    }

  },1000);
}

/* =====================
   NEXT
===================== */

function nextMatch(){

  if(!finished) return;

  index = (index + 1) % schedule.length;
  finished = false;

  update();
}

/* =====================
   MODE
===================== */

document.getElementById("btnTurnier").onclick = ()=>mode="turnier";
document.getElementById("btnGruppe").onclick = ()=>mode="gruppe";

/* =====================
   KIOSK
===================== */

document.getElementById("kioskBtn").onclick = ()=>{
  document.body.classList.add("kioskMode");
};

document.getElementById("btnExit").onclick = ()=>{
  document.body.classList.remove("kioskMode");
};

/* =====================
   EVENTS
===================== */

document.getElementById("btnGenerate").onclick = generate;
document.getElementById("btnStart").onclick = startTimer;
document.getElementById("btnNext").onclick = nextMatch;

/* INIT */
initPlayers();

</script>

</body>
</html>
