<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Manager V12.1 MASTER</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f16;
  color:white;
}

#app{
  max-width:1000px;
  margin:auto;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#123b28;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:16px 20px;
  margin:6px;
  border:none;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  background:#1f6f4a;
  color:white;
  cursor:pointer;
}

.mode-btn.active{
  box-shadow:0 0 12px #00ff99;
}

.section{
  background:#184d35;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

.playerRow{
  display:flex;
  gap:10px;
  margin:6px 0;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timerBox{
  font-size:200px;
  font-weight:900;
  color:#00ff99;
  text-shadow:0 0 20px #00ff99;
  margin-bottom:40px;
}

.kioskBlock{
  font-size:52px;
  font-weight:bold;
  margin:25px 0;
}

.kioskTeams{
  font-size:60px;
  font-weight:bold;
  margin:40px 0;
  line-height:1.6;
}

.kioskBank{
  font-size:50px;
  font-weight:bold;
  color:#ffd54a;
  margin-top:30px;
}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
  <div>🎾 V12.1 MASTER</div>
  <button onclick="enterKiosk()">Kiosk</button>
</div>

<!-- SETTINGS -->
<div class="section">
<h3>⚙️ Setup</h3>

<label>Gesamtzeit:</label><br>
<select id="totalTime">
  <option value="120">120 min</option>
  <option value="180" selected>180 min</option>
</select>

<br><br>

<label>Matchzeit:</label><br>
<select id="matchTime">
  <option value="15">15 min</option>
  <option value="18" selected>18 min</option>
  <option value="20">20 min</option>
</select>
</div>

<!-- MODE -->
<div class="section">
<h3>Modus</h3>

<button id="btnTurnier" class="mode-btn active" onclick="setMode('turnier')">🏆 Turnier</button>
<button id="btnGruppen" class="mode-btn" onclick="setMode('gruppen')">👥 Gruppe</button>

</div>

<!-- PLAYERS -->
<div class="section">
<h3>Spieler</h3>
<div id="players"></div>
</div>

<!-- PREVIEW -->
<div class="section">
<h3>Spielplan</h3>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timerBox">⏱ 00:00</div>

<div id="modeBox" class="kioskBlock"></div>
<div id="roundBox" class="kioskBlock"></div>

<div id="teamsBox" class="kioskTeams"></div>

<div id="bankBox" class="kioskBank"></div>

<br>

<button onclick="startTimer()">Start</button>
<button onclick="nextMatch()">Next</button>
<button onclick="exitKiosk()">Exit</button>

</div>

<script>

/* =====================
   STATE
===================== */

let mode="turnier";

let players=[
  {name:"Marco",active:true},
  {name:"Stefan",active:true},
  {name:"David",active:true},
  {name:"Tobias",active:true},
  {name:"Chris",active:true},
  {name:"Werner",active:true}
];

let schedule=[];
let index=0;

/* =====================
   SYSTEM
===================== */

let freeze=false;
let lock=false;
let timer=null;
let timeLeft=0;
let finished=false;

/* =====================
   BANK SYSTEM (FAIR ROTATION)
===================== */

let lastBank=[];
let bankCounter={};

function updateBankCounter(bank){
  bank.forEach(p=>{
    bankCounter[p]=(bankCounter[p]||0)+1;
  });
}

function pickBank(pool,count){

  let available = pool.filter(p => !lastBank.includes(p));

  if(available.length < count){
    available = [...pool];
    lastBank=[];
  }

  let bank = available
    .sort(()=>Math.random()-0.5)
    .slice(0,count);

  lastBank = bank;
  updateBankCounter(bank);

  return bank;
}

/* =====================
   PLAYERS
===================== */

function renderPlayers(){
  let box=document.getElementById("players");
  box.innerHTML="";

  players.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="playerRow">
        <input type="checkbox"
          ${p.active?"checked":""}
          onchange="players[${i}].active=this.checked">

        <input type="text"
          value="${p.name}"
          onchange="players[${i}].name=this.value">
      </div>`;
  });
}

function active(){
  return players.filter(p=>p.active).map(p=>p.name);
}

/* =====================
   MODE
===================== */

function setMode(m){

  if(lock) return;

  mode=m;

  document.getElementById("btnTurnier").classList.remove("active");
  document.getElementById("btnGruppen").classList.remove("active");

  if(m==="turnier")
    document.getElementById("btnTurnier").classList.add("active");

  if(m==="gruppen")
    document.getElementById("btnGruppen").classList.add("active");

  generate();
}

/* =====================
   TURNIER (RULE BASED)
===================== */

function buildTurnier(){

  let l=active();
  let pool=[...l].sort(()=>Math.random()-0.5);

  let a,b,bank=[];

  if(l.length===5){

    bank = pickBank(pool,1);

    let rest = pool.filter(p=>!bank.includes(p));

    a=[rest[0],rest[1]];
    b=[rest[2],rest[3]];
  }

  if(l.length===6){

    bank = pickBank(pool,2);

    let rest = pool.filter(p=>!bank.includes(p));

    a=[rest[0],rest[1]];
    b=[rest[2],rest[3]];
  }

  if(l.length===4){

    a=[pool[0],pool[1]];
    b=[pool[2],pool[3]];
  }

  return {a,b,bank};
}

/* =====================
   GROUP (FIXED TEAMS + ROTATION)
===================== */

let groupTeams=null;
let groupIndex=0;

function generateGroupTeams(){

  let l=active();

  if(l.length===4)
    return [[l[0],l[1]],[l[2],l[3]]];

  if(l.length===6)
    return [[l[0],l[1]],[l[2],l[3]],[l[4],l[5]]];

  return [];
}

function buildGruppe(){

  if(!groupTeams){
    groupTeams=generateGroupTeams();
    groupIndex=0;
  }

  let t=groupTeams;

  if(t.length===2)
    return {a:t[0],b:t[1],bank:[]};

  if(t.length===3){

    let a=t[groupIndex%3];
    let b=t[(groupIndex+1)%3];
    let bank=t[(groupIndex+2)%3];

    groupIndex++;

    return {a,b,bank:[...bank]};
  }

  return {a:[],b:[],bank:[]};
}

/* =====================
   GENERATE FULL SCHEDULE
===================== */

function generate(){

  if(freeze) return;

  schedule=[];
  index=0;

  groupTeams=null;
  groupIndex=0;
  lastBank=[];

  let total=parseInt(document.getElementById("totalTime").value);
  let match=parseInt(document.getElementById("matchTime").value);

  let rounds=Math.floor(total/match);

  for(let i=0;i<rounds;i++){

    if(mode==="turnier")
      schedule.push(buildTurnier());

    if(mode==="gruppen")
      schedule.push(buildGruppe());
  }

  render();
  update();
}

/* =====================
   RENDER
===================== */

function render(){

  let html="";

  schedule.forEach((s,i)=>{
    html+=`
      R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")}<br>
      Bank: ${s.bank.join(", ") || "keine"}<br><br>
    `;
  });

  document.getElementById("preview").innerHTML=html;
}

/* =====================
   KIOSK
===================== */

function enterKiosk(){
  document.body.classList.add("kioskMode");
}

function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =====================
   TIMER
===================== */

function startTimer(){

  freeze=true;
  lock=true;

  let t=parseInt(document.getElementById("matchTime").value);

  timeLeft=t*60;
  finished=false;

  clearInterval(timer);

  updateTimer();

  timer=setInterval(()=>{

    timeLeft--;
    updateTimer();

    if(timeLeft<=0){
      clearInterval(timer);
      finished=true;
    }

  },1000);
}

function updateTimer(){

  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;
  if(s<10) s="0"+s;

  document.getElementById("timerBox").innerHTML=
    `⏱ ${m}:${s}`;
}

/* =====================
   NEXT MATCH
===================== */

function nextMatch(){

  if(!finished) return;

  index++;

  if(index>=schedule.length)
    index=0;

  finished=false;

  update();
}

/* =====================
   UPDATE KIOSK
===================== */

function update(){

  let s=schedule[index];
  if(!s) return;

  document.getElementById("modeBox").innerHTML=
    mode==="turnier"?"🏆 TURNIER":"👥 GRUPPE";

  document.getElementById("roundBox").innerHTML=
    `Runde ${index+1}/${schedule.length}`;

  document.getElementById("teamsBox").innerHTML=
    `${s.a.join(" / ")} vs ${s.b.join(" / ")}`;

  document.getElementById("bankBox").innerHTML=
    `Bank: ${s.bank.join(", ") || "keine"}`;
}

/* =====================
   INIT
===================== */

renderPlayers();
generate();

</script>

</body>
</html>
