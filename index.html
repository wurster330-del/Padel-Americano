<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Timer</title>

<style>

body{
    margin:0;
    background:#184b2f;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    margin:10px;
    font-size:32px;
}

#timer{
    font-size:110px;
    font-weight:bold;
    margin:20px 0;
}

.buttonRow{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:15px 0;
    flex-wrap:wrap;
}

button{
    font-size:24px;
    padding:15px 30px;
    border:none;
    border-radius:12px;
    background:#2e8b57;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#3ca66c;
}

.section{
    margin-top:30px;
}

.card{
    background:#255d3d;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
}

.teamContainer{
    display:flex;
    justify-content:space-around;
    margin-top:15px;
}

.team{
    width:40%;
    font-size:28px;
}

.pause{
    margin-top:20px;
    font-size:28px;
}

.small{
    font-size:22px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎾 Padel Timer</h1>

<div id="timer">18:00</div>

<div class="buttonRow">
<button id="startBtn">▶ Start</button>
<button id="pauseBtn">⏸ Pause</button>
<button id="resetBtn">⏹ Reset</button>
</div>

<div class="section">

<h2>Spielzeit</h2>

<div class="buttonRow">
<button onclick="setTime(15)">15 Min</button>
<button onclick="setTime(18)">18 Min</button>
<button onclick="setTime(20)">20 Min</button>
<button onclick="customTime()">Eigene Zeit</button>
</div>

</div>

<div class="section">

<h2>Spieler</h2>

<div class="buttonRow">
<button onclick="setPlayers(4)">4</button>
<button onclick="setPlayers(5)">5</button>
<button onclick="setPlayers(6)">6</button>
</div>

</div>

<div class="section card">

<h2 id="round">Runde 1</h2>

<div class="teamContainer">

<div class="team">

<b>TEAM A</b><br><br>

Tobias<br>
Werner

</div>

<div class="team">

<b>TEAM B</b><br><br>

Christian<br>
Stefan

</div>

</div>

<div class="pause">

<b>Pause</b><br><br>

David<br>
Marco

</div>

</div>

<div class="buttonRow" style="margin-top:30px;">

<button id="drawBtn">🎲 Neue Paarung</button>

<button id="swapBtn">🔄 Spieler tauschen</button>

<button id="editBtn">✏ Namen bearbeiten</button>

</div>

</div>

<script>

let totalSeconds=18*60;
let remainingSeconds=totalSeconds;
let timer=null;

function updateTimer(){

let m=Math.floor(remainingSeconds/60);
let s=remainingSeconds%60;

document.getElementById("timer").innerHTML=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

}

function startTimer(){

if(timer) return;

timer=setInterval(function(){

if(remainingSeconds>0){

remainingSeconds--;
updateTimer();

}else{

clearInterval(timer);
timer=null;
alert("Spielzeit beendet");

}

},1000);

}

function pauseTimer(){

clearInterval(timer);
timer=null;

}

function resetTimer(){

pauseTimer();
remainingSeconds=totalSeconds;
updateTimer();

}

function setTime(min){

totalSeconds=min*60;
remainingSeconds=totalSeconds;
updateTimer();

}

function customTime(){

let m=prompt("Spielzeit in Minuten");

if(m && !isNaN(m)){

setTime(parseInt(m));

}

}

function setPlayers(n){

alert(n+" Spieler gewählt");

}

document.getElementById("startBtn").onclick=startTimer;
document.getElementById("pauseBtn").onclick=pauseTimer;
document.getElementById("resetBtn").onclick=resetTimer;

updateTimer();

</script>

</body>
</html>
