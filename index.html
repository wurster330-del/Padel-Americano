<!doctype html><html lang='de'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Padel Götter Pro v3.0</title><style>
body{font-family:Arial;background:#103b2d;color:#fff;max-width:900px;margin:auto;padding:16px}
.card{background:#1b5a44;padding:14px;border-radius:10px;margin:12px 0}input{padding:6px;margin:3px}
button{padding:10px 14px;margin:4px}#timer{font-size:80px;text-align:center;font-weight:bold}
table{width:100%;border-collapse:collapse}td,th{border:1px solid #6ab;padding:6px}.act{background:#2d7}
</style></head><body><h1>🏆 PADEL-GÖTTER PRO v3.0 (6 Spieler)</h1>
<div class=card id=setup></div>
<div class=card><div id=live></div><div id=timer>18:00</div>
<button onclick='start()'>▶ Start</button><button onclick='pauseT()'>⏸ Pause</button><button onclick='resetT()'>🔄 Reset</button><button onclick='nextM()'>➡ Nächstes Match</button><div id=msg></div></div>
<div class=card><h3>Spielplan</h3><table><thead><tr><th>Rd.</th><th>Match</th><th>Bank</th><th>Ergebnis</th></tr></thead><tbody id=tb></tbody></table></div>
<script>
setup.innerHTML=["Marco","Stefan","David","Tobias","Chris","Werner"].map((n,i)=>`<input id=p${i} value="${n}"><br>`).join("")+"<button onclick='draw()'>🎲 Teams auslosen</button>";
let T=[],seq=[[0,1,2],[1,2,0],[0,2,1],[0,1,2],[1,2,0],[0,2,1],[0,1,2],[1,2,0],[0,2,1],[0,1,2]],r=0,s=1080,i=null;
function sh(a){for(let k=a.length-1;k>0;k--){let j=Math.floor(Math.random()*(k+1));[a[k],a[j]]=[a[j],a[k]]}}
function draw(){let a=[];for(let x=0;x<6;x++)a.push(document.getElementById("p"+x).value);sh(a);T=[[a[0],a[1]],[a[2],a[3]],[a[4],a[5]]];build();show();}
function build(){tb.innerHTML="";seq.forEach((m,n)=>tb.innerHTML+=`<tr id=r${n}><td>${n+1}</td><td>${T[m[0]].join(" + ")} 🆚 ${T[m[1]].join(" + ")}</td><td>${T[m[2]].join(" + ")}</td><td contenteditable></td></tr>`)}
function show(){document.querySelectorAll("tbody tr").forEach(e=>e.classList.remove("act"));let row=document.getElementById("r"+r);if(row)row.classList.add("act");let m=seq[r];live.innerHTML=`<h2>Runde ${r+1}/10</h2><h2>${T[m[0]].join(" + ")}<br>🆚<br>${T[m[1]].join(" + ")}</h2><h3>🪑 Bank: ${T[m[2]].join(" + ")}</h3>`;resetT();}
function render(){timer.textContent=(String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"));}
function tick(){if(s==0){pauseT();msg.textContent="🔔 Match beendet";navigator.vibrate&&navigator.vibrate(600);return;}s--;render();}
function start(){if(!i)i=setInterval(tick,1000)} function pauseT(){clearInterval(i);i=null}
function resetT(){pauseT();s=1080;msg.textContent="";render()}
function nextM(){if(r<9){r++;show()}else alert("🏆 Turnier beendet!")}
render();
</script></body></html>
