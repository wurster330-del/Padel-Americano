<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V3.0 Phase 4 – Court Mode</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071f14;
  color:white;
  overflow:hidden;
}

/* TOP BAR */
#topbar{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  font-size:18px;
  opacity:0.9;
}

/* BIG MATCH TIMER */
#matchTime{
  font-size:22vh;
  text-align:center;
  font-weight:bold;
}

/* ROUND */
#round{
  text-align:center;
  font-size:4vh;
  opacity:0.8;
}

/* TEAMS */
#teams{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  font-size:5vh;
  font-weight:bold;
}

.teamBox{
  text-align:center;
}

/* BANK + NEXT */
#bottom{
  margin-top:20px;
  text-align:center;
  font-size:3vh;
  opacity:0.9;
}

#next{
  margin-top:10px;
  color:#66d9ff;
}

/* WARNING */
#warning{
  display:none;
  text-align:center;
  color:#ff4d4d;
  font-size:3vh;
  font-weight:bold;
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.2;}
  100%{opacity:1;}
}

/* BUTTONS */
#controls{
  position:fixed;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  padding:14px 18px;
  border:none;
  border-radius:10px;
  background:#2e8b57;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="eventTime">120:00</div>
  <div>COURT MODE</div>
</div>

<div id="matchTime">18:00</div>

<div id="warning">⚠ LETZTE 30 SEKUNDEN</div>

<div id="round">Runde 1</div>

<div id="teams">
  <div class="teamBox">
    <div>TEAM A</div>
    <div id="teamA"></div>
  </div>

  <div class="teamBox">
    <div>TEAM B</div>
    <div id="teamB"></div>
  </div>
</div>

<div id="bottom">
  <div id="bank"></div>
  <div id="next"></div>
</div>

<div id="controls">
  <button onclick="start()">▶ Start</button>
  <button onclick="pause()">⏸ Pause</button>
  <button onclick="next()">➡ Next</button>
</div>

<audio id="beep"
src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

/* ================= DATA ================= */

const players = ["Tobias","Werner","Christian","Stefan","David","Marco"];

let schedule = [];
let index = 0;

/* ================= TIMER ================= */

let matchSeconds = 18 * 60;
let eventSeconds = 120 * 60;

let matchRemain = matchSeconds;
let eventRemain = eventSeconds;

let interval = null;

/* ================= GENERATOR ================= */

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function generate(){

  let p = shuffle(players);

  schedule = [];

  for(let r=0;r<p.length;r++){

    let rot = [...p.slice(r),...p.slice(0,r)];

    schedule.push({
      a:[rot[0],rot[1]],
      b:[rot[2],rot[3]],
      bank:rot.slice(4),
      round:r+1
    });
  }
}

generate();

/* ================= RENDER ================= */

function render(){

  let m=Math.floor(matchRemain/60);
  let s=matchRemain%60;

  let e=Math.floor(eventRemain/60);
  let es=eventRemain%60;

  eventTime.textContent=e+":"+String(es).padStart(2,"0");
  matchTime.textContent=m+":"+String(s).padStart(2,"0");

  let cur=schedule[index];

  if(!cur) return;

  round.textContent="Runde "+cur.round;

  teamA.textContent=cur.a.join(" | ");
  teamB.textContent=cur.b.join(" | ");

  bank.textContent="Bank: "+(cur.bank.length?cur.bank.join(" | "):"-");

  let nextS=schedule[index+1]||schedule[0];

  next.textContent="➡ NEXT: "+nextS.a.join(" / ")+" vs "+nextS.b.join(" / ");
}

/* ================= CONTROL ================= */

function start(){

  if(interval) return;

  interval=setInterval(()=>{

    matchRemain--;
    eventRemain--;

    if(eventRemain<=0){
      beep(); pause();
    }

    if(matchRemain===30){
      warning.style.display="block";
      warning.classList.add("blink");
      beep();
    }

    if(matchRemain<=0){
      beep(); beep();
      next();
    }

    render();

  },1000);
}

function pause(){
  clearInterval(interval);
  interval=null;
}

function next(){
  index++;
  if(index>=schedule.length) index=0;
  matchRemain=matchSeconds;
  render();
}

/* ================= SOUND ================= */

function beep(){
  let b=document.getElementById("beep");
  b.currentTime=0;
  b.play();
}

/* INIT */
render();

</script>

</body>
</html>
