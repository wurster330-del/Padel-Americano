<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Terminal V2.4 Turniermodus</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b2f1d;
  color:white;
  text-align:center;
}

#admin{padding:20px;}

.panel{
  background:#255d3d;
  padding:15px;
  border-radius:12px;
  margin:10px auto;
  max-width:800px;
}

.playerBox{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.player{
  background:#1f6b42;
  padding:8px;
  border-radius:8px;
}

/* COURT */
#court{
  display:none;
  height:100vh;
  flex-direction:column;
  justify-content:space-between;
  padding:15px;
}

.top{
  display:flex;
  justify-content:space-between;
  font-size:22px;
}

#matchTime{
  font-size:24vh;
  font-weight:bold;
}

#eventInfo{
  font-size:5vh;
}

#teams{
  font-size:5vh;
  font-weight:bold;
}

#plan{
  font-size:3vh;
  color:#ffd966;
  margin-top:10px;
}

button{
  padding:16px 22px;
  border:none;
  border-radius:12px;
  background:#2e8b57;
  color:white;
  font-size:16px;
}

.exit{
  position:absolute;
  top:10px;
  right:10px;
  background:#b33a3a;
}
</style>
</head>

<body>

<!-- ================= ADMIN ================= -->
<div id="admin">

<h1>🎾 Padel Terminal V2.4</h1>

<div class="panel">
<h3>Spieler (4–6 auswählen)</h3>
<div id="playerBox" class="playerBox"></div>
</div>

<div class="panel">
<h3>Matchzeit</h3>
<select id="matchSelect">
  <option value="15">15</option>
  <option value="18" selected>18</option>
  <option value="20">20</option>
</select>
</div>

<div class="panel">
<h3>Spielabend</h3>
<select id="eventSelect">
  <option value="120" selected>120</option>
  <option value="180">180</option>
</select>
</div>

<div class="panel">
<button onclick="startTournament()">▶ TURNIER STARTEN</button>
</div>

</div>

<!-- ================= COURT ================= -->
<div id="court">

<button class="exit" onclick="exit()">❌ EXIT</button>

<div class="top">
  <div id="eventTime">120:00</div>
  <div>COURT 1</div>
</div>

<div id="matchTime">18:00</div>

<div id="teams"></div>

<div id="plan"></div>

<div>
<button onclick="startMatch()">▶ START</button>
<button onclick="pauseMatch()">⏸ PAUSE</button>
<button onclick="nextRound()">➡ NEXT</button>
</div>

</div>

<script>

/* ================= DATA ================= */

const allPlayers=["Tobias","Werner","Christian","Stefan","David","Marco"];

let active=[];
let schedule=[];
let currentIndex=0;

/* TIMER */
let event={total:0,remain:0};
let match={total:0,remain:0,interval:null};

/* ================= PLAYERS ================= */

function renderPlayers(){
  const box=document.getElementById("playerBox");
  box.innerHTML="";

  allPlayers.forEach(p=>{
    box.innerHTML+=`
      <label class="player">
        <input type="checkbox" checked onchange="toggle('${p}',this.checked)">
        ${p}
      </label>
    `;
  });
}

function toggle(name,checked){
  if(checked){
    if(!active.includes(name)) active.push(name);
  } else {
    active=active.filter(x=>x!==name);
  }
}

/* ================= TOURNAMENT GENERATION ================= */

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function createSchedule(players){

  let list=shuffle([...players]);
  let rounds=[];

  let matchTime=parseInt(matchSelect.value)*60;
  let eventTime=parseInt(eventSelect.value)*60;

  let maxRounds=Math.floor(eventTime / matchTime);

  for(let r=0;r<maxRounds;r++){

    let rotated=[...list.slice(r%list.length),...list.slice(0,r%list.length)];

    let a=[rotated[0],rotated[1]];
    let b=[rotated[2],rotated[3]];
    let bank=rotated.slice(4);

    rounds.push({
      a,b,bank,
      label:"Runde "+(r+1)
    });
  }

  return rounds;
}

/* ================= START ================= */

function startTournament(){

  active=[...allPlayers];

  schedule=createSchedule(active);
  currentIndex=0;

  match.total=parseInt(matchSelect.value)*60;
  match.remain=match.total;

  event.total=parseInt(eventSelect.value)*60;
  event.remain=event.total;

  admin.style.display="none";
  court.style.display="flex";

  render();
}

/* ================= MATCH CONTROL ================= */

function startMatch(){

  if(match.interval) return;

  match.interval=setInterval(()=>{

    match.remain--;
    event.remain--;

    if(match.remain<=0){
      nextRound();
      return;
    }

    render();

  },1000);
}

function pauseMatch(){
  clearInterval(match.interval);
  match.interval=null;
}

/* ================= NEXT ================= */

function nextRound(){

  if(currentIndex < schedule.length-1){
    currentIndex++;
  }

  match.remain=match.total;

  render();
}

/* ================= EXIT ================= */

function exit(){
  pauseMatch();
  court.style.display="none";
  admin.style.display="block";
}

/* ================= RENDER ================= */

function render(){

  let em=Math.floor(event.remain/60);
  let es=event.remain%60;

  let mm=Math.floor(match.remain/60);
  let ms=match.remain%60;

  eventTime.textContent=em+":"+String(es).padStart(2,"0");
  matchTime.textContent=mm+":"+String(ms).padStart(2,"0");

  let m=schedule[currentIndex];

  if(!m) return;

  teams.innerHTML=
    "TEAM A: "+m.a.join(" | ")+"<br>"+
    "TEAM B: "+m.b.join(" | ")+"<br>"+
    "BANK: "+m.bank.join(" | ");

  plan.innerHTML=
    m.label+" / "+schedule.length;
}

/* INIT */
renderPlayers();
render();

</script>

</body>
</html>
