<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padel Club Manager V12.2 FIXED</title>

<meta name="theme-color" content="#0b1f16">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1f16;
  color:white;
}

#app{padding:10px;}

.topbar{
  position:sticky;
  top:0;
  background:#123b28;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:14px 18px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#1f6f4a;
  color:white;
  font-weight:bold;
}

.section{
  background:#184d35;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}

/* KIOSK */
.kioskMode #app{display:none;}
.kioskMode #kiosk{display:block;}

#kiosk{
  display:none;
  height:100vh;
  background:black;
  text-align:center;
  padding-top:20px;
}

#timer{
  font-size:160px;
  color:#00ff99;
  font-weight:900;
}

.big{font-size:44px;margin:20px;}
.bank{font-size:40px;color:#ffd54a;}
</style>
</head>

<body>

<div id="app">

<div class="topbar">
<div>🎾 V12.2 FIXED</div>
<button onclick="enterKiosk()">Kiosk</button>
</div>

<div class="section">
<h3>Spieler</h3>
<textarea id="players" rows="6" style="width:100%">
Marco
Stefan
David
Tobias
Chris
Werner
</textarea>
</div>

<div class="section">
<h3>Setup</h3>

<label>Gesamtzeit:</label>
<select id="totalTime">
<option value="120">120</option>
<option value="180">180</option>
</select>

<br><br>

<label>Matchzeit:</label>
<select id="matchTime">
<option value="15">15</option>
<option value="18" selected>18</option>
<option value="20">20</option>
</select>
</div>

<div class="section">
<h3>Modus</h3>
<button onclick="setMode('turnier')">Turnier</button>
<button onclick="setMode('gruppe')">Gruppe</button>
</div>

<div class="section">
<button onclick="generate()">Spielplan erstellen</button>
<div id="preview"></div>
</div>

</div>

<!-- KIOSK -->
<div id="kiosk">

<div id="timer">00:00</div>

<div id="mode" class="big"></div>
<div id="round" class="big"></div>
<div id="teams" class="big"></div>
<div id="bank" class="bank"></div>

<button onclick="startTimer()">Start</button>
<button onclick="nextMatch()">Next</button>
<button onclick="exitKiosk()">Exit</button>

</div>

<script>

/* =====================
   SOUND + VOICE
===================== */

const gong = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");

function speak(t){
  let u=new SpeechSynthesisUtterance(t);
  u.lang="de-DE";
  speechSynthesis.speak(u);
}

/* =====================
   STATE
===================== */

let mode="turnier";
let schedule=[];
let i=0;
let timer;
let timeLeft=0;
let finished=false;

/* =====================
   PLAYERS
===================== */

function getPlayers(){
  return document.getElementById("players").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);
}

/* =====================
   MODE
===================== */

function setMode(m){
  mode=m;
}

/* =====================
   GENERATE (FIXED)
===================== */

function generate(){

  let p=getPlayers();
  schedule=[];
  i=0;

  let rounds=6;

  for(let r=0;r<rounds;r++){

    let pool=[...p].sort(()=>Math.random()-0.5);

    let a=[],b=[],bank=[];

    if(mode==="turnier"){

      if(p.length===5){
        bank=[pool[0]];
        let rest=pool.slice(1);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }

      if(p.length===6){
        bank=[pool[0],pool[1]];
        let rest=pool.slice(2);
        a=[rest[0],rest[1]];
        b=[rest[2],rest[3]];
      }

      if(p.length===4){
        a=[pool[0],pool[1]];
        b=[pool[2],pool[3]];
      }
    }

    if(mode==="gruppe"){

      if(p.length===6){

        let A=[p[0],p[1]];
        let B=[p[2],p[3]];
        let C=[p[4],p[5]];

        let rot=r%3;

        if(rot===0) {a=A;b=B;bank=C;}
        if(rot===1) {a=B;b=C;bank=A;}
        if(rot===2) {a=C;b=A;bank=B;}
      }

      if(p.length===4){
        let A=[p[0],p[1]];
        let B=[p[2],p[3]];
        a=A;b=B;bank=[];
      }
    }

    schedule.push({a,b,bank});
  }

  render();
  update();
}

/* =====================
   KIOSK
===================== */

function enterKiosk(){
  document.body.classList.add("kioskMode");
}
function exitKiosk(){
  document.body.classList.remove("kioskMode");
}

/* =====================
   TIMER
===================== */

function startTimer(){

  timeLeft=parseInt(document.getElementById("matchTime").value)*60;
  finished=false;

  clearInterval(timer);

  timer=setInterval(()=>{

    timeLeft--;

    let m=Math.floor(timeLeft/60);
    let s=timeLeft%60;
    if(s<10)s="0"+s;

    document.getElementById("timer").innerText=`${m}:${s}`;

    if(timeLeft<=0){
      clearInterval(timer);
      finished=true;
      gong.play();
      speak("Match beendet");
    }

  },1000);
}

/* =====================
   NEXT MATCH
===================== */

function nextMatch(){

  if(!finished) return;

  let s=schedule[i];

  gong.play();

  speak(
    "Match " +
    s.a.join(" und ") +
    " gegen " +
    s.b.join(" und ") +
    ". Bank: " +
    (s.bank.length ? s.bank.join(" und ") : "keine")
  );

  i++;
  if(i>=schedule.length) i=0;

  finished=false;

  update();
}

/* =====================
   UPDATE
===================== */

function update(){

  let s=schedule[i];
  if(!s) return;

  document.getElementById("mode").innerText=
    mode==="turnier"?"🏆 Turnier":"👥 Gruppe";

  document.getElementById("round").innerText=
    "Runde " + (i+1);

  document.getElementById("teams").innerText=
    s.a.join(" / ") + " vs " + s.b.join(" / ");

  document.getElementById("bank").innerText=
    "Bank: " + (s.bank.join(", ") || "keine");
}

/* =====================
   RENDER
===================== */

function render(){

  let html="";
  schedule.forEach((s,i)=>{
    html+=`
    R${i+1}: ${s.a.join(" / ")} vs ${s.b.join(" / ")} | Bank: ${s.bank.join(", ")}<br>
    `;
  });

  document.getElementById("preview").innerHTML=html;
}

</script>

</body>
</html>
